const DELTA_CYCLE=[0,0,1,0,-1,2,0,1,0,0];
function buildItems(idPrefix,titles,weightEach,seedBase,closed){
  return titles.map((title,i)=>{
    const self=2+((seedBase+i*3)%4);
    if(!closed) return {id:idPrefix+i,title,weight:weightEach,r1:{self:{score:self,by:'ตนเอง',date:'15/06/2569'},supervisor:null,committee:null},r2:null};
    const d1=DELTA_CYCLE[(seedBase+i)%DELTA_CYCLE.length];
    const sup=Math.max(1,Math.min(5,self+d1));
    const d2raw=DELTA_CYCLE[(seedBase+i+3)%DELTA_CYCLE.length];
    const d2=d2raw>1?1:(d2raw<0?-1:0);
    const com=Math.max(1,Math.min(5,sup+d2));
    return {
      id:idPrefix+i,title,weight:weightEach,
      r1:{
        self:{score:self,by:'ตนเอง',date:'15/06/2569'},
        supervisor:{score:sup,by:'หัวหน้าแผนก',date:'22/06/2569',note:sup===self?'ผลงานตรงตามที่ประเมินตนเอง':(sup>self?'ผลงานเกินกว่าที่ประเมินตนเองไว้':'ยังไม่ครบตามเป้าหมายที่วางไว้ทั้งหมด')},

      },
      r2:null,
    };
  });
}
function finalScore(round){
  if(!round) return null;
  if(round.committee) return round.committee.score;
  if(round.supervisor) return round.supervisor.score;
  if(round.self) return round.self.score;
  return null;
}
function itemAvg(item){
  const vals=[finalScore(item.r1),finalScore(item.r2)].filter(v=>v!=null);
  return vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:null;
}
function computeOverall(person){
  if(!person.closed) return null;
  let sum=0,wt=0;
  person.cats.forEach(c=>c.items.forEach(it=>{
    const f=it.r1&&it.r1.supervisor?finalScore(it.r1):null;
    if(f!=null){sum+=f*it.weight;wt+=it.weight;}
  }));
  return wt?Math.round((sum/wt)*10)/10:null;
}
function scoreColor(score,baseline){
  if(baseline==null||score==null) return 'green';
  const d=Math.abs(score-baseline);
  return d===0?'green':d===1?'yellow':'red';
}

const parseThaiDate=(s)=>{const[d,m,y]=s.split('/').map(Number);return new Date(y-543,m-1,d);};
const TODAY=new Date(2026,5,30); // prototype fixed date (30 Jun 2026 CE)
const getExecStatus=(item)=>{
  if(!item.start||!item.end) return 'active';
  const s=parseThaiDate(item.start),e=parseThaiDate(item.end);
  if(TODAY<s) return 'upcoming';
  if(TODAY>e) return 'ended';
  return 'active';
};

/* ─── UI PRIMITIVES ─── */
function CatTag({cat,sm}){
  const c=CAT[cat];
  const sz=sm?11:12;
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:c.bg,color:c.color,borderRadius:5,padding:sm?'2px 7px':'3px 9px',fontSize:sz,fontWeight:700,flex:'none',whiteSpace:'nowrap'}}>
      <i className={'bi '+c.icon} style={{fontSize:sm?10:11,lineHeight:1}}></i>{c.label}
    </span>
  );
}
function CatStrip({cat}){
  /* vertical left-border style used in list rows */
  const c=CAT[cat];
  return <span style={{width:3,alignSelf:'stretch',background:c.strip,borderRadius:2,flex:'none',minHeight:18}}></span>;
}
function WtTag({w,approved}){

function Card({children,style}){

  return <button onClick={onClick} style={{...base,...vars[variant],...style}}>{children}</button>;
}
function Lbl({children,style}){return <div style={{fontSize:12,fontWeight:600,color:'#6b7785',marginBottom:5,...style}}>{children}</div>;}
function Inp({value,onChange,placeholder,style,disabled}){
  return <input value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} style={{border:'1px solid #dde1e8',borderRadius:7,padding:'7px 10px',fontSize:13,outline:'none',width:'100%',background:disabled?'#f7f9fb':'#fff',...style}}/>;
}
function Txta({value,onChange,placeholder,rows,style}){

function Sel({value,onChange,children,style}){

}
function TBtn({bi,label,onClick,active}){

function GChip({val,placeholder}){

/* ── MODE SWITCHER ── */
function ModeSwitcher({mode,setMode}){
  const tabs=[
    {id:'setup',   icon:'bi-pencil-square', label:'ตั้งต้น PA',  sub:'สร้าง · แก้ไข · ขออนุมัติ'},
    {id:'execute', icon:'bi-activity',       label:'ดำเนินการ',   sub:'ติดตาม · บันทึกความก้าวหน้า'},
    {id:'evaluate',icon:'bi-star',           label:'ประเมินผล',   sub:'ให้คะแนนตนเองแต่ละรอบ'},
  ];
  return (
    <div style={{display:'flex',gap:0,background:'#f1f3f6',borderRadius:8,padding:3,width:'fit-content',marginBottom:18}}>
      {tabs.map(t=>{
        const on=mode===t.id;
        return (
          <button key={t.id} onClick={()=>setMode(t.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 16px',borderRadius:6,background:on?'#fff':'transparent',border:'none',cursor:'pointer',boxShadow:on?'0 1px 3px rgba(16,24,40,.1)':undefined,transition:'all .15s'}}>
            <i className={'bi '+t.icon} style={{fontSize:15,color:on?primary:'#8a93a3'}}></i>
            <div style={{textAlign:'left'}}>
              <div style={{fontWeight:700,fontSize:13,color:on?primary:'#5a6473',lineHeight:1.2}}>{t.label}</div>
              <div style={{fontSize:11,color:'#9aa3af',lineHeight:1.2}}>{t.sub}</div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

    <div>

        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          {[1,2,3,4,5].map(n=>(
            <button key={n} onClick={()=>setScore(n)} style={{width:56,height:56,borderRadius:7,border:'2px solid '+(score===n?primary:'#dde1e8'),background:score===n?primarySoft:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,color:score===n?primary:'#5a6473',cursor:'pointer',gap:2}}>
              {n}
              <span style={{fontSize:9,fontWeight:500,color:score===n?primary:'#b0b8c4',lineHeight:1}}>{['ต่ำ','พอใช้','ผ่าน','ดี','ดีมาก'][n-1]}</span>
            </button>
          ))}
          {score&&<div style={{marginLeft:4}}>
            <div style={{fontSize:13,fontWeight:700,color:primary}}>{score}/5</div>
            <div style={{fontSize:11.5,color:'#6b7785'}}>{SCORE_DESC[score]}</div>
          </div>}
        </div>
      </div>

      {/* Assessment fields */}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {FIELDS.map(({key,icon,label,placeholder,hint})=>(
          <div key={key}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <i className={'bi '+icon} style={{fontSize:13,color:'#8a93a3'}}></i>
              <span style={{fontSize:12,fontWeight:600,color:'#6b7785'}}>{label}</span>
            </div>
            <Txta value={f[key]} onChange={e=>upd(key,e.target.value)} placeholder={placeholder} rows={2}/>
            {hint&&<div style={{fontSize:11.5,color:'#9aa3af',marginTop:4,fontStyle:'italic'}}>{hint}</div>}
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ══════════════════════════════════════════════

        <div style={{flex:1}}></div>

          <div style={{display:'flex',gap:0,background:'#f1f3f6',borderRadius:7,padding:2,width:'fit-content'}}>

                ครั้งที่ {r.no}
                {scores[r.id]&&<span style={{background:primary,color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:11,fontWeight:700}}>{scores[r.id]}</span>}
              </button>
            ))}
          </div>

          {/* KPIs for this round */}
          {kpis.length>0&&(
            <Card>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:'#3a4452',display:'flex',alignItems:'center',gap:6}}>

              {kpis.map(k=>(
                <div key={k.id} style={{padding:'9px 0',borderBottom:'1px solid #f5f7fa',display:'flex',alignItems:'center',gap:10}}>
                  <div style={{flex:1,fontSize:13,color:'#3a4452'}}>{k.desc}<span style={{color:'#9aa3af',fontSize:11.5,marginLeft:5}}>เป้า {k.target} {k.unit}</span></div>
                  <span style={{background:'#e3f3f0',color:'#0e7a6e',borderRadius:4,padding:'2px 7px',fontSize:11.5,fontWeight:700}}>{k.weight}%</span>
                  <span style={{background:k.type==='standard'?primarySoft:'#f0ebfe',color:k.type==='standard'?'#0e7a6e':'#5c2fa0',borderRadius:4,padding:'2px 7px',fontSize:11.5,fontWeight:700}}>{k.type==='standard'?'มาตรฐาน':'ระดับคะแนน'}</span>
                </div>
              ))}

          <SelfAssessForm selRound={selRound} scores={scores} setScores={setScores} item={item}/>

        <div style={{width:200,flex:'none',display:'flex',flexDirection:'column',gap:10}}>

              {icon:'bi-calendar-range',content:<div><div style={{fontSize:11,color:'#9aa3af'}}>ช่วงเวลา</div><div style={{fontSize:12,color:'#2b3440'}}>{item.start} – {item.end}</div></div>},

/* ══════════════════════════════════════════════
   ITEM EDIT / CREATE  (setup mode only)
══════════════════════════════════════════════ */
function ItemEditPanel({item,items,onBack,onSave,onGoKpi}){
  const [cat,setCat]=useState(item.cat);
  const [title,setTitle]=useState(item.title||'');
  const [detail,setDetail]=useState(item.detail||'');
  const [weight,setWeight]=useState(String(item.weight||0));
  const [start,setStart]=useState(item.start||'');
  const [end,setEnd]=useState(item.end||'');
  const [kpis,setKpis]=useState(item.kpis||{r1:[],r2:[]});
  const [openRounds,setOpenRounds]=useState({r1:true,r2:false});

  const usedWt=items.filter(x=>x.id!==item.id&&x.cat===cat).reduce((s,x)=>s+(x.weight||0),0);
  const curWt=parseInt(weight)||0;
  const totalUsed=usedWt+curWt;
  const frameWt=CAT_WT[cat];
  const over=totalUsed>frameWt;

  const save=()=>onSave({...item,cat,title,detail,weight:curWt,start,end,kpis,notes:item.notes||[]});

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473',fontSize:13.5,fontWeight:600,cursor:'pointer',border:'none',background:'none'}}>
          <i className="bi bi-arrow-left" style={{fontSize:14}}></i>รายละเอียด PA ปี {PA_YEAR}
        </button>
        <div style={{flex:1}}></div>
        <Btn onClick={save} variant="success"><i className="bi bi-check-lg" style={{fontSize:12}}></i>บันทึก</Btn>
        <Btn onClick={onBack} variant="ghost">ยกเลิก</Btn>
      </div>

      <Card style={{marginBottom:12}}>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:14,alignItems:'flex-end'}}>
          <div style={{minWidth:180}}>
            <Lbl>ประเภท PA</Lbl>
            <Sel value={cat} onChange={e=>setCat(e.target.value)}>
              <option value="business">อยู่ในแผนธุรกิจ</option>
              <option value="nonBusiness">ไม่อยู่ในแผนธุรกิจ</option>
              <option value="selfDev">พัฒนาตนเอง</option>
            </Sel>
          </div>
          <div>
            <Lbl>กรอบค่าน้ำหนัก</Lbl>
            <div style={{display:'inline-flex',background:'#22b573',color:'#fff',borderRadius:6,padding:'7px 13px',fontSize:13,fontWeight:700}}>{frameWt}%</div>
          </div>
          <div>
            <Lbl>ค่าน้ำหนักรายการนี้ (%)</Lbl>
            <Inp value={weight} onChange={e=>setWeight(e.target.value)} style={{width:90}} placeholder="0"/>
          </div>
          <div>
            <Lbl>ใช้ไปแล้ว (รวมรายการนี้)</Lbl>
            <div style={{display:'inline-flex',background:over?'#fdeaea':'#eaf1fe',color:over?'#d83a3a':'#2b5ec7',borderRadius:6,padding:'7px 13px',fontSize:13,fontWeight:700}}>{totalUsed}%{over&&' ⚠'}</div>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <Lbl>ชื่อรายการ</Lbl>
          <Inp value={title} onChange={e=>setTitle(e.target.value)} placeholder="ระบุชื่อรายการ PA..."/>
        </div>
        <div style={{marginBottom:12}}>
          <Lbl>รายละเอียด</Lbl>
          <Txta value={detail} onChange={e=>setDetail(e.target.value)} placeholder="อธิบายรายละเอียด..." rows={3}/>
        </div>
        <div style={{marginBottom:item.biz?12:0}}>
          <Lbl>ช่วงเวลาดำเนินการ</Lbl>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <Inp value={start} onChange={e=>setStart(e.target.value)} placeholder="dd/MM/yyyy" style={{width:150}}/>
            <span style={{color:'#9aa3af',fontWeight:600}}>–</span>
            <Inp value={end} onChange={e=>setEnd(e.target.value)} placeholder="dd/MM/yyyy" style={{width:150}}/>
          </div>
        </div>
        {item.biz&&(
          <div style={{background:'#f7f9fb',borderRadius:8,padding:'10px 13px',marginTop:12}}>
            <div style={{fontSize:12.5,fontWeight:600,color:'#5a6473',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
              <i className="bi bi-bar-chart" style={{color:primary}}></i>สนับสนุนงานแผนธุรกิจ
            </div>
            <StratBar strat={item.biz.strat} resp={item.biz.resp}/>
          </div>
        )}
      </Card>

      <Card>
        <div style={{display:'flex',alignItems:'center',gap:6,fontWeight:600,fontSize:13,marginBottom:12,color:'#3a4452'}}>
          <i className="bi bi-ui-checks" style={{color:primary}}></i>ตัวชี้วัดและเกณฑ์การประเมินผล
        </div>
        {ROUNDS.map(r=>{
          const rKpis=kpis[r.id]||[];
          const isOpen=openRounds[r.id];
          return (
            <div key={r.id} style={{marginBottom:8,border:'1px solid #eceef2',borderRadius:8,overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'#fafbfc',cursor:'pointer'}} onClick={()=>setOpenRounds(p=>({...p,[r.id]:!p[r.id]}))}>
                <i className="bi bi-calendar-event" style={{fontSize:12,color:'#9aa3af'}}></i>
                <span style={{fontWeight:600,fontSize:13,flex:1}}>{r.label}<span style={{color:'#9aa3af',fontWeight:400,fontSize:12,marginLeft:5}}>({r.start} – {r.end})</span></span>
                <button onClick={e=>{e.stopPropagation();onGoKpi(item.id,r.id,null);}} style={{width:26,height:26,borderRadius:6,border:'1px solid #dde1e8',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',color:primary,cursor:'pointer'}}>
                  <i className="bi bi-plus-lg" style={{fontSize:12}}></i>
                </button>
                <i className={'bi bi-chevron-'+(isOpen?'up':'down')} style={{fontSize:11,color:'#9aa3af'}}></i>
              </div>
              {isOpen&&(
                <div style={{padding:'4px 12px 8px'}}>
                  {rKpis.length===0&&<div style={{color:'#9aa3af',fontSize:12.5,textAlign:'center',padding:'8px 0'}}>กด <strong>+</strong> เพื่อเพิ่มตัวชี้วัด</div>}
                  {rKpis.map((k,ki)=>(
                    <div key={k.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid #f5f7fa'}}>
                      <div style={{flex:1,fontSize:13,color:'#3a4452'}}>{k.desc||'ตัวชี้วัดใหม่'}</div>
                      <span style={{background:'#e3f3f0',color:'#0e7a6e',borderRadius:4,padding:'2px 7px',fontSize:11.5,fontWeight:700}}>{k.weight}%</span>
                      <button onClick={()=>onGoKpi(item.id,r.id,k.id)} style={{color:primary,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'none',display:'flex',alignItems:'center',gap:3}}>
                        <i className="bi bi-pencil" style={{fontSize:11}}></i>แก้ไข
                      </button>
                      <button onClick={()=>setKpis(p=>({...p,[r.id]:p[r.id].filter((_,i)=>i!==ki)}))} style={{color:'#d83a3a',cursor:'pointer',border:'none',background:'none'}}>
                        <i className="bi bi-trash" style={{fontSize:12}}></i>
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ══════════════════════════════════════════════
   KPI EDIT
══════════════════════════════════════════════ */
function KpiEditPanel({ctx,items,setItems,onBack}){
  const {itemId,rId,kId}=ctx;
  const item=items.find(x=>x.id===itemId);
  const round=ROUNDS.find(r=>r.id===rId);
  const exist=kId?(item.kpis[rId]||[]).find(k=>k.id===kId):null;

  const [desc,setDesc]=useState(exist?.desc||'');
  const [target,setTarget]=useState(exist?.target||'100');
  const [unit,setUnit]=useState(exist?.unit||'%');
  const [weight,setWeight]=useState(exist?.weight||'100');
  const [type,setType]=useState(exist?.type||'standard');
  const [std0op,setStd0op]=useState(exist?.std0op||'<');
  const [std0val,setStd0val]=useState(exist?.std0val||'100');
  const [std5op,setStd5op]=useState(exist?.std5op||'=');
  const [std5val,setStd5val]=useState(exist?.std5val||'100');
  const [g2,setG2]=useState(exist?.g2||'');
  const [g3,setG3]=useState(exist?.g3||'');
  const [g4,setG4]=useState(exist?.g4||'');

  const save=()=>{
    const kpi={id:kId||uid(),desc,target,unit,weight,type,std0op,std0val,std5op,std5val,g2,g3,g4};
    setItems(prev=>prev.map(x=>{
      if(x.id!==itemId) return x;
      const cur=x.kpis[rId]||[];
      const next=kId?cur.map(k=>k.id===kId?kpi:k):[...cur,kpi];
      return {...x,kpis:{...x.kpis,[rId]:next}};
    }));
    onBack();
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473',fontSize:13.5,fontWeight:600,cursor:'pointer',border:'none',background:'none'}}>
          <i className="bi bi-arrow-left" style={{fontSize:14}}></i>ตัวชี้วัดและเกณฑ์ประเมินผล
        </button>
        <div style={{flex:1}}></div>
        <Btn onClick={save} variant="success"><i className="bi bi-check-lg" style={{fontSize:12}}></i>บันทึก</Btn>
        <Btn onClick={onBack} variant="ghost">ยกเลิก</Btn>
      </div>

      <div style={{background:'#5b51d8',color:'#fff',borderRadius:8,padding:'10px 15px',marginBottom:12,fontWeight:700,fontSize:13.5}}>
        {round?.label} ({round?.start} – {round?.end})
      </div>

      <Card style={{marginBottom:12}}>
        <div style={{marginBottom:12}}>
          <Lbl>รายละเอียดตัวชี้วัด</Lbl>
          <Txta value={desc} onChange={e=>setDesc(e.target.value)} placeholder="อธิบายตัวชี้วัดนี้..." rows={3}/>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',gap:12,flexWrap:'wrap'}}>
          <div><Lbl>เป้าหมาย</Lbl><Inp value={target} onChange={e=>setTarget(e.target.value)} style={{width:100}}/></div>
          <div><Lbl>หน่วยนับ</Lbl><Inp value={unit} onChange={e=>setUnit(e.target.value)} style={{width:100}}/></div>
          <div style={{flex:1}}></div>
          <div><Lbl>ค่าน้ำหนัก (%)</Lbl><Inp value={weight} onChange={e=>setWeight(e.target.value)} style={{width:100}}/></div>
        </div>
      </Card>

      <Card>
        <div style={{fontWeight:600,fontSize:13,marginBottom:14,color:'#3a4452'}}>กำหนดเกณฑ์ประเมินผล</div>
        <div style={{display:'flex',gap:22,marginBottom:16}}>
          {[['standard','เกณฑ์มาตรฐาน (ผ่าน/ไม่ผ่าน)'],['level','เกณฑ์ตามระดับคะแนน']].map(([val,lbl])=>(
            <label key={val} style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:13}}>
              <input type="radio" name="kpitype" checked={type===val} onChange={()=>setType(val)} style={{accentColor:primary,width:15,height:15}}/>{lbl}
            </label>
          ))}
        </div>
        {type==='standard'&&(
          <div style={{display:'grid',gridTemplateColumns:'52px 1fr',gap:'10px 12px',alignItems:'center',fontSize:13}}>
            <div style={{fontWeight:600,color:'#6b7785',fontSize:12}}>คะแนน</div>
            <div style={{fontWeight:600,color:'#6b7785',fontSize:12}}>เกณฑ์ตรวจสอบ</div>
            <div style={{fontWeight:700,fontSize:15,textAlign:'center',color:'#d83a3a'}}>0</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <OpSel value={std0op} onChange={setStd0op}/><Inp value={std0val} onChange={e=>setStd0val(e.target.value)} style={{width:88}}/><span style={{color:'#9aa3af'}}>{unit}</span>
            </div>
            <div style={{fontWeight:700,fontSize:15,textAlign:'center',color:'#22b573'}}>5</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <OpSel value={std5op} onChange={setStd5op}/><Inp value={std5val} onChange={e=>setStd5val(e.target.value)} style={{width:88}}/><span style={{color:'#9aa3af'}}>{unit}</span>
            </div>
          </div>
        )}
        {type==='level'&&(
          <div style={{display:'grid',gridTemplateColumns:'46px 1fr',gap:'10px 12px',alignItems:'center',fontSize:13}}>
            <div style={{fontWeight:600,color:'#6b7785',fontSize:12}}>คะแนน</div>
            <div style={{fontWeight:600,color:'#6b7785',fontSize:12}}>เกณฑ์</div>
            <div style={{fontWeight:700,fontSize:15,textAlign:'center',color:'#d83a3a'}}>0</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <select disabled style={{border:'1px solid #dde1e8',borderRadius:6,padding:'5px 7px',fontSize:13,background:'#f7f9fb',width:58}}><option>=</option></select>
              <Inp value="0" onChange={()=>{}} style={{width:76}} disabled/><span style={{color:'#9aa3af'}}>{unit}</span>
            </div>
            {[[1,'0',g2,setG2,'G2'],[2,g2,g3,setG3,'G3'],[3,g3,g4,setG4,'G4']].map(([sc,from,to,setTo,ph])=>(
              <React.Fragment key={sc}>
                <div style={{fontWeight:700,fontSize:15,textAlign:'center'}}>{sc}</div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{color:'#9aa3af',fontSize:13,width:16}}>{'>'}</span><GChip val={from}/><span style={{color:'#9aa3af',fontSize:12}}>ถึง</span>
                  <select disabled style={{border:'1px solid #dde1e8',borderRadius:6,padding:'5px 7px',fontSize:13,background:'#f7f9fb',width:58}}><option>{'<='}</option></select>
                  <Inp value={to} onChange={e=>setTo(e.target.value)} placeholder={ph} style={{width:76}}/><span style={{color:'#9aa3af'}}>{unit}</span>
                </div>
              </React.Fragment>
            ))}
            <div style={{fontWeight:700,fontSize:15,textAlign:'center'}}>4</div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>

function AdminListCard({children}){
  return <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:10,overflow:'hidden'}}>{children}</div>;
}
function AdminEmpty({children}){
  return <div style={{padding:22,textAlign:'center',color:'#9aa3af',fontSize:13}}>{children}</div>;
}
function AdminRowActions({confirming,confirmMsg,onEdit,onDelete,onConfirmDelete,onCancelDelete}){
  return confirming ? (
    <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'#fdeaea',borderRadius:9,padding:'4px 10px'}}>

    </div>
  ) : (
    <div style={{display:'flex',alignItems:'center',gap:8,flex:'none'}}>
      <button onClick={onEdit} title="แก้ไข" style={{width:28,height:28,borderRadius:7,border:'1px solid #bdd2f5',background:'#eaf1fe',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="bi bi-pencil-fill" style={{fontSize:12.5,color:'#2b5ec7'}}></i></button>

function AdminModalShell({title,onClose,onSave,canSave,children}){
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(16,24,40,.48)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99998,padding:'24px 16px'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:14,width:420,maxWidth:'100%',boxShadow:'0 24px 64px rgba(16,24,40,.28)',animation:'fadeIn .15s ease',maxHeight:'88vh',overflowY:'auto'}}>

          <Btn variant="success" style={{flex:1,justifyContent:'center',opacity:canSave?1:.5,cursor:canSave?'pointer':'default'}} onClick={()=>canSave&&onSave()}>บันทึก</Btn>
          <Btn variant="ghost" style={{flex:1,justifyContent:'center'}} onClick={onClose}>ยกเลิก</Btn>

}

function ScoreTab({person,onOpenLog}){
  const overall=computeOverall(person);
  const cols='1fr 64px 60px 60px 60px';
  let row=1;
  const cells=[];
  cells.push(<div key="hl3" style={{gridColumn:3,gridRow:row,textAlign:'center',fontSize:11.5,fontWeight:700,color:'#8a93a3'}}>ครั้งที่ 1</div>);
  cells.push(<div key="hl4" style={{gridColumn:4,gridRow:row,textAlign:'center',fontSize:11.5,fontWeight:700,color:'#8a93a3'}}>ครั้งที่ 2</div>);
  cells.push(<div key="hl5" style={{gridColumn:5,gridRow:row,textAlign:'center',fontSize:11.5,fontWeight:700,color:'#8a93a3'}}>ผลเฉลี่ย</div>);

  person.cats.forEach(c=>{
    row++;
    cells.push(
      <div key={'cat'+c.key} style={{gridColumn:'1 / -1',gridRow:row,display:'flex',alignItems:'center',gap:8,padding:'14px 0 8px'}}>
        <span style={{background:CAT[c.key].bg,color:'#fff',borderRadius:4,padding:'3px 10px',fontSize:12,fontWeight:700}}>{CAT[c.key].label}</span>
        <span style={{fontSize:12,color:'#9aa3af'}}>{c.items.reduce((s,i)=>s+i.weight,0)}% · {c.items.length} รายการ</span>
      </div>
    );
    c.items.forEach(it=>{
      row++;
      const f1=finalScore(it.r1),f2=finalScore(it.r2),avg=itemAvg(it);
      const selfScore=it.r1&&it.r1.self?it.r1.self.score:null;
      cells.push(<div key={it.id+'t'} style={{gridColumn:1,gridRow:row,padding:'8px 0',fontSize:13.5,color:'#2b3440',borderTop:'1px solid #f6f7f9'}}>{it.title}</div>);
      cells.push(<div key={it.id+'w'} style={{gridColumn:2,gridRow:row,display:'flex',alignItems:'center',borderTop:'1px solid #f6f7f9'}}><span style={{fontSize:11.5,fontWeight:700,color:'#8a93a3',background:'#f1f3f6',borderRadius:4,padding:'2px 8px'}}>{it.weight}%</span></div>);
      cells.push(<div key={it.id+'r1'} style={{gridColumn:3,gridRow:row,display:'flex',alignItems:'center',justifyContent:'center',borderTop:'1px solid #f6f7f9'}}><ScoreDot score={f1} color={scoreColor(f1,selfScore)} onClick={f1!=null?()=>onOpenLog(it,'r1'):null}/></div>);
      cells.push(<div key={it.id+'r2'} style={{gridColumn:4,gridRow:row,display:'flex',alignItems:'center',justifyContent:'center',borderTop:'1px solid #f6f7f9'}}><ScoreDot score={f2} color={scoreColor(f2,f1)} onClick={f2!=null?()=>onOpenLog(it,'r2'):null}/></div>);
      cells.push(<div key={it.id+'avg'} style={{gridColumn:5,gridRow:row,display:'flex',alignItems:'center',justifyContent:'center',borderTop:'1px solid #f6f7f9'}}><ScoreDot score={avg} color="green"/></div>);
    });
  });
  row++;
  cells.push(<div key="fend" style={{gridColumn:'1 / 3',gridRow:row,textAlign:'right',fontWeight:700,fontSize:13.5,color:'#2b3440',padding:'16px 12px 0 0'}}>สรุปผลการประเมิน</div>);
  cells.push(<div key="favg" style={{gridColumn:5,gridRow:row,display:'flex',alignItems:'center',justifyContent:'center',paddingTop:12}}><ScoreDot score={overall} color="green" size={34}/></div>);

  return <div style={{display:'grid',gridTemplateColumns:cols,columnGap:8}}>{cells}</div>;
}

        </div>

            )}

            {view==='kpi-edit'&&kpiCtx&&(
              <KpiEditPanel ctx={kpiCtx} items={items} setItems={setItems} onBack={()=>setView(editData?'item-edit':'item-view')}/>
            )}

            {view==='admin-cat'&&(
              <AdminCategoryView list={catList} onAdd={()=>setCatModal({})} onEdit={c=>setCatModal(c)} onDelete={id=>setCatList(p=>p.filter(x=>x.id!==id))}/>
            )}
            {view==='admin-weight'&&(
              <AdminWeightView list={weightList} cats={catList.filter(c=>c.enabled)} year={weightYear} setYear={setWeightYear} onAdd={()=>setWeightModal({})} onEdit={w=>setWeightModal(w)}/>
            )}
            {view==='admin-sched'&&(
              <AdminScheduleView list={schedList} year={schedYear} setYear={setSchedYear} onAdd={()=>setSchedModal({})} onEdit={s=>setSchedModal(s)} onDelete={id=>setSchedList(p=>p.filter(x=>x.id!==id))}/>
            )}
            {view==='admin-summary'&&(
              <SummaryListView people={SUMMARY_PEOPLE} dept={summaryDept} setDept={setSummaryDept} year={summaryYear} setYear={setSummaryYear} onOpen={id=>{setSummaryPersonId(id);setView('admin-summary-detail');}}/>
            )}
            {view==='admin-summary-detail'&&summaryPersonId&&(
              <SummaryDetailView person={SUMMARY_PEOPLE.find(p=>p.id===summaryPersonId)} onBack={()=>setView('admin-summary')} onOpenLog={(it,rnd)=>setLogCtx({item:it,round:rnd})}/>
            )}
          </div>
        </div>

      {catModal&&<CategoryModal data={catModal} onClose={()=>setCatModal(null)} onSave={d=>{setCatList(p=>p.some(x=>x.id===d.id)?p.map(x=>x.id===d.id?d:x):[...p,{...d,id:uid()}]);setCatModal(null);}}/>}
      {weightModal&&<WeightModal data={weightModal} cats={catList.filter(c=>c.enabled)} year={weightYear} onClose={()=>setWeightModal(null)} onSave={d=>{setWeightList(p=>p.some(x=>x.id===d.id)?p.map(x=>x.id===d.id?d:x):[...p,{...d,id:uid()}]);setWeightModal(null);}}/>}
      {schedModal&&<ScheduleModal data={schedModal} year={schedYear} onClose={()=>setSchedModal(null)} onSave={d=>{setSchedList(p=>{if(p.some(x=>x.id===d.id))return p.map(x=>x.id===d.id?d:x);const yearItems=p.filter(x=>x.year===d.year);const counts={};yearItems.forEach(x=>{counts[x.round]=(counts[x.round]||0)+1;});const nums=Object.keys(counts).map(Number);let round=1;if(nums.length){const last=Math.max(...nums);round=counts[last]<3?last:last+1;}return [...p,{...d,id:uid(),round}];});setSchedModal(null);}}/>}
      {logCtx&&<LogModal item={logCtx.item} round={logCtx.round} onClose={()=>setLogCtx(null)}/>}
    </GD5AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(async function(){
  var shellSrc='';
  try{ shellSrc=await (await fetch('gd5-app-shell.jsx')).text(); }catch(e){}
  var pageSrc=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(shellSrc+'\n'+pageSrc,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
