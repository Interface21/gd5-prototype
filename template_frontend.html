<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GiveD5 - Template Frontend</title>
  <meta name="description" content="GiveD5 Template Frontend">

  <!-- Quasar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/quasar@2.14.0/dist/quasar.prod.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* ===== CSS Variables ===== */
    :root {
      --wee-main-bg-color: #fafbfc;
      --wee-main-border-color: #dcdcdc;
      --wee-main-border-light-color: #ededed;
      --wee-text-muted: #6b7982;
      --v-main-text-body: #000000;
      --v-main-text-head: #1a2d39;
      --second-bg-color: #fff;
      --primary: #15a08f;
    }

    body {
      font-family: "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      background-color: var(--wee-main-bg-color) !important;
      color: var(--v-main-text-body);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 400;
    }

    /* ===== Header ===== */
    .q-header {
      background: #ffffff !important;
      border-bottom: 1px solid var(--wee-main-border-color);
      color: var(--v-main-text-head) !important;
    }

    .search-input { width: 280px; }
    .search-input .q-field__control {
      border-radius: 20px !important;
      background: #f0f2f5;
      height: 38px;
    }
    .search-input .q-field__control:before { border: none !important; }

    /* ===== Left drawer ===== */
    .drawer-item {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      margin: 0 auto 6px;
      cursor: pointer;
      transition: background 0.2s;
      color: #6b7982;
    }
    .drawer-item:hover { background: #e6f7f5; color: #15a08f; }
    .drawer-item.active { background: #e6f7f5; color: #15a08f; }
    
    /* ===== Content Section ===== */
    .content-box {
      background: white;
      border-radius: 10px;
      border: 1px solid var(--wee-main-border-light-color);
      padding: 20px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
<style id="gd5-proto-style">@keyframes gd5dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}</style>
<div id="gd5-proto-badge" style="position:fixed;bottom:20px;left:20px;z-index:99999;display:flex;align-items:center;gap:9px;padding:10px 22px 10px 16px;background:rgba(225,235,242,0.62);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1.5px solid rgba(180,205,220,0.55);border-radius:10px;box-shadow:0 8px 32px rgba(16,24,40,0.13),0 1.5px 4px rgba(16,24,40,0.07),inset 0 1px 0 rgba(255,255,255,0.75);font-family:'IBM Plex Sans Thai',sans-serif;user-select:none;pointer-events:none;">
  <span style="width:8px;height:8px;border-radius:50%;background:#15a08f;flex:none;animation:gd5dot 2.4s ease-in-out infinite;box-shadow:0 0 0 3px rgba(21,160,143,0.2)"></span>
  <span style="font-size:12px;font-weight:700;color:rgba(18,30,44,0.65);letter-spacing:0.8px;text-transform:uppercase">Prototype</span>
  <span style="width:1px;height:13px;background:rgba(18,30,44,0.15);flex:none"></span>
  <span style="font-size:11.5px;font-weight:500;color:rgba(18,30,44,0.45);letter-spacing:0.2px">GiveD5</span>
</div>
  <div id="q-app">
    <q-layout view="hHh LpR fFf">

      <!-- ===== HEADER (บาร์ด้านบน) ===== -->
      <q-header class="q-px-md q-py-xs" flat>
        <q-toolbar>
          <div class="row items-center cursor-pointer q-mr-lg" onclick="window.location.href='dashboard.html'">
            <img src="image/logo.png" style="height: 36px; object-fit: contain;" alt="Logo">
          </div>

          <q-input dense standout="bg-white text-primary" v-model="search" placeholder="ค้นหา" class="search-input">
            <template v-slot:prepend>
              <q-icon name="bi-search" color="grey-6"></q-icon>
            </template>
          </q-input>

          <q-space></q-space>

          <div class="row items-center q-gutter-x-xs">
            <q-btn round flat icon="bi-bell" color="grey-8" size="md">
              <q-badge color="red" floating label="3"></q-badge>
            </q-btn>
            <q-btn round flat icon="bi-chat" color="grey-8" size="md">
              <q-badge color="red" floating label="7"></q-badge>
            </q-btn>
            <q-btn flat color="grey-8" size="sm">
              <q-icon name="bi-globe" class="q-mr-xs"></q-icon> ไทย
              <q-icon name="bi-chevron-down" size="16px"></q-icon>
            </q-btn>

            <div class="row items-center q-ml-sm cursor-pointer">
              <div class="column items-end q-mr-sm" style="line-height: 1.3;">
                <span class="text-weight-bold text-body2">Piyawat Takaew</span>
                <span class="text-caption text-grey-6">SA Staff</span>
              </div>
              <q-avatar size="36px" style="background:#15a08f;color:#fff;font-weight:700">P</q-avatar>
              <q-icon name="bi-chevron-down" color="grey-6" size="16px" class="q-ml-xs"></q-icon>
            </div>
          </div>
        </q-toolbar>
      </q-header>

      <!-- ===== LEFT DRAWER (เมนูซ้าย) ===== -->
      <q-drawer v-model="leftDrawerOpen" show-if-above mini :mini-width="60" class="bg-white" style="border-right: 1px solid #ededed;">
        <div class="q-pt-md q-pb-sm text-center">
          <q-avatar size="34px" class="cursor-pointer" style="background:#15a08f;color:#fff;font-weight:700">P</q-avatar>
        </div>
        <div class="q-mt-sm">
          <div class="drawer-item active"><q-icon name="bi-layout-sidebar" size="22px"></q-icon></div>
          <a href="org-dashboard.html" class="drawer-item" style="text-decoration:none;"><q-icon name="bi-graph-up" size="22px"></q-icon></a>
          <a href="assignee-action-list.html" class="drawer-item" style="text-decoration:none;"><q-icon name="bi-arrow-down-left" size="22px"></q-icon></a>
          <a href="commander-action-dashboard.html" class="drawer-item" style="text-decoration:none;"><q-icon name="bi-arrow-up-right" size="22px"></q-icon></a>
          <a href="user-virtual-meeting.html" class="drawer-item" style="text-decoration:none;"><q-icon name="bi-easel" size="22px"></q-icon></a>
          <div class="drawer-item"><q-icon name="bi-file-earmark-arrow-down" size="22px"></q-icon></div>
          <div class="drawer-item"><q-icon name="bi-book" size="22px"></q-icon></div>
          <a href="business-plan-responsible-list.html" class="drawer-item"><q-icon name="bi-clipboard-data" size="22px"></q-icon></a>
          <div class="drawer-item" style="margin: 8px auto 0 auto; background: #f0f2f5; border-radius: 50%; width: 36px; height: 36px;"><q-icon name="bi-chevron-down" size="20px"></q-icon></div>
        </div>
      </q-drawer>

      <!-- ===== MAIN CONTENT (พื้นที่เนื้อหาหลัก) ===== -->
      <q-page-container>
        <q-page class="q-pa-md" style="max-width: 1400px; margin: 0 auto;">
          <div class="text-h6 text-weight-bold" style="color: var(--v-main-text-head);">Page Title</div>
          <div class="content-box">
             <!-- เนื้อหาของเพจจะอยู่ที่นี่ -->
             <p>This is your content area.</p>
          </div>
        </q-page>
      </q-page-container>

    </q-layout>
  </div>

  <!-- Vue 3 + Quasar UMD -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quasar@2.14.0/dist/quasar.umd.prod.js"></script>
  <script>
    const app = Vue.createApp({
      setup() {
        const { ref } = Vue
        return {
          leftDrawerOpen: ref(true),
          search: ref('')
        }
      }
    })
    
    app.use(Quasar, {
      config: {
        brand: {
          primary: '#15a08f',
          secondary: '#26A69A',
          accent: '#9C27B0',
          positive: '#21BA45',
          negative: '#C10015',
          info: '#31CCEC',
          warning: '#F2C037'
        }
      }
    })
    app.mount('#q-app')
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/quasar@2.14.0/dist/icon-set/bootstrap-icons.umd.prod.js"></script>
  <script>
    Quasar.iconSet.set(Quasar.iconSet.bootstrapIcons);
  </script>
</body>
</html>
