/* ──────────────────────────────────────────
   Gauge Chart — D3.js (same engine as react-gauge-chart)
   Semi-circle, coloured zone segments, needle, value text
────────────────────────────────────────── */
function GaugeChart({value,target,zones}){
  const ref=React.useRef(null);

  const fmt=n=>{
    if(n===0)return'0';
    if(n>=1e8)return Math.round(n/1e6)+'M';
    if(n>=1e6)return parseFloat((n/1e6).toFixed(1))+'M';
    if(n>=1e3)return Math.round(n/1e3)+'K';
    return n%1!==0?parseFloat(n.toFixed(1))+'':n+'';
  };

  React.useEffect(()=>{
    if(!ref.current||!window.d3)return;
    const d3=window.d3;
    const el=ref.current;
    el.innerHTML='';

    const W=el.clientWidth||240;
    const H=Math.round(W*0.58);
    const cx=W/2, cy=Math.round(H*0.9);
    const ro=Math.round(W*0.43);
    const ri=Math.round(W*0.28);

    const svg=d3.select(el).append('svg')
      .attr('width','100%').attr('height',H)
      .attr('viewBox',`0 0 ${W} ${H}`);

    /* arc generator — D3 angles: 0=12 o'clock, clockwise */
    const arc=d3.arc().innerRadius(ri).outerRadius(ro).cornerRadius(2);

    /* background track */
    svg.append('path')
      .attr('d',arc({startAngle:-Math.PI/2,endAngle:Math.PI/2}))
      .attr('fill','#e9eaed')
      .attr('transform',`translate(${cx},${cy})`);

    /* coloured zone segments */
    zones.forEach(([p1,p2,color])=>{
      const startAngle=-Math.PI/2+p1*Math.PI;
      const endAngle=-Math.PI/2+p2*Math.PI;
      svg.append('path')
        .attr('d',arc({startAngle,endAngle}))
        .attr('fill',color)
        .attr('transform',`translate(${cx},${cy})`);
    });

    /* needle */
    const pct=target>0?Math.min(value/target,1):0;
    /* math angle: 0%=left(π), 100%=right(0) */
    const nAngle=Math.PI*(1-pct);
    const nLen=ro-6;
    const nx=cx+nLen*Math.cos(nAngle);
    const ny=cy-nLen*Math.sin(nAngle);

    svg.append('line')
      .attr('x1',cx).attr('y1',cy).attr('x2',nx).attr('y2',ny)
      .attr('stroke','#6b7280').attr('stroke-width',2.5).attr('stroke-linecap','round');
    svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',6).attr('fill','#6b7280');
    svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',2.5).attr('fill','white');

    /* value text */
    svg.append('text')
      .attr('x',cx).attr('y',cy-20).attr('text-anchor','middle')
      .attr('font-size','26px').attr('font-weight','700')
      .attr('fill','#1a2332').attr('font-family','IBM Plex Sans Thai,sans-serif')
      .text(fmt(value));

    /* scale labels */
    if(target>0){
      svg.append('text').attr('x',cx).attr('y',12).attr('text-anchor','middle')
        .attr('font-size','9px').attr('fill','#b3bac4')
        .attr('font-family','IBM Plex Sans Thai,sans-serif').text(fmt(target*.5));
      svg.append('text').attr('x',W-2).attr('y',cy+14).attr('text-anchor','end')
        .attr('font-size','9px').attr('fill','#b3bac4')
        .attr('font-family','IBM Plex Sans Thai,sans-serif').text(fmt(target));
      svg.append('text').attr('x',2).attr('y',cy+14).attr('text-anchor','start')
        .attr('font-size','9px').attr('fill','#b3bac4')
        .attr('font-family','IBM Plex Sans Thai,sans-serif').text('0');
    }
  },[value,target,zones]);

  return <div ref={ref} style={{width:'100%'}}></div>;
}

/* ──────────────────────────────────────────
   KPI Card
────────────────────────────────────────── */
function KpiCard({kpi}){
  const {type,typeIcon,typeColor,typeBg,name,value,target,unit,zones}=kpi;
  const pct=target>0?Math.min(value/target*100,100):0;
  const fmtFull=n=>n%1!==0?parseFloat(n.toFixed(1)).toLocaleString():n.toLocaleString();

  return (
    <div className="kpi-card" style={{background:'#fff',border:'1px solid #eceef2',borderRadius:16,
      padding:'14px 16px 16px',boxShadow:'0 1px 4px rgba(16,24,40,.05)',display:'flex',flexDirection:'column'}}>

      {/* card header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
        <div style={{width:30,height:30,borderRadius:8,background:'#f4f6f8',display:'flex',alignItems:'center',
          justifyContent:'center',cursor:'pointer',flex:'none'}}>
          <i className="bi bi-sliders" style={{fontSize:14,color:'#8a93a3'}}></i>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:typeBg,display:'flex',
            alignItems:'center',justifyContent:'center',flex:'none'}}>
            <i className={'bi '+typeIcon} style={{fontSize:14,color:typeColor}}></i>
          </div>
          <span style={{fontSize:12,fontWeight:600,color:'#5a6473'}}>{type}</span>
          <i className="bi bi-info-circle" style={{fontSize:13,color:'#d1d5db',cursor:'pointer'}}></i>
        </div>
      </div>

      {/* gauge */}
      <div style={{padding:'0 2px',marginBottom:2}}>
        <GaugeChart value={value} target={target} zones={zones}/>
      </div>

      {/* KPI name */}
      <div style={{display:'flex',alignItems:'flex-start',gap:7,marginBottom:8}}>
        <i className="bi bi-record-circle" style={{fontSize:14,color:'#9aa3af',marginTop:2,flex:'none'}}></i>
        <span style={{fontSize:12.5,color:'#374151',lineHeight:1.45,fontWeight:500}}>{name}</span>
      </div>

      {/* progress bar */}
      <div style={{height:5,background:'#f0f2f5',borderRadius:99,overflow:'hidden',marginBottom:8}}>
        <div style={{width:pct+'%',height:'100%',background:primary,borderRadius:99}}></div>
      </div>

      {/* value text */}
      <div style={{fontSize:13,color:primary,fontWeight:700}}>
        {fmtFull(value)} จาก {target>0?fmtFull(target):'0'} {unit}
      </div>
    </div>
  );
}
