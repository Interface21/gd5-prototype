<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คำสั่งที่สั่งไป — Dashboard — GiveDeeFive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{box-sizing:border-box}
.bi{vertical-align:-2px}
body{margin:0;font-family:'IBM Plex Sans Thai',sans-serif;color:#1f2733;background:#eef1f6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cfd6e0;border-radius:9px}
.nav-item:hover{background:#f3f5f8}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="jsx-src">
const {useState} = React;
const MS = {fontFamily:"'Material Symbols Rounded'"};
const primary='#15a08f', primarySoft='#e3f3f0';
const ms=(name,size,color,fill)=>(<span className="bi" style={{...MS,fontSize:size,color,...(fill?{fontVariationSettings:"'FILL' 1"}:{})}}>{name}</span>);

const STAT = [
  {label:'คำสั่งทั้งหมด',value:'0',unit:'คำสั่งการ',icon:'all_inbox',c1:'#9aa4b0',c2:'#828c99',sh:'rgba(130,140,153,.30)'},
  {label:'กำลังดำเนินการ',value:'0',unit:'คำสั่งการ',icon:'autorenew',c1:'#4eaae8',c2:'#2f93da',sh:'rgba(47,147,218,.32)'},
  {label:'เกินกำหนด',value:'0',unit:'คำสั่งการ',icon:'error',c1:'#f55b7c',c2:'#ea3b62',sh:'rgba(234,59,98,.30)'},
  {label:'ปิดคำสั่งการ',value:'0',unit:'คำสั่งการ',icon:'task_alt',c1:'#2ec873',c2:'#1cab60',sh:'rgba(28,171,96,.30)'},
  {label:'อัตราความสำเร็จ',value:'-',unit:'เปอร์เซ็นต์',icon:'trending_up',c1:'#1fb6a6',c2:'#109385',sh:'rgba(16,147,133,.30)'},
  {label:'อัตราการยกเลิก',value:'-',unit:'เปอร์เซ็นต์',icon:'cancel',c1:'#f56450',c2:'#e83e2c',sh:'rgba(232,62,44,.30)'},
];
const MONTHS = ['ม.ค./2026','ก.พ./2026','มี.ค./2026','เม.ย./2026','พ.ค./2026','มิ.ย./2026'];

function EmptyState({label}){
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:'46px 0',color:'#c4cbd4'}}>
      {ms('inventory_2',48,'#d4dae1')}
      <div style={{fontSize:13,color:'#aab2bd'}}>{label||'ไม่พบข้อมูล'}</div>
    </div>
  );
}

function Donut(){
  const segs=[{v:20,c:'#f5d34a',label:'รอรับทราบคำสั่ง (20%)'},{v:50,c:'#5bc5e8',label:'กำลังดำเนินการ (50%)'},{v:30,c:'#22b96a',label:'ปิดงาน (30%)'}];
  const C=2*Math.PI*52; let off=0;
  const circles=segs.map((s,i)=>{const len=C*s.v/100;const el=(<circle key={i} r="52" cx="90" cy="90" fill="none" stroke={s.c} strokeWidth="24" strokeDasharray={len+' '+(C-len)} strokeDashoffset={-off}/>);off+=len;return el;});
  return (
    <div style={{display:'flex',alignItems:'center',gap:20,padding:'10px 4px',flexWrap:'wrap'}}>
      <svg viewBox="0 0 180 180" style={{width:166,height:166,flex:'none'}}>
        <g transform="rotate(-90 90 90)">{circles}</g>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:13}}>
        {segs.map((s,i)=>(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:9,fontSize:13,color:'#5a6473'}}><span style={{width:12,height:12,borderRadius:'50%',background:s.c}}></span>{s.label}</span>))}
      </div>
    </div>
  );
}

function Legend({items}){
  return (<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:18,marginTop:6,fontSize:12,color:'#7b8595'}}>{items.map((it,i)=>(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:11,height:11,borderRadius:3,background:it.c}}></span>{it.l}</span>))}</div>);
}

function StackedBars(){
  const data=[{m:'เดือน 7',g:16,r:6},{m:'เดือน 8',g:15,r:7},{m:'เดือน 9',g:16,r:5},{m:'เดือน 10',g:20,r:5},{m:'เดือน 11',g:12,r:2},{m:'เดือน 12',g:11,r:2}];
  const W=540,H=210,L=30,R=12,T=12,B=34,max=25;
  const pw=W-L-R,ph=H-T-B,band=pw/data.length,bw=30;
  const ys=[0,5,10,15,20,25];
  const yOf=v=>T+ph*(1-v/max);
  return (
   <div>
    <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
      {ys.map((v,i)=>(<g key={i}><line x1={L} y1={yOf(v)} x2={W-R} y2={yOf(v)} stroke="#eef1f5"/><text x={L-7} y={yOf(v)+4} textAnchor="end" fontSize="10.5" fill="#aab2bd" fontFamily="'IBM Plex Sans Thai'">{v}</text></g>))}
      {data.map((d,i)=>{const x=L+band*i+(band-bw)/2;const gy=yOf(d.g),ry=yOf(d.g+d.r),base=yOf(0);return (
        <g key={i}>
          <rect x={x} y={gy} width={bw} height={base-gy} fill="#22b96a" rx="3"/>
          <rect x={x} y={ry} width={bw} height={gy-ry} fill="#f0476b" rx="3"/>
          <text x={x+bw/2} y={H-12} textAnchor="middle" fontSize="10.5" fill="#8a93a3" fontFamily="'IBM Plex Sans Thai'">{d.m}</text>
        </g>
      );})}
    </svg>
    <Legend items={[{c:'#22b96a',l:'เสร็จก่อน/ตรงกำหนด'},{c:'#f0476b',l:'เสร็จล่าช้า'}]}/>
   </div>
  );
}

function Scatter(){
  const vals=[38,22,45,40,33,30,37,18,42,44,28,17];
  const ys=[50,40,30,20,10,0],max=50;
  return (
   <div style={{display:'flex',height:206,padding:'8px 0 4px'}}>
     <div style={{width:26,position:'relative',flex:'none'}}>
       {ys.map((v,i)=>(<span key={i} style={{position:'absolute',right:4,top:(1-v/max)*100+'%',transform:'translateY(-50%)',fontSize:10.5,color:'#aab2bd'}}>{v}</span>))}
     </div>
     <div style={{flex:1,position:'relative',borderLeft:'1px solid #eef1f5',borderBottom:'1px solid #eef1f5'}}>
       {ys.map((v,i)=>(<div key={i} style={{position:'absolute',left:0,right:0,top:(1-v/max)*100+'%',borderTop:'1px solid #f5f7f9'}}></div>))}
       {vals.map((v,i)=>(<div key={i} style={{position:'absolute',left:(4+(i/(vals.length-1))*92)+'%',top:(1-v/max)*100+'%',transform:'translate(-50%,-50%)',width:24,height:24,borderRadius:'50%',background:'#2b2f37',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('person',15,'#cfd3da')}</div>))}
     </div>
   </div>
  );
}

function StatusBars(){
  const data=[{l:'คำสั่งใหม่',v:16},{l:'กำลังดำเนินการ',v:52},{l:'รอปิดงาน',v:18},{l:'ปิดงานแล้ว',v:30},{l:'ปฏิเสธคำสั่ง',v:4},{l:'ยกเลิก',v:6}];
  const W=540,H=220,L=30,R=12,T=12,B=52,max=60;
  const pw=W-L-R,ph=H-T-B,band=pw/data.length,bw=34;
  const ys=[0,10,20,30,40,50,60];
  const yOf=v=>T+ph*(1-v/max);
  return (
    <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
      <defs><linearGradient id="tealbar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#74dbe2"/><stop offset="1" stopColor="#4ec9d2"/></linearGradient></defs>
      {ys.map((v,i)=>(<g key={i}><line x1={L} y1={yOf(v)} x2={W-R} y2={yOf(v)} stroke="#eef1f5"/><text x={L-7} y={yOf(v)+4} textAnchor="end" fontSize="10.5" fill="#aab2bd" fontFamily="'IBM Plex Sans Thai'">{v}</text></g>))}
      {data.map((d,i)=>{const x=L+band*i+(band-bw)/2;const y=yOf(d.v),base=yOf(0);return (
        <g key={i}>
          <rect x={x} y={y} width={bw} height={base-y} fill="url(#tealbar)" rx="4"/>
          <text x={x+bw/2} y={H-30} textAnchor="middle" fontSize="9" fill="#8a93a3" fontFamily="'IBM Plex Sans Thai'">{d.l}</text>
        </g>
      );})}
    </svg>
  );
}

function Card({icon,title,children,extra}){
  return (
    <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'16px 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:6,paddingBottom:12,borderBottom:'1px solid #f3f5f8'}}>
        {ms(icon,20,primary)}
        <div style={{fontWeight:600,fontSize:14,color:'#2b3440'}}>{title}</div>
        <div style={{flex:1}}></div>
        {extra}
      </div>
      {children}
    </div>
  );
}

function App(){
  const [range,setRange]=useState('ย้อนหลัง 30 วัน');
  const navTop=['เพิ่มการสั่งการใหม่','เพิ่มการสั่งการใหม่ PA','เพิ่มการสั่งการใหม่ WI'];
  const navList=[
    {icon:'bi-arrow-down-left',label:'คำสั่งที่ได้รับ',href:'assignee-action-list.html'},
    {icon:'bi-arrow-up-right',label:'คำสั่งที่สั่งไป',active:true,href:'commander-action-dashboard.html'},
    {icon:'bi-people',label:'คำสั่งที่ลูกทีมได้รับ',href:'#'},
    {icon:'bi-person-plus',label:'CC/BCC',href:'#'},
    {icon:'bi-search',label:'ค้นหาบันทึก/ความก้าวหน้า',href:'#'},
  ];

  return (
   <div style={{minHeight:'100vh',background:'#eef1f6'}}>
    {/* TOP BAR */}
    <div style={{height:58,background:'#fff',borderBottom:'1px solid #e7eaef',display:'flex',alignItems:'center',gap:18,padding:'0 18px',position:'sticky',top:0,zIndex:30}}>
      <a href="dashboard.html" style={{display:'flex',alignItems:'center'}}><img src="image/logo.png" style={{height:36,objectFit:'contain'}} alt="GiveDeeFive"/></a>
      <div style={{display:'flex',alignItems:'center',gap:8,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:10,padding:'9px 12px',width:280}}>
        <i className="bi bi-search" style={{fontSize:16,color:'#9aa3af'}}></i><span style={{color:'#9aa3af',fontSize:13}}>ค้นหา GiveDeeFive</span>
      </div>
      <div style={{flex:1}}></div>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-bell" style={{fontSize:21,color:'#5a6473'}}></i><span style={{position:'absolute',top:-2,right:-2,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>2</span></div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-chat" style={{fontSize:21,color:'#5a6473'}}></i></div>
      <div style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473'}}><i className="bi bi-globe" style={{fontSize:18}}></i><span style={{fontSize:13}}>ไทย</span><i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i></div>
      <i className="bi bi-moon" style={{fontSize:20,color:'#5a6473'}}></i>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingLeft:10,borderLeft:'1px solid #e7eaef'}}>
        <div style={{lineHeight:1.2,textAlign:'right'}}><div style={{fontWeight:700,fontSize:13.5}}>Piyawat Takaew</div><div style={{fontSize:11.5,color:'#8a93a3'}}>SA Staff</div></div>
        <div style={{width:38,height:38,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,flex:'none'}}>P</div>
        <i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i>
      </div>
    </div>

    <div style={{display:'flex'}}>
      {/* ICON RAIL */}
      <div style={{width:60,background:'#fff',borderRight:'1px solid #e7eaef',display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 0',position:'sticky',top:58,height:'calc(100vh - 58px)'}}>
        <div style={{width:34,height:34,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,marginBottom:6,flex:'none'}}>P</div>
        {[['bi-layout-sidebar',false,'dashboard.html'],['bi-graph-up',false,'org-dashboard.html'],['bi-arrow-down-left',false,'assignee-action-list.html'],['bi-arrow-up-right',true,'commander-action-dashboard.html'],['bi-easel',false,'user-virtual-meeting.html'],['bi-file-earmark-arrow-down'],['bi-book'],['bi-clipboard-data']].map(([ic,act,url],i)=> url ? (
          <a href={url} key={i} style={{textDecoration:'none',width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></a>
        ) : (
          <div key={i} style={{width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></div>
        ))}
        <div style={{width:36,height:36,borderRadius:'50%',background:'#f0f2f5',display:'flex',alignItems:'center',justifyContent:'center',marginTop:4}}><i className="bi bi-chevron-down" style={{fontSize:18,color:'#5a6473'}}></i></div>
      </div>

      {/* SECONDARY NAV */}
      <div style={{width:264,background:'#fff',borderRight:'1px solid #e7eaef',padding:'18px 14px',position:'sticky',top:58,height:'calc(100vh - 58px)',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {navTop.map((n,i)=>(
            <a key={i} href="#" className="nav-item" style={{display:'flex',alignItems:'center',gap:11,padding:'9px 10px',borderRadius:10}}>
              <span style={{width:26,height:26,borderRadius:8,background:'#e0322b',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i className="bi bi-plus-lg" style={{fontSize:14,color:'#fff'}}></i></span>
              <span style={{fontSize:13.5,fontWeight:600,color:'#3a4452'}}>{n}</span>
            </a>
          ))}
        </div>
        <div style={{height:1,background:'#eef0f4',margin:'13px 4px'}}></div>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {navList.map((n,i)=>(
            <a key={i} href={n.href} className="nav-item" style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:10,background:n.active?primarySoft:'transparent'}}>
              <i className={'bi '+n.icon} style={{fontSize:18,color:n.active?primary:'#8a93a3'}}></i>
              <span style={{fontSize:13.5,fontWeight:n.active?700:600,color:n.active?primary:'#5a6473'}}>{n.label}</span>
            </a>
          ))}
        </div>
        <div style={{flex:1}}></div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,padding:22,minWidth:0}}>
       <div style={{maxWidth:1320,margin:'0 auto',background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'20px 24px'}}>

        {/* HEADER */}
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:6}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('outbox',22,primary)}</div>
          <div style={{fontWeight:700,fontSize:20}}>คำสั่งที่สั่งไป</div>
          <span style={{display:'inline-flex',alignItems:'center',gap:7,background:'#eaf1fe',color:'#3b6fd4',borderRadius:8,padding:'5px 12px 5px 6px',fontSize:12.5,fontWeight:600}}>
            <span style={{minWidth:22,height:22,borderRadius:6,background:'#3b82f6',color:'#fff',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700,padding:'0 5px'}}>1</span>กำลังดำเนินการ
          </span>
          <div style={{flex:1}}></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <a href="commander-action-list.html" style={{width:38,height:34,borderRadius:9,border:'1px solid #e3e7ec',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>{ms('list',21,'#8a93a3')}</a>
            <a href="commander-action-dashboard.html" style={{width:38,height:34,borderRadius:9,border:'1px solid '+primary,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>{ms('bar_chart',21,primary)}</a>
          </div>
        </div>

        {/* RANGE */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:11,margin:'14px 0 14px'}}>
          <span style={{fontSize:13,color:'#8a93a3'}}>เลือกดูข้อมูล</span>
          <button style={{display:'inline-flex',alignItems:'center',gap:9,border:'1px solid #d3ece7',background:'#f3faf8',color:primary,borderRadius:9,padding:'8px 14px',fontSize:13,fontWeight:600}}>{range}{ms('expand_more',18,primary)}</button>
        </div>

        {/* STAT CARDS */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:13,marginBottom:18}}>
          {STAT.map((s,i)=>(
            <div key={i} style={{position:'relative',overflow:'hidden',background:'linear-gradient(150deg,'+s.c1+' 0%,'+s.c2+' 100%)',borderRadius:16,padding:'15px 15px 15px',color:'#fff',boxShadow:'0 7px 16px '+s.sh,minHeight:140,display:'flex',flexDirection:'column'}}>
              <span style={{position:'absolute',right:-16,bottom:-20,opacity:.15,lineHeight:0}}>{ms(s.icon,94,'#fff',true)}</span>
              <div style={{width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(s.icon,20,'#fff',true)}</div>
              <div style={{fontSize:13,fontWeight:600,opacity:.96,marginTop:11}}>{s.label}</div>
              <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:'auto'}}>
                <div style={{fontSize:36,fontWeight:700,lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:11.5,opacity:.9}}>{s.unit}</div>
              </div>
            </div>
          ))}
        </div>

        {/* CHART ROW 1 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card icon="donut_large" title="ติดตามสถานะงานแบบ Real-time">
            <Donut/>
          </Card>
          <Card icon="event_available" title="อัตรางานเสร็จตรงเวลา">
            <StackedBars/>
          </Card>
        </div>

        {/* CHART ROW 2 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <Card icon="groups" title="จำนวนคำสั่งแยกตามรายบุคคล">
            <Scatter/>
          </Card>
          <Card icon="bar_chart" title="จำนวนคำสั่งแยกตามสถานะคำสั่ง">
            <StatusBars/>
          </Card>
        </div>

       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  var src = document.getElementById('jsx-src').textContent;
  var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
