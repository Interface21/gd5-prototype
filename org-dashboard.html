function Donut({segments,size}){
  // segments: [{v,color}]; renders SVG donut
  const S=size||150, R=S/2, r=R*0.0; let acc=0; const tot=segments.reduce((s,x)=>s+x.v,0)||1;
  const arcs=segments.map((seg,i)=>{
    const a0=acc/tot*2*Math.PI, a1=(acc+seg.v)/tot*2*Math.PI; acc+=seg.v;
    const x0=R+R*Math.sin(a0), y0=R-R*Math.cos(a0), x1=R+R*Math.sin(a1), y1=R-R*Math.cos(a1);
    const large=(a1-a0)>Math.PI?1:0;
    if(segments.length===1) return <circle key={i} cx={R} cy={R} r={R} fill={seg.color}/>;
    return <path key={i} d={'M'+R+','+R+' L'+x0+','+y0+' A'+R+','+R+' 0 '+large+' 1 '+x1+','+y1+' Z'} fill={seg.color}/>;
  });
  const mid=segments.length===1?null:null;
  return <svg viewBox={'0 0 '+S+' '+S} style={{width:S,height:S}}>{arcs}</svg>;
}

      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-bell" style={{fontSize:21,color:'#5a6473'}}></i></div>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-chat" style={{fontSize:21,color:'#5a6473'}}></i><span style={{position:'absolute',top:-2,right:-2,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>10</span></div>
      <div style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473'}}><i className="bi bi-globe" style={{fontSize:18}}></i><span style={{fontSize:13}}>ไทย</span><i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i></div>
      <i className="bi bi-moon" style={{fontSize:20,color:'#5a6473'}}></i>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingLeft:10,borderLeft:'1px solid #e7eaef'}}>
        <div style={{lineHeight:1.2,textAlign:'right'}}><div style={{fontWeight:700,fontSize:13.5}}>Piyawat Takaew</div><div style={{fontSize:11.5,color:'#8a93a3'}}>SA Staff</div></div>
        <div style={{width:38,height:38,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,flex:'none'}}>P</div>
        <i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i>
      </div>
    </div>

    <div style={{display:'flex'}}>
      {/* ICON RAIL */}
      <div style={{width:60,background:'#fff',borderRight:'1px solid #e7eaef',display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 0',position:'sticky',top:58,height:'calc(100vh - 58px)'}}>
        <div style={{width:34,height:34,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,marginBottom:6,flex:'none'}}>P</div>
        {rail.map(([ic,act,url],i)=> url ? (
          <a href={url} key={i} style={{width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></a>
        ) : (
          <div key={i} style={{width:40,height:40,borderRadius:11,background:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:'#9aa3af'}}></i></div>
        ))}
        <div style={{width:36,height:36,borderRadius:'50%',background:'#f0f2f5',display:'flex',alignItems:'center',justifyContent:'center',marginTop:4}}><i className="bi bi-chevron-down" style={{fontSize:18,color:'#5a6473'}}></i></div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,padding:'20px 24px',minWidth:0}}>
       <div style={{maxWidth:1640,minWidth:1180,margin:'0 auto',display:'grid',gridTemplateColumns:'320px minmax(0,1fr) 300px',gap:20,alignItems:'start'}}>

        {/* ===== LEFT COLUMN ===== */}
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>{ms('domain',21,primary)}<span style={{fontWeight:700,fontSize:16}}>องค์กร</span></div>
            {ORG.map((o,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 0',borderTop:i?'1px solid #f3f5f8':'none'}}>
                <div style={{width:40,height:40,borderRadius:11,background:o.bg,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms(o.icon,21,o.ink)}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13.5,color:o.ink}}>{o.key}</div><div style={{fontSize:11.5,color:'#9aa3af'}}>{o.sub}</div></div>
                <div style={{textAlign:'right',flex:'none'}}>
                  <div style={{fontWeight:700,fontSize:17}}>{o.val}</div>
                  {o.up===null ? <div style={{fontSize:11,color:'#c2cad4'}}>0</div> :
                    <div style={{fontSize:11,fontWeight:600,color:o.up?GRN:RED,display:'flex',alignItems:'center',gap:1,justifyContent:'flex-end'}}>{ms(o.up?'arrow_drop_up':'arrow_drop_down',18,o.up?GRN:RED)}{o.delta}</div>}
                </div>
              </div>
            ))}
          </Card>

          {/* mission status graph (pie) */}
          <Card>
            <div style={{fontWeight:700,fontSize:14.5,marginBottom:12}}>กราฟสถานะ พันธกิจ</div>
            <div style={{display:'flex',justifyContent:'center',padding:'4px 0 12px'}}>
              <div style={{position:'relative'}}>
                <Donut segments={(()=>{const c={r:0,y:0,g:0};Q.missions.forEach(m=>c[m.status]++);const segs=[];if(c.r)segs.push({v:c.r,color:RED});if(c.y)segs.push({v:c.y,color:YEL});if(c.g)segs.push({v:c.g,color:GRN});return segs;})()} size={170}/>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:10,borderTop:'1px solid #f3f5f8'}}>{ms('desktop_windows',18,'#8a93a3')}<span style={{fontSize:12.5,color:'#5a6473'}}>ข้อมูลสรุปสถานะแต่ละพันธกิจ</span></div>
            <div style={{display:'flex',gap:7,marginTop:9}}>{Q.missions.map((m,i)=>(<span key={i} style={{width:15,height:15,borderRadius:'50%',background:dotC(m.status)}}></span>))}</div>
          </Card>
        </div>

        {/* ===== CENTER COLUMN ===== */}
        <div style={{display:'flex',flexDirection:'column',gap:18,minWidth:0}}>
          {/* team health */}
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>{ms('ecg_heart',21,primary)}<span style={{fontWeight:700,fontSize:16}}>สุขภาพธีม</span></div>
            <div style={{overflowX:'auto'}}>
              <table style={{borderCollapse:'collapse',width:'100%',minWidth:560}}>
                <thead>
                  <tr><th style={{textAlign:'left',fontSize:12.5,color:'#8a93a3',fontWeight:600,padding:'0 8px 12px'}}>ธีม</th>
                    {METRICS.map((m,i)=>(<th key={i} style={{padding:'0 4px 12px',fontSize:10.5,color:'#5a6473',fontWeight:700,textAlign:'center',minWidth:62}}>{m}</th>))}
                  </tr>
                </thead>
                <tbody>
                  {TEAM_HEALTH.map((row,ri)=>(
                    <tr key={ri} style={{borderTop:'1px solid #f1f3f6'}}>
                      <td style={{fontSize:12.5,fontWeight:600,color:'#2b3440',padding:'13px 8px',whiteSpace:'nowrap',maxWidth:170,overflow:'hidden',textOverflow:'ellipsis'}}>{row.team}</td>
                      {row.vals.map((v,ci)=>(
                        <td key={ci} style={{textAlign:'center',padding:'10px 4px'}}>
                          <div style={{fontWeight:700,fontSize:13,color:'#2b3440'}}>{v[0]}</div>
                          {v.length>2 ? <div style={{fontSize:10.5,fontWeight:600,color:v[2]?GRN:RED,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(v[2]?'arrow_drop_up':'arrow_drop_down',15,v[2]?GRN:RED)}{v[1]}</div>
                            : <div style={{fontSize:10.5,color:'#c2cad4'}}>{v[1]}</div>}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>

          {/* BUSINESS PLAN HEALTH */}
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,flexWrap:'wrap'}}>
              {ms('monitor_heart',22,primary)}
              <span style={{fontWeight:700,fontSize:17}}>สุขภาพแผนธุรกิจ</span>
              <div style={{flex:1}}></div>
              {/* current status only — Q toggle lives inside the modal */}
              <button onClick={()=>setModal(true)} style={{display:'inline-flex',alignItems:'center',gap:7,background:primary,color:'#fff',borderRadius:9,padding:'9px 15px',fontSize:13,fontWeight:700}}>สถานะของแผนธุรกิจทั้งหมด<span style={{display:'flex',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'#fff'}}></span><span style={{width:7,height:7,borderRadius:'50%',background:'#ffe08a'}}></span><span style={{width:7,height:7,borderRadius:'50%',background:'#bff0d2'}}></span></span></button>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',border:'1px solid #eef0f4',borderRadius:10,padding:'11px 14px',margin:'10px 0 16px'}}>
              <div><div style={{fontSize:11.5,color:'#9aa3af'}}>รอบการวัดเป้า</div><div style={{fontWeight:600,fontSize:13.5}}>{Q.label} · {Q.period}</div></div>
              {ms('unfold_more',20,'#aab2bd')}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
              {Q.missions.map((m,i)=>(
                <a key={i} href={'business-plan-detail.html?m='+i} style={{border:'1px solid #eef0f4',borderRadius:12,overflow:'hidden',display:'block',transition:'box-shadow .12s,border-color .12s'}} onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 14px rgba(16,24,40,.10)';e.currentTarget.style.borderColor='#d9dee6';}} onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor='#eef0f4';}}>
                  <div style={{padding:'12px 14px 8px'}}>
                    <div style={{fontSize:12.5,fontWeight:700,color:'#2b3440',minHeight:34,lineHeight:1.3,display:'flex',alignItems:'flex-start',gap:4}}><span style={{flex:1}}>{MNAMES[i]}</span>{ms('chevron_right',18,'#c2cad4')}</div>
                    <div style={{display:'flex',justifyContent:'center',padding:'16px 0'}}><div style={{width:64,height:64,borderRadius:'50%',background:dotC(m.status)}}></div></div>
                  </div>
                  <div style={{background:'#fafbfc',borderTop:'1px solid #f1f3f6',padding:'11px 14px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:9,fontSize:11.5,color:'#5a6473',fontWeight:600}}>{ms('desktop_windows',16,'#9aa3af')}ข้อมูลสรุปสถานะจากเป้าหมาย</div>
                    <StatusDots status={m.status} n={m.goal} seed={i*5+QKEYS.indexOf(q)} size={13}/>
                  </div>
                </a>
              ))}
            </div>
          </Card>

          {/* command summary */}
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14,flexWrap:'wrap'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('send',17,primary)}</div>
              <span style={{fontWeight:700,fontSize:15}}>ข้อมูลสรุปจากคำสั่งการ</span>
              <div style={{flex:1}}></div>
              <span style={{fontSize:12.5,color:'#9aa3af'}}>ทั้งหมด 1,013 คำสั่งการ</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {[
                {title:'งานตามแผนธุรกิจ',total:170,seg:[{c:GRN,v:11},{c:YEL,v:0},{c:RED,v:159}],note:'นับคำสั่งการรวมทั้งหมดที่ติดแผนธุรกิจทุกระดับ ก่อนประกาศใช้แผนธุรกิจ'},
                {title:'งานสนับสนุนองค์กร',total:351,seg:[{c:GRN,v:68},{c:YEL,v:118},{c:RED,v:165}],note:'นับคำสั่งการรวมทั้งหมดที่ไม่ได้ติดแผนธุรกิจ ก่อนประกาศใช้แผนธุรกิจ'}
              ].map((b,bi)=>(
                <div key={bi} style={{border:'1px solid #f1f3f6',borderRadius:11,padding:16}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:12}}>
                    <span style={{fontWeight:700,fontSize:14}}>{b.title}</span>
                    <div style={{flex:1}}></div>
                    <span style={{fontSize:12.5,color:'#5a6473',fontWeight:600,whiteSpace:'nowrap'}}>{b.total.toLocaleString()} คำสั่งการ</span>
                  </div>
                  <div style={{display:'flex',height:20,borderRadius:6,overflow:'hidden',marginBottom:11}}>
                    {b.seg.filter(s=>s.v>0).map((s,si)=>(<div key={si} style={{flexGrow:s.v,flexBasis:0,background:s.c}}></div>))}
                  </div>
                  <div style={{display:'flex',gap:22,flexWrap:'wrap',fontSize:12.5,color:'#3c4350',marginBottom:13}}>
                    {b.seg.map((s,si)=>(<span key={si} style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:11,height:11,borderRadius:'50%',background:s.c}}></span>{s.v} คำสั่งการ</span>))}
                  </div>
                  <div style={{borderTop:'1px solid #eef0f4',paddingTop:11,display:'flex',alignItems:'center',gap:7,fontSize:12,color:'#8a93a3'}}>
                    {ms('help',16,'#b3bac4')}<span>{b.note}</span>
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>

        {/* ===== RIGHT COLUMN ===== */}
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <Card>
            <div style={{display:'flex',alignItems:'center',marginBottom:12}}><span style={{fontWeight:700,fontSize:15}}>โดดเด่น</span><div style={{flex:1}}></div><button style={{display:'inline-flex',alignItems:'center',gap:5,border:'1px solid #e3e7ec',borderRadius:8,padding:'5px 11px',fontSize:12,fontWeight:600,color:'#5a6473'}}>ประจำสัปดาห์{ms('expand_more',17,'#8a93a3')}</button></div>
            {STANDOUT.map((p,i)=>(
              <div key={i} className="person" style={{display:'flex',alignItems:'center',gap:11,padding:'9px 6px',margin:'0 -6px',borderRadius:9}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:initColor(p.n),color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:15,flex:'none'}}>{initial(p.n)}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13}}>{p.n}</div><div style={{fontSize:11.5,color:'#9aa3af'}}>{p.r}</div></div>
                <span style={{width:30,height:30,borderRadius:'50%',background:ORG[i%ORG.length].bg,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms(ORG[i%ORG.length].icon,16,ORG[i%ORG.length].ink)}</span>
              </div>
            ))}
          </Card>

          <Card>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>การตรวจสอบระดับผู้ใช้</div>
            {AUDIT.map((a,i)=>{const col=a.pct>=80?GRN:a.pct>=50?YEL:RED;return (
              <div key={i} className="person" style={{display:'flex',alignItems:'center',gap:11,padding:'8px 6px',margin:'0 -6px',borderRadius:9,borderTop:i?'1px solid #f5f7f9':'none'}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:initColor(a.n),color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flex:'none'}}>{initial(a.n)}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.n}</div><div style={{fontSize:11,color:'#9aa3af'}}>{a.r}</div></div>
                <span style={{fontSize:11.5,fontWeight:700,color:col,background:col==='#22b96a'?'#eafaf0':col==='#f5b301'?'#fff7e3':'#fdeaea',borderRadius:99,padding:'3px 9px',flex:'none'}}>{a.pct}%</span>
              </div>
            );})}
          </Card>
        </div>

       </div>
      </div>
    </div>

    {modal && <MissionStatusModal q={q} setQ={setQ} onClose={()=>setModal(false)}/>}
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  var src=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
