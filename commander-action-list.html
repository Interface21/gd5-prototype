function DaysPill({d,closed}){

                  {r.newProg > 0 && <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#fef3e6',color:'#d98223',padding:'1px 8px 1px 2px',borderRadius:99,fontWeight:600}}><span style={{background:'#f5b301',color:'#fff',width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10}}>{r.newProg}</span> ก้าวหน้าใหม่</span>}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flex:'0 1 auto',minWidth:0,marginLeft:'auto'}}>
                <div style={{display:'flex',alignItems:'center',gap:13,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  <span style={{fontSize:11.5,color:'#aab2bd'}}>{r.type === 'daily' ? 'งานประจำวัน' : 'PA'}</span>
                  <DaysPill d={r.days} closed={r.closed===r.assignees}/>
                  <Bar pct={r.progress+'%'}/>
                  <span style={{width:10,height:10,borderRadius:'50%',background:r.status==='red'?'#ef4444':'#22b573',flex:'none'}}></span>
                  <i className="bi bi-three-dots-vertical" style={{color:'#aab2bd', fontSize:16}}></i>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11.5,color:'#aab2bd'}}>
                  <span>วันที่สั่ง {r.date}</span>
                  {r.src && <span>· <span style={r.isLink ? {color:primary,fontWeight:600} : {}}>{r.src}</span> {r.isLink && <i className="bi bi-link-45deg" style={{fontSize:14}}></i>}</span>}
                </div>
              </div>
            </a>
          ))}
        </div>
       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

(function(){
  var src = document.getElementById('jsx-src').textContent;
  var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
