<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ไอคอน "อยู่ใน Today's Job" — ตัวเลือก</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0..1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'IBM Plex Sans Thai',sans-serif;background:#eef1f6;color:#1f2733;padding:32px}
h1{font-size:19px;margin:0 0 4px}
.sub{font-size:13px;color:#8a93a3;margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;max-width:1100px}
.card{background:#fff;border:1px solid #eceef2;border-radius:14px;padding:16px;display:flex;align-items:center;gap:13px}
.btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #bfe6db;background:#e4f3ef;flex:none}
.ms{font-family:'Material Symbols Rounded';font-size:19px;color:#0e8c7d;font-variation-settings:'FILL' 1}
.name{font-size:13px;font-weight:600;color:#2b3440}
.note{font-size:11.5px;color:#9aa3af;margin-top:2px}
.row-demo{display:flex;align-items:center;gap:9px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#e7f6ee;color:#1f9d57;border-radius:7px;padding:3px 9px;font-size:11.5px;font-weight:600}
</style>
</head>
<body>
<h1>ตัวอย่างไอคอน "อยู่ใน Today's Job แล้ว"</h1>
<div class="sub">เลือกแบบที่ชอบ แล้วบอกชื่อไอคอนมาได้เลยครับ — จะนำไปใส่ในปุ่ม (สถานะเพิ่มแล้ว) ของหน้า list</div>
<div class="grid" id="grid"></div>
<script>
const icons=[
  ['playlist_add_check','ปัจจุบันที่ใช้อยู่'],
  ['task_alt','เครื่องหมายถูกในวงกลม'],
  ['check_circle','ติ๊กถูกทึบ'],
  ['bookmark_added','บุ๊กมาร์ก + ถูก'],
  ['library_add_check','ซ้อนรายการ + ถูก'],
  ['assignment_turned_in','คลิปบอร์ด + ถูก'],
  ['fact_check','ตรวจรายการ'],
  ['event_available','ปฏิทิน + ถูก'],
  ['done_all','ถูกสองอัน'],
  ['inventory','กล่อง + ถูก'],
  ['push_pin','หมุดปัก'],
  ['star','ดาว'],
];
const g=document.getElementById('grid');
icons.forEach(([ic,desc])=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML='<span class="btn"><span class="ms">'+ic+'</span></span>'+
    '<div><div class="name">'+ic+'</div><div class="note">'+desc+'</div></div>';
  g.appendChild(d);
});
</script>
</body>
</html>
