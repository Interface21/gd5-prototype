function scaleTree(nodes,mode){
  return nodes.map(n=>{
    let achieved=n.achieved, status=n.status, spentSelf=n.spentSelf;
    if(mode==='future'){ achieved=0; status=''; spentSelf=0; }
    if(mode==='done'){ achieved=n.target; status=n.target>0?'g':(n.status||''); }
    return {...n,achieved,status,spentSelf,children:n.children?scaleTree(n.children,mode):[]};
  });
}

const flattenTree=(nodes)=>nodes.reduce((acc,n)=>acc.concat([n],flattenTree(n.children||[])),[]);

const usedTotal=(n)=>(n.spentSelf||0)+dailyOf(n)+(n.children||[]).reduce((s,c)=>s+usedTotal(c),0); // งบที่ใช้ไป = บันทึกเอง + งานประจำวัน +

        </div>

        {/* ดำเนินการตามแผนงาน — โครงเดียวกับหน้าแผนธุรกิจที่รับผิดชอบ */}
        <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'16px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <i className="bi bi-record-circle" style={{fontSize:22,color:primary,flex:'none'}}></i>
            <span style={{fontWeight:600,fontSize:13.5,color:'#1a2332',flex:'none'}}>ดำเนินการตามแผนงาน</span>
            <div style={{flex:1,height:10,background:'#e3f3f0',borderRadius:99,overflow:'hidden',margin:'0 12px'}}>
              <div style={{width:pct+'%',height:'100%',background:primary,borderRadius:99}}></div>
            </div>
            <span style={{fontSize:22,fontWeight:700,color:primary,flex:'none',minWidth:90,textAlign:'right'}}>{showQty?pct.toFixed(2)+' %':'—'}</span>
          </div>
          <div style={{paddingLeft:34,marginTop:6,fontSize:12,color:'#8a93a3'}}>{showQty?('จำนวนที่ทำได้สะสม '+node.achieved.toLocaleString()+' จาก '+node.target.toLocaleString()+(node.unit?' '+node.unit:'')):'แผนธุรกิจนี้ไม่มีตัวชี้วัด'}</div>
        </div>

        {/* งบประมาณ — ที่ตั้งไว้ vs ใช้ไป (ใช้ไป = รวมจากแผนใต้ 1 ระดับ + บันทึกเองในแผนนี้) */}
        <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 22px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <i className="bi bi-wallet2" style={{fontSize:15,color:primary}}></i>
            <span style={{fontWeight:700,fontSize:14}}>งบประมาณ</span>
          </div>
          {budget>0?(
            <React.Fragment>
              <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                <span style={{fontSize:12.5,color:'#8a93a3'}}>ใช้ไป</span>
                <span style={{fontSize:26,fontWeight:700,color:bpct>100?RED:primary}}>{used.toLocaleString()}</span>
                <span style={{fontSize:14,color:'#8a93a3'}}>จาก {budget.toLocaleString()} บาท</span>
                <div style={{flex:1}}></div>
                <span style={{fontSize:18,fontWeight:700,color:bpct>100?RED:primary}}>{bpct.toFixed(1)}%</span>
              </div>
              <div style={{display:'flex',height:10,background:'#eef0f3',borderRadius:99,overflow:'hidden',marginBottom:12}}>
                {hasChildren&&usedChildren>0&&<div style={{width:Math.min(100,usedChildren/budget*100)+'%',background:primary}} title={'รวมจาก'+childWord+' '+usedChildren.toLocaleString()+' บาท'}></div>}
                {usedDaily>0&&<div style={{width:Math.min(100,usedDaily/budget*100)+'%',background:'#e59500'}} title={'รวมจากงานประจำวัน '+usedDaily.toLocaleString()+' บาท'}></div>}
                {usedSelf>0&&<div style={{width:Math.min(100,usedSelf/budget*100)+'%',background:'#3b6fd4'}} title={'บันทึกเอง '+usedSelf.toLocaleString()+' บาท'}></div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:12.5,color:'#3c4350'}}>
                {hasChildren&&(
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:10,height:10,borderRadius:3,background:primary,flex:'none'}}></span>
                  <span style={{flex:1}}>รวมจาก{childWord}ใต้แผนนี้ (1 ระดับ)</span>
                  <span style={{fontWeight:700}}>{usedChildren.toLocaleString()} บาท</span>
                </div>
                )}
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:10,height:10,borderRadius:3,background:'#e59500',flex:'none'}}></span>
                  <span style={{flex:1}}>รวมจากงานประจำวัน</span>
                  <span style={{fontWeight:700}}>{usedDaily.toLocaleString()} บาท</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:10,height:10,borderRadius:3,background:'#3b6fd4',flex:'none'}}></span>
                  <span style={{flex:1}}>บันทึกเองในแผนนี้</span>
                  <span style={{fontWeight:700}}>{usedSelf.toLocaleString()} บาท</span>
                </div>
              </div>

              <div style={{borderTop:'1px solid #f0f2f5',marginTop:14,paddingTop:12}}>
                <button onClick={()=>setLogsOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:6,width:'100%',background:'none',border:'none',padding:0,cursor:'pointer',marginBottom:logsOpen?8:0}}>
                  <span style={{fontSize:12.5,fontWeight:700,color:'#5a6473'}}>รายการใช้งบประมาณ</span>
                  <span style={{fontSize:11.5,color:'#b3bac4',fontWeight:600}}>({budgetItems.length})</span>
                  <div style={{flex:1}}></div>
                  <i className={'bi '+(logsOpen?'bi-chevron-up':'bi-chevron-down')} style={{fontSize:13,color:'#9aa3af'}}></i>
                </button>
                {logsOpen&&(budgetItems.length===0 ? (
                  <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'20px 0'}}>ยังไม่มีการบันทึกการใช้งบประมาณ</div>
                ) : (
                  <div>
                    {budgetItems.map((l,i)=>{
                      const srcColor=l.source==='daily'?'#e59500':'#3b6fd4';
                      const srcBg=l.source==='daily'?'#fdf1de':'#eaf0fb';
                      const srcLabel=l.source==='daily'?'งานประจำวัน':'บันทึกเองในแผนนี้';
                      return (
                        <div key={i} style={{display:'flex',alignItems:'flex-start',gap:11,padding:'11px 2px',borderBottom:i<budgetItems.length-1?'1px solid #f4f6f8':'none'}}>
                          <div style={{width:30,height:30,borderRadius:'50%',background:srcBg,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                            <i className="bi bi-wallet2" style={{fontSize:14,color:srcColor}}></i>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12.5,color:'#1a2332',fontWeight:600,lineHeight:1.4,marginBottom:4}}>{l.note}</div>
                            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                              <span style={{fontSize:11.5,color:'#9aa3af'}}>{l.date} · {l.by}</span>
                              <span style={{display:'inline-flex',alignItems:'center',gap:4,background:srcBg,color:srcColor,borderRadius:8,padding:'2px 8px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>
                                <span style={{width:6,height:6,borderRadius:2,background:srcColor}}></span>{srcLabel}
                              </span>
                            </div>
                          </div>
                          <span style={{fontSize:13,fontWeight:700,color:srcColor,flex:'none'}}>{l.amount.toLocaleString()} บาท</span>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </React.Fragment>
          ):(
            <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'18px 0'}}>ไม่ได้ตั้งงบประมาณ</div>
          )}
        </div>

        {/* ความก้าวหน้า | แจ้งเตือน — บล็อกแท็บ (ให้เหมือนหน้าแผนธุรกิจที่รับผิดชอบ) */}
        <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 22px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
          <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:14,flexWrap:'wrap'}}>
            {['ความก้าวหน้า','แจ้งเตือน'].map((t,i)=>(
              <button key={i} onClick={()=>setTab(i)} style={{padding:'7px 14px',fontWeight:tab===i?700:400,color:tab===i?primary:'#8a93a3',fontSize:13,background:'none',border:'none',borderBottom:'2px solid '+(tab===i?primary:'transparent'),cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                <span style={{minWidth:18,height:18,borderRadius:99,background:tab===i?primarySoft:'#f4f5f7',color:tab===i?primary:'#9aa3af',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 5px'}}>0</span>
                {t}
              </button>
            ))}
          </div>
          {tab===0 ? (
            <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'22px 14px',lineHeight:1.7}}>รายละเอียดการรายงานความก้าวหน้าอยู่ในหน้าแผนธุรกิจที่รับผิดชอบของผู้รับผิดชอบ</div>
          ) : (
            <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'22px 0'}}>ไม่มีการแจ้งเตือน</div>
          )}
        </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* สรุปข้อมูลคำสั่งการ — โครงเดียวกับหน้าแผนธุรกิจที่รับผิดชอบ */}
        <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <i className="bi bi-people-fill" style={{fontSize:19,color:primary}}></i>
            <span style={{fontWeight:700,fontSize:14}}>สรุปข้อมูลคำสั่งการ</span>
            <div style={{flex:1}}></div>
            <span style={{fontSize:12,color:'#9aa3af',fontWeight:600,background:'#f4f5f7',borderRadius:99,padding:'4px 11px'}}>ทั้งหมด {cmd.total} คำสั่งการ</span>
          </div>
          <div style={{fontSize:12.5,color:'#8a93a3',marginBottom:8}}>
            งานตามแผนธุรกิจนี้ <span style={{fontWeight:700,color:'#1a2332'}}>{cmd.total}</span> คำสั่งการ
          </div>
          <div style={{display:'flex',height:20,borderRadius:99,overflow:'hidden',marginBottom:10}}>
            {cmd.g>0&&<div style={{flexGrow:cmd.g,background:GRN}}></div>}
            {cmd.y>0&&<div style={{flexGrow:cmd.y,background:YEL}}></div>}
            {cmd.r>0&&<div style={{flexGrow:cmd.r,background:RED}}></div>}
          </div>
          <div style={{display:'flex',gap:18,flexWrap:'wrap',fontSize:12.5,color:'#3c4350',marginBottom:12}}>
            {[[GRN,cmd.g],[YEL,cmd.y],[RED,cmd.r]].map(([c,v],i)=>(
              <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:11,height:11,borderRadius:'50%',background:c}}></span>{v} คำสั่งการ</span>
            ))}
          </div>
          <div style={{borderTop:'1px solid #f0f2f5',paddingTop:10,display:'flex',alignItems:'center',gap:7,fontSize:12,color:'#9aa3af'}}>
            <i className="bi bi-question-circle" style={{fontSize:14,color:'#b3bac4'}}></i>
            นับคำสั่งการที่ติดแผนงานนี้เท่านั้น
          </div>
        </div>

        {kids.length>0&&(
          <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 22px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <i className="bi bi-diagram-3" style={{fontSize:16,color:'#8a93a3'}}></i>
              <span style={{fontWeight:700,fontSize:14}}>แผนธุรกิจภายใต้แผนธุรกิจนี้</span>
              <div style={{flex:1}}></div>
            </div>
            <div>
              {kids.map((c,i)=>(
                <div key={c.id} onClick={()=>onOpenChild(c)} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 2px',borderTop:i?'1px solid #f4f6f8':'none',cursor:'pointer'}}>
                  <StatusDot s={c.status} size={13}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#1a2332',lineHeight:1.4,marginBottom:2}}>{c.title}</div>
                    <div style={{fontSize:11.5,color:'#9aa3af'}}>{c.owner}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        </div>
      </div>
      </>)}

      {pageTab==='daily' && <DailyPlanReadOnly plans={dailyPlans} vmGroups={vmGroups}/>}
    </div>
  );
}

function ReportContent(){
  const [round,setRound]=useState(ROUNDS[0].id);
  const [roundOpen,setRoundOpen]=useState(false);
  const [query,setQuery]=useState('');
  const [pathIds,setPathIds]=useState([]); // drill path: [missionId, goalId, strategyId]
  const [viewStack,setViewStack]=useState([]); // เปิดดู "ข้อมูลและสถานะ" ของแผนรายการเดียว (ซ้อนกันได้เมื่อคลิกแผนลูกจากหน้ารายละเอียด)

  const missions=DATA_BY_ROUND[round];
  const cmdData=CMD_SUMMARY_BY_ROUND[round];
  const q=query.trim().toLowerCase();

  // resolve current drill chain against the selected round's data (ids are stable across rounds)
  const chain=[];
  let levelNodes=missions;
  for(const id of pathIds){
    const found=levelNodes.find(n=>n.id===id);
    if(!found) break;
    chain.push(found);
    levelNodes=found.children||[];
  }
  const atRoot=chain.length===0;
  const childLabel=LEVEL_CHILD_LABEL[chain.length]||null;
  const stackTop=viewStack.length?viewStack[viewStack.length-1]:null;

  const visible=useMemo(()=>{
    if(!q) return levelNodes;
    return levelNodes.filter(n=>flattenTree([n]).some(x=>x.title.toLowerCase().includes(q)||x.owner.toLowerCase().includes(q)));
  },[levelNodes,q]);

  const goTo=(depth)=>{setPathIds(pathIds.slice(0,depth));setViewStack([]);};

  return (
    <div style={{flex:1,padding:'24px 28px',overflowY:'auto',height:'calc(100vh - 58px)'}}>

      {/* header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:atRoot?20:12,flexWrap:'wrap'}}>
        <i className="bi bi-diagram-3" style={{fontSize:20,color:primary}}></i>
        <span style={{fontWeight:700,fontSize:16}}>แผนธุรกิจทั้งหมดขององค์กร</span>
        <div style={{flex:1}}></div>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'#fff',border:'1px solid #e3e7ec',borderRadius:9,padding:'8px 12px',width:280}}>
          <i className="bi bi-search" style={{fontSize:14,color:'#9aa3af'}}></i>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="ค้นหาแผนธุรกิจหรือผู้รับผิดชอบ" style={{border:'none',outline:'none',fontSize:13,width:'100%',fontFamily:'inherit',color:'#1f2733'}}/>
        </div>
        <div style={{position:'relative'}}>
          <button onClick={()=>setRoundOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:8,border:'1px solid #e3e7ec',borderRadius:11,padding:'10px 16px',background:'#fff',cursor:'pointer'}}>
            <span style={{fontSize:13,fontWeight:600,color:'#1f2733'}}>{ROUNDS.find(r=>r.id===round).label}</span>
            <i className="bi bi-chevron-down" style={{fontSize:11,color:'#9aa3af'}}></i>
          </button>
          {roundOpen&&(
            <div style={{position:'absolute',right:0,top:58,background:'#fff',border:'1px solid #e3e7ec',borderRadius:11,boxShadow:'0 8px 24px rgba(16,24,40,.12)',zIndex:20,minWidth:240,overflow:'hidden'}}>
              {ROUNDS.map(r=>(
                <div key={r.id} onClick={()=>{setRound(r.id);setRoundOpen(false);setViewStack([]);}} style={{padding:'11px 18px',fontSize:13,cursor:'pointer',fontWeight:r.id===round?700:400,color:r.id===round?primary:'#1f2733',background:r.id===round?primarySoft:'#fff'}}>
                  {r.label}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* breadcrumb — เส้นทาง drill + รายการที่กำลังเปิดดูข้อมูลและสถานะ */}
      {(!atRoot||viewStack.length>0)&&(
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',fontSize:12.5,marginBottom:16}}>
          <span onClick={()=>goTo(0)} style={{color:primary,fontWeight:600,cursor:'pointer'}}>แผนธุรกิจทั้งหมด</span>
          {chain.map((n,i)=>{
            const isLast=i===chain.length-1&&viewStack.length===0;
            return (
              <React.Fragment key={n.id}>
                <i className="bi bi-chevron-right" style={{fontSize:10,color:'#c4ccd4'}}></i>
                <span onClick={()=>!isLast&&goTo(i+1)} style={{color:isLast?'#1a2332':primary,fontWeight:isLast?700:600,cursor:isLast?'default':'pointer'}}>{n.title}</span>
              </React.Fragment>
            );
          })}
          {viewStack.map((n,i)=>{
            const isLast=i===viewStack.length-1;
            return (
              <React.Fragment key={'v'+n.id}>
                <i className="bi bi-chevron-right" style={{fontSize:10,color:'#c4ccd4'}}></i>
                <span onClick={()=>!isLast&&setViewStack(viewStack.slice(0,i+1))} style={{color:isLast?'#1a2332':primary,fontWeight:isLast?700:600,cursor:isLast?'default':'pointer'}}>{n.title}</span>
              </React.Fragment>
            );
          })}
        </div>
      )}

      {stackTop?(
        /* หน้าข้อมูลและสถานะของแผนรายการเดียว */
        <PlanDetail
          node={stackTop}
          level={chain.length+viewStack.length-1}
          onBack={()=>setViewStack(viewStack.slice(0,-1))}
          onOpenChild={(c)=>setViewStack([...viewStack,c])}
          onDrill={()=>{setPathIds([...pathIds,...viewStack.map(n=>n.id)]);setViewStack([]);}}
        />
      ):(
        <React.Fragment>
          {/* plan cards — คลิกการ์ดเพื่อดูข้อมูลและสถานะ, ปุ่ม "ดู...รายการ" เพื่อ drill ลงชั้นถัดไป */}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {visible.length===0?(
              <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'40px 20px',textAlign:'center',color:'#b3bac4',fontSize:13}}>ไม่พบแผนธุรกิจที่ตรงกับคำค้นหา</div>
            ):visible.map(n=>(
              <PlanCard key={n.id} node={n} childLabel={childLabel} onOpen={()=>setViewStack([n])} onDrill={()=>setPathIds([...pathIds,n.id])}/>
            ))}
          </div>
          {atRoot&&<CmdSummarySection data={cmdData}/>}
        </React.Fragment>
      )}
    </div>
  );
}

function App(){
  return (
    <GD5AppShell active="business">
      <LeftNav/>
      <ReportContent/>
    </GD5AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
