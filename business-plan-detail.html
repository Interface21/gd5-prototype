        <div style={{display:'flex',gap:10,padding:'18px 22px 22px'}}>

          <button onClick={()=>canSave&&onSave({val:val.trim(),status,note:note.trim(),amount:hasBud?amt:0,budgetNote:budgetNote.trim()})} disabled={!canSave} style={{flex:1,background:canSave?primary:'#c7ccd4',color:'#fff',border:'none',borderRadius:11,padding:'11px 0',fontSize:13.5,fontWeight:700,cursor:canSave?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>

  const cleanItems=items.map(t=>t.trim()).filter(Boolean);

  const inputStyle={width:'100%',border:'1px solid #dde1e8',borderRadius:9,padding:'10px 12px',fontSize:13,fontFamily:'inherit',outline:'none',color:'#1f2733',boxSizing:'border-box',background:'#fff'};
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(16,24,40,.48)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:99998,padding:'40px 16px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,width:560,maxWidth:'100%',boxShadow:'0 24px 64px rgba(16,24,40,.28)',animation:'fadeIn .15s ease'}}>

            <div style={{fontWeight:700,fontSize:15}}>{initial?'แก้ไขแผนงานประจำวัน':'สร้างแผนงานประจำวัน'}</div>

          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:'#f1f3f7',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('close',13,'#5a6473')}</button>
        </div>
        <div style={{padding:'18px 22px 0'}}>

                  <div style={{flex:1,minWidth:170}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#1a2332',lineHeight:1.3,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.title}</div>
                    <div style={{display:'flex',alignItems:'center',gap:10,fontSize:11.5,color:'#9aa3af',flexWrap:'wrap'}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:4}}>{ms('group',12,'#b3bac4')}{g.members} สมาชิก</span>

                  </div>
                  <div style={{width:70,flex:'none'}}>
                    <div style={{height:6,background:'#eef0f3',borderRadius:99,overflow:'hidden'}}>
                      <div style={{width:pct+'%',height:'100%',background:done?GRN:primary,borderRadius:99}}></div>

                    <i className="bi bi-box-arrow-up-right" style={{fontSize:12}}></i>ดูกลุ่ม

              );

      )}

function DailyPlanTab({plan,plans,vmGroups,ownPlans,bump}){
  const [openId,setOpenId]=useState(null);
  const [subTab,setSubTab]=useState({});
  const [openOwnId,setOpenOwnId]=useState(null);
  const [formPlan,setFormPlan]=useState(null);
  const [confirmDelId,setConfirmDelId]=useState(null);
  const groups=vmGroups||[];
  const total=plans.length+ownPlans.length;

  const addOwnPlan=(title,items)=>{
    const id='op'+Math.random().toString(36).slice(2,9);
    ownPlans.push({id,title,items});
    setFormPlan(null); setOpenOwnId(id); bump();
  };
  const editOwnPlan=(id,title,items)=>{
    const p=ownPlans.find(p=>p.id===id);
    if(p){ p.title=title; p.items=items; }
    setFormPlan(null); bump();
  };
  const deleteOwnPlan=(id)=>{
    const idx=ownPlans.findIndex(p=>p.id===id);
    if(idx>-1) ownPlans.splice(idx,1);
    setConfirmDelId(null); bump();
  };

  const SourceBadge=({own})=> own
    ? <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'#3b6fd4',background:'#eaf1fe',borderRadius:8,padding:'3px 10px',flex:'none'}}>{ms('note_add',12,'#3b6fd4')}สร้างเอง</span>
    : <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'#5a6473',background:'#f1f3f6',borderRadius:8,padding:'3px 10px',flex:'none'}}>{ms('lock',12,'#9aa3af')}ส่วนกลาง</span>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {formPlan!==null && <PlanFormModal plan={plan} initial={formPlan.id?formPlan:null} onClose={()=>setFormPlan(null)} onSave={(title,items)=>formPlan.id?editOwnPlan(formPlan.id,title,items):addOwnPlan(title,items)}/>}

      <Card>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <div style={{width:34,height:34,borderRadius:9,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('checklist',18,primary)}</div>
          <div style={{flex:1,minWidth:220}}>
            <div style={{fontWeight:700,fontSize:15}}>แผนงานประจำวัน</div>
            <div style={{fontSize:12,color:'#9aa3af',marginTop:1}}>{total} ชุด · {plans.length} จากส่วนกลาง · {ownPlans.length} ที่ท่านสร้างเอง{groups.length>0?' · เชื่อมกับ '+groups.length+' กลุ่ม VM':''}</div>
          </div>
          <button onClick={()=>setFormPlan({})} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,height:40,padding:'0 16px',borderRadius:11,border:'none',background:primary,color:'#fff',fontSize:13,fontWeight:700,flex:'none'}}>{ms('add',15,'#fff')}เพิ่มแผนงาน</button>
        </div>
      </Card>

      {total===0?(
        <Card>
          <div style={{textAlign:'center',padding:'32px 10px',color:'#b3bac4'}}>
            {ms('checklist',28,'#d7dce3')}
            <div style={{fontSize:13,fontWeight:600,color:'#8a93a3',marginTop:10}}>ยังไม่มีแผนงานประจำวันสำหรับแผนนี้</div>
            <div style={{fontSize:12,color:'#b3bac4',marginTop:3}}>กด "เพิ่มแผนงาน" เพื่อสร้างชุด TODO ของท่านเอง หรือรอส่วนกลางกำหนดแผนมาให้</div>
          </div>
        </Card>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {plans.map(pl=>{
            const open=openId===pl.id;
            const groupsForPlan=groups.filter(g=>g.planId===pl.id);
            return (
              <Card key={pl.id} pad="0">
                <button onClick={()=>setOpenId(open?null:pl.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',textAlign:'left',padding:'14px 16px',border:'none',background:'none',cursor:'pointer'}}>
                  <div style={{width:30,height:30,borderRadius:8,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('checklist',16,primary)}</div>
                  <span style={{flex:1,fontSize:14,fontWeight:700,color:'#1a2332'}}>{pl.title}</span>
                  <SourceBadge own={false}/>
                  {groupsForPlan.length>0 && (
                    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'#3b6fd4',background:'#eaf1fe',borderRadius:8,padding:'3px 10px',flex:'none'}}>{ms('groups',12,'#3b6fd4')}{groupsForPlan.length} กลุ่ม</span>
                  )}
                  <span style={{fontSize:11,color:'#9aa3af',fontWeight:600,background:'#f1f3f6',borderRadius:8,padding:'3px 10px',flex:'none'}}>{pl.items.length} ข้อ</span>
                  <span style={{flex:'none',width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:open?'#cde2df':'#ebebeb'}}>

      <div style={{display:'flex',alignItems:'flex-start',gap:9,fontSize:12,color:'#9aa3af',padding:'0 4px'}}>

      </div>
    </div>
  );
}

              </div>
              <div>
                {P.goals.map((g,i)=>(
                  <div key={i} className="goal-row" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderTop:i?'1px solid #f4f6f8':'none',borderRadius:9,cursor:'pointer'}}>
                    <div style={{width:32,height:32,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('account_circle',15,primary,true)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:'#1a2332',lineHeight:1.35,marginBottom:3}}>{g.t}</div>
                      <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#9aa3af'}}>{ms('add_circle',12,'#b3bac4')}<span>{g.kpi}</span></div>
                    </div>
                    <span style={{width:14,height:14,borderRadius:'50%',background:dotC(g.s),flex:'none'}}></span>
                    {ms('chevron_right',13,'#c4ccd4')}
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
        </>)}

        {tab==='daily' && <DailyPlanTab key={P.code} plan={P} plans={dailyPlans} vmGroups={MOCK_VM_GROUPS[P.code]||[]} ownPlans={ownDailyPlans} bump={()=>setTick(t=>t+1)}/>}

       </div>
      </div>
    </GD5AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  var shellSrc='';

  var pageSrc=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(shellSrc+'\n'+pageSrc,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();

</script>
</body>
