function Gauge({value}){
  const W=190,H=112,cx=W/2,cy=98,R=76,sw=17;
  const a=t=>Math.PI+t*Math.PI;
  const pt=(t,rr)=>[cx+(rr||R)*Math.cos(a(t)),cy+(rr||R)*Math.sin(a(t))];
  const arc=(t0,t1,color)=>{const[x0,y0]=pt(t0),[x1,y1]=pt(t1);const large=(t1-t0)>0.5?1:0;return <path d={'M'+x0+','+y0+' A'+R+','+R+' 0 '+large+' 1 '+x1+','+y1} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="butt"/>;};
  const [nx,ny]=pt(value,R-20);
  return (
    <svg viewBox={'0 0 '+W+' '+H} style={{width:W,height:H}}>
      {arc(0.005,0.4,'#f3a3a3')}
      {arc(0.4,0.7,'#f6d38c')}
      {arc(0.7,0.995,'#9bdcb4')}
      {arc(value-0.02<0.005?0.005:value-0.02,value+0.02>0.995?0.995:value+0.02,dotC(value<0.4?'r':value<0.7?'y':'g'))}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#2b3440" strokeWidth={3.5} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={6.5} fill="#2b3440"/>
    </svg>
  );
}

                <div style={{width:92,height:92,borderRadius:'50%',background:dotC(P.status),boxShadow:'0 6px 18px '+dotC(P.status)+'55'}}></div>
                <span style={{fontSize:13,fontWeight:700,color:dotC(P.status)}}>{STLABEL[P.status]}</span>
              </div>
            </Card>

            <Card>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>{ms('speed',20,primary)}<span style={{fontWeight:700,fontSize:14.5}}>ตัวชี้วัด</span></div>
              <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}><Gauge value={P.gauge}/></div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,paddingTop:12,borderTop:'1px solid #f3f5f8',fontSize:13,color:'#3c4350',fontWeight:600}}>{ms('account_circle',18,'#9aa3af',true)}{P.gaugeLabel}</div>
            </Card>
          </div>

          <Card>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14,flexWrap:'wrap'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('send',17,primary)}</div>
              <span style={{fontWeight:700,fontSize:15}}>ข้อมูลสรุปจากคำสั่งการ</span>
              <div style={{flex:1}}></div>
              <span style={{fontSize:12.5,color:'#5a6473',fontWeight:600,background:'#f1f3f6',borderRadius:99,padding:'5px 13px'}}>ทั้งหมด {totalCmd.toLocaleString()} คำสั่งการ</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <BarBlock title="งานตามแผนธุรกิจ" total={P.inPlan.g+P.inPlan.y+P.inPlan.r} seg={P.inPlan} note="นับคำสั่งการที่ติดพันธกิจนี้เท่านั้น"/>
              <BarBlock title="งานสนับสนุนภายใต้แผนธุรกิจนี้" total={P.support.g+P.support.y+P.support.r} seg={P.support} note="นับคำสั่งการทั้งหมดที่ติดแผนธุรกิจที่อยู่ใต้พันธกิจนี้ทั้งหมด"/>
            </div>
          </Card>
        </div>

        {/* SUB-PLANS / GOALS */}
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>{ms('account_tree',20,primary)}<span style={{fontWeight:700,fontSize:15}}>แผนธุรกิจภายใต้แผนธุรกิจนี้</span><span style={{fontSize:12.5,color:'#9aa3af'}}>· {P.goals.length} เป้าหมาย</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {P.goals.map((g,i)=>(
              <Card key={i} pad="0" style={{cursor:'pointer'}}>
                <div className="goal-row" style={{display:'flex',alignItems:'center',gap:13,padding:'16px 20px',borderRadius:14}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('account_circle',20,primary,true)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{g.t}</div>
                    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12.5,color:'#8a93a3'}}>{ms('add_circle',16,'#b3bac4')}{g.kpi}</span>
                  </div>
                  <span style={{width:22,height:22,borderRadius:'50%',background:dotC(g.s),flex:'none'}}></span>
                </div>
              </Card>
            ))}
          </div>
        </div>

       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  new Function(out)();

</script>
</body>
</html>
