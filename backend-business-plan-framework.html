/* ── cascading hierarchy helpers ── */
const TIER_KEY={1:'mission',2:'goal',3:'strategy',4:'plan'};
const tierKey=(t)=>TIER_KEY[t];
const childrenOf=(levelKey,pid)=>DATA[levelKey].filter(x=>x.pid===pid);
function optsForTier(t,chain){
  if(t===1) return DATA.mission.filter(m=>m.enabled);
  return childrenOf(tierKey(t),chain[tierKey(t-1)]);
}
function firstChainForLevel(level){
  const L=LV(level), chain={};
  for(let t=1;t<L.tier;t++){
    const opts=optsForTier(t,chain);
    if(!opts.length) break;
    const pick=opts.find(o=>childrenOf(tierKey(t+1),o.id).length)||opts[0];
    chain[tierKey(t)]=pick.id;
  }
  return chain;
}
function chainComplete(level,chain){
  const L=LV(level);
  for(let t=1;t<L.tier;t++){ if(!chain[tierKey(t)]) return false; }
  return true;
}
function itemLabel(levelKey,it){ return LV(levelKey).prefix+' '+it.no+' '+(it.title?': '+it.title:''); }

/* ═══════════ HIERARCHY CHAIN SELECTOR (บังคับเลือกจากชั้น 1 ลงมา) ═══════════ */
/* ═══════════ PARENT PICKER — ช่องเดียว + ค้นหา + drill-down tree ═══════════ */
function ChainSelector({level,chain,setChain}){
  const L=LV(level);
  const parentTier=L.tier-1;
  const parentKey=tierKey(parentTier);
  const ref=React.useRef(null);
  const [open,setOpen]=useState(false);
  const [query,setQuery]=useState('');
  const [expanded,setExpanded]=useState({});
  React.useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const chainForItem=(levelKey,item)=>{
    const c={}; let key=levelKey, cur=item;
    while(cur&&key){ c[key]=cur.id; const pk=LV(key).parent; if(!pk)break; cur=DATA[pk].find(x=>x.id===cur.pid); key=pk; }
    return c;
  };
  const choose=(it)=>{ setChain(chainForItem(parentKey,it)); setOpen(false); setQuery(''); };
  const openPicker=()=>{
    const exp={};
    for(let t=1;t<parentTier;t++){ const id=chain[tierKey(t)]; if(id) exp[id]=true; }
    setExpanded(exp); setQuery(''); setOpen(true);
  };
  const toggle=(id)=>setExpanded(e=>({...e,[id]:!e[id]}));

  // selected breadcrumb chips
  const chips=[];
  for(let t=1;t<=parentTier;t++){ const k=tierKey(t); const it=DATA[k].find(x=>x.id===chain[k]); chips.push({t,k,it}); }
  const selParent=DATA[parentKey].find(x=>x.id===chain[parentKey]);

  // search results (leaf items whose full path matches)
  const q=query.trim().toLowerCase();
  const results=q?DATA[parentKey].filter(it=>{
    const c=chainForItem(parentKey,it);
    let txt=''; for(let t=1;t<=parentTier;t++){ const k=tierKey(t); const x=DATA[k].find(y=>y.id===c[k]); if(x) txt+=' '+LV(k).prefix+' '+x.no+' '+x.title; }
    return txt.toLowerCase().includes(q);
  }):[];

  // tree rows
  const rows=[];
  const walk=(levelKey,pid,depth)=>{
    const items=levelKey==='mission'?DATA.mission.filter(m=>m.enabled):childrenOf(levelKey,pid);
    items.forEach(it=>{
      const Lk=LV(levelKey), leaf=Lk.tier===parentTier, isExp=!!expanded[it.id], on=chain[levelKey]===it.id&&leaf, kidCount=leaf?0:childrenOf(tierKey(Lk.tier+1),it.id).length;
      rows.push(
        <button key={levelKey+it.id} onClick={()=>leaf?choose(it):toggle(it.id)} className="sub-item" style={{display:'flex',alignItems:'center',gap:9,width:'100%',textAlign:'left',padding:'9px 12px 9px '+(12+depth*20)+'px',border:'none',background:on?primarySoft:'#fff',cursor:'pointer',borderTop:depth===0&&it!==items[0]?'1px solid #f4f6f8':'none'}}>
          {leaf?<span style={{width:14,flex:'none'}}></span>:<i className={'bi '+(isExp?'bi-caret-down-fill':'bi-caret-right-fill')} style={{fontSize:9,color:'#b3bac4',flex:'none',width:14}}></i>}
          <i className={'bi '+Lk.icon} style={{fontSize:13,color:Lk.accent,flex:'none'}}></i>
          <span style={{fontSize:13,fontWeight:on?700:(leaf?500:600),color:on?primary:(leaf?'#3a4452':'#1a2332'),overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{Lk.prefix+' '+it.no}{leaf?' : '+it.title:''}</span>
          {!leaf&&<span style={{marginLeft:'auto',fontSize:10.5,color:'#9aa3af',fontWeight:600,background:'#f1f3f7',borderRadius:8,padding:'1px 8px',flex:'none'}}>{kidCount}</span>}
          {on&&<i className="bi bi-check-lg" style={{fontSize:14,color:primary,marginLeft:'auto',flex:'none'}}></i>}
        </button>
      );
      if(!leaf&&isExp) walk(tierKey(Lk.tier+1),it.id,depth+1);
    });
  };
  walk('mission',null,0);

  return (
    <div ref={ref} style={{marginBottom:18,position:'relative'}}>
      <div style={{fontSize:12,fontWeight:700,color:'#5a6473',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
        <i className="bi bi-diagram-3-fill" style={{fontSize:13,color:primary}}></i>{L.name}ภายใต้ <span style={{color:'#9aa3af',fontWeight:500}}>(ค้นหาหรือไล่กดเลือกทีละชั้น)</span>
      </div>
      {/* collapsed field */}
      <button onClick={()=>open?setOpen(false):openPicker()} style={{display:'flex',alignItems:'center',gap:10,width:'100%',textAlign:'left',background:'#fff',border:'1.5px solid '+(open?primary:'#e3e7ec'),borderRadius:12,padding:'11px 14px',cursor:'pointer'}}>
        <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
          {selParent?chips.map((c,i)=>(
            <React.Fragment key={c.t}>
              {i>0&&<i className="bi bi-chevron-right" style={{fontSize:10,color:'#c4ccd4'}}></i>}
              <span style={{display:'inline-flex',alignItems:'center',gap:5,background:LV(c.k).accent+'14',color:LV(c.k).accent,borderRadius:7,padding:'3px 9px',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
                <i className={'bi '+LV(c.k).icon} style={{fontSize:11}}></i>{LV(c.k).prefix+' '+(c.it?c.it.no:'—')}
              </span>
            </React.Fragment>
          )):<span style={{fontSize:13.5,color:'#b3bac4',fontWeight:500}}>— เลือก{LV(parentKey).name} —</span>}
        </div>
        <i className={'bi '+(open?'bi-chevron-up':'bi-chevron-down')} style={{fontSize:14,color:'#9aa3af',flex:'none'}}></i>
      </button>
      {selParent&&<div style={{fontSize:12,color:'#8a93a3',marginTop:7,paddingLeft:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{itemLabel(parentKey,selParent)}</div>}

      {/* popover */}
      {open&&(
        <div style={{position:'absolute',left:0,right:0,top:'calc(100% + 8px)',background:'#fff',border:'1px solid #e3e7ec',borderRadius:13,boxShadow:'0 16px 40px rgba(16,24,40,.18)',zIndex:60,overflow:'hidden',animation:'popIn .13s ease'}}>
          <div style={{padding:'10px 12px',borderBottom:'1px solid #f0f2f5',display:'flex',alignItems:'center',gap:9,background:'#fafbfc'}}>
            <i className="bi bi-search" style={{fontSize:14,color:'#9aa3af',flex:'none'}}></i>
            <input autoFocus value={query} onChange={e=>setQuery(e.target.value)} placeholder={'ค้นหา'+LEVELS.slice(0,parentTier).map(l=>l.name).join(' / ')+'...'} style={{flex:1,border:'none',outline:'none',fontSize:13.5,fontFamily:'inherit',color:'#1f2733',background:'none'}}/>
            {query&&<button onClick={()=>setQuery('')} style={{width:24,height:24,borderRadius:'50%',border:'none',background:'#f1f3f7',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flex:'none'}}><i className="bi bi-x" style={{fontSize:13,color:'#8a93a3'}}></i></button>}
          </div>
          <div style={{maxHeight:340,overflowY:'auto',padding:'4px 0'}}>
            {q?(
              results.length?results.map(it=>{
                const c=chainForItem(parentKey,it), on=chain[parentKey]===it.id;
                return (
                  <button key={it.id} onClick={()=>choose(it)} className="sub-item" style={{display:'block',width:'100%',textAlign:'left',padding:'9px 14px',border:'none',background:on?primarySoft:'#fff',cursor:'pointer'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <i className={'bi '+LV(parentKey).icon} style={{fontSize:13,color:LV(parentKey).accent,flex:'none'}}></i>
                      <span style={{fontSize:13,fontWeight:on?700:600,color:on?primary:'#1a2332',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{LV(parentKey).prefix+' '+it.no+' : '+it.title}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:3,paddingLeft:21,fontSize:11,color:'#9aa3af',flexWrap:'wrap'}}>
                      {Array.from({length:parentTier-1},(_,i)=>i+1).map(t=>{const k=tierKey(t);const x=DATA[k].find(y=>y.id===c[k]);return <React.Fragment key={t}>{t>1&&<i className="bi bi-chevron-right" style={{fontSize:8}}></i>}<span>{x?LV(k).prefix+' '+x.no:''}</span></React.Fragment>;})}
                    </div>
                  </button>
                );
              }):<div style={{padding:'24px 16px',textAlign:'center',color:'#b3bac4',fontSize:12.5}}>ไม่พบรายการที่ตรงกับ "{query}"</div>
            ):rows}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ DAILY TASKS SECTION (inline — อยู่ในฟอร์มแก้ไขของแต่ละรายการ) ═══════════ */
function DailyTasksSection({plans,setPlans}){
  const [openId,setOpenId]=useState(plans[0]?plans[0].id:null);
  const [showAddPlan,setShowAddPlan]=useState(false);
  const [newPlanTitle,setNewPlanTitle]=useState('');
  const [newItemText,setNewItemText]=useState({});
  const [editingPlanId,setEditingPlanId]=useState(null);
  const [editingPlanTitle,setEditingPlanTitle]=useState('');
  const [editingItem,setEditingItem]=useState(null); // {planId,idx}
  const [editingItemVal,setEditingItemVal]=useState('');

  const addPlan=()=>{ if(!newPlanTitle.trim())return; const id='dp'+Date.now(); setPlans(p=>[...p,{id,title:newPlanTitle.trim(),items:[]}]); setNewPlanTitle(''); setShowAddPlan(false); setOpenId(id); };
  const removePlan=(id)=>setPlans(p=>p.filter(x=>x.id!==id));
  const startRenamePlan=(pl)=>{ setEditingPlanId(pl.id); setEditingPlanTitle(pl.title); };
  const commitRenamePlan=()=>{ setPlans(p=>p.map(x=>x.id===editingPlanId?{...x,title:editingPlanTitle.trim()||x.title}:x)); setEditingPlanId(null); };
  const addItem=(id)=>{ const txt=(newItemText[id]||'').trim(); if(!txt)return; setPlans(p=>p.map(x=>x.id===id?{...x,items:[...x.items,txt]}:x)); setNewItemText(s=>({...s,[id]:''})); };
  const removeItem=(id,idx)=>setPlans(p=>p.map(x=>x.id===id?{...x,items:x.items.filter((_,i)=>i!==idx)}:x));
  const startEditItem=(planId,idx,val)=>{ setEditingItem({planId,idx}); setEditingItemVal(val); };
  const commitEditItem=()=>{ setPlans(p=>p.map(x=>x.id===editingItem.planId?{...x,items:x.items.map((it,i)=>i===editingItem.idx?(editingItemVal.trim()||it):it)}:x)); setEditingItem(null); };

  return (
    <div style={{marginTop:22,paddingTop:20,borderTop:'1px solid #f0f2f5'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <i className="bi bi-journal-check" style={{fontSize:15,color:primary}}></i>
        <span style={{fontSize:13,fontWeight:700,color:'#3a4452'}}>แผนงานประจำวัน</span>
        <span style={{fontSize:11.5,color:'#9aa3af',fontWeight:600,background:'#f1f3f7',borderRadius:8,padding:'3px 10px'}}>{plans.length} ชุด</span>
        <div style={{flex:1}}></div>
        <button onClick={()=>setShowAddPlan(true)} style={{display:'inline-flex',alignItems:'center',gap:6,background:'#fff',color:primary,border:'1.5px solid '+primary,borderRadius:9,padding:'7px 13px',fontSize:12.5,fontWeight:700,cursor:'pointer'}}>
          <i className="bi bi-plus-lg" style={{fontSize:13}}></i>เพิ่มแผนงานใหม่
        </button>
      </div>

      {showAddPlan&&(
        <div style={{background:'#fff',border:'1.5px solid '+primary,borderRadius:12,padding:'12px 14px',marginBottom:14,display:'flex',gap:9,flexWrap:'wrap'}}>
          <input autoFocus value={newPlanTitle} onChange={e=>setNewPlanTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPlan()} placeholder="ชื่อแผนงาน เช่น แผนการเยี่ยมลูกค้า" style={{flex:1,minWidth:200,border:'1.5px solid #e1e5ec',borderRadius:9,padding:'9px 12px',fontSize:13.5,outline:'none',fontFamily:'inherit'}}/>
          <button onClick={()=>{setShowAddPlan(false);setNewPlanTitle('');}} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,background:'#fff',color:'#5a6473',border:'1px solid #e3e7ec',borderRadius:9,height:36,padding:'0 14px',fontSize:13.5,fontWeight:600,cursor:'pointer'}}>
            <i className="bi bi-x-lg" style={{fontSize:12}}></i>ยกเลิก
          </button>
          <button onClick={addPlan} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,background:primary,color:'#fff',border:'none',borderRadius:9,height:36,padding:'0 16px',fontSize:13.5,fontWeight:700,cursor:'pointer'}}>
            <i className="bi bi-check-lg" style={{fontSize:13}}></i>สร้าง
          </button>
        </div>
      )}

      {plans.length===0?(
        <div style={{fontSize:12.5,color:'#b3bac4',padding:'6px 2px'}}>ยังไม่มีแผนงานประจำวันสำหรับรายการนี้</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {plans.map(pl=>{
            const open=openId===pl.id;
            return (
              <div key={pl.id} style={{border:'1px solid #eceef2',borderRadius:12,overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 13px',background:'#f8fafb'}}>
                  <button onClick={()=>setOpenId(open?null:pl.id)} style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0,textAlign:'left',border:'none',background:'none',cursor:'pointer'}}>
                    {editingPlanId===pl.id?(
                      <input autoFocus value={editingPlanTitle} onClick={e=>e.stopPropagation()} onChange={e=>setEditingPlanTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&commitRenamePlan()} onBlur={commitRenamePlan} style={{flex:1,border:'1px solid '+primary,borderRadius:8,padding:'6px 9px',fontSize:13.5,fontWeight:700,outline:'none',fontFamily:'inherit'}}/>
                    ):(
                      <span style={{flex:1,fontSize:13.5,fontWeight:700,color:'#1a2332',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pl.title}</span>
                    )}
                    <span style={{fontSize:11,color:'#9aa3af',fontWeight:600,background:'#fff',border:'1px solid #eef1f4',borderRadius:8,padding:'2px 9px',flex:'none'}}>{pl.items.length} ข้อ</span>
                  </button>
                  <button onClick={()=>startRenamePlan(pl)} style={{width:28,height:28,borderRadius:8,border:'none',background:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flex:'none'}}>
                    <i className="bi bi-pencil" style={{fontSize:12,color:'#9aa3af'}}></i>
                  </button>
                  <button onClick={()=>removePlan(pl.id)} style={{width:28,height:28,borderRadius:8,border:'none',background:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flex:'none'}}>
                    <i className="bi bi-trash" style={{fontSize:12,color:'#e0468c'}}></i>
                  </button>
                  <button onClick={()=>setOpenId(open?null:pl.id)} style={{flex:'none',width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:open?'#cde2df':'#ebebeb',border:'none',cursor:'pointer'}}>
                    <i className={'bi '+(open?'bi-chevron-up':'bi-chevron-down')} style={{fontSize:13,color:open?'#4e9b92':'#2b3440'}}></i>
                  </button>
                </div>
                {open&&(
                  <div style={{padding:'12px 13px'}}>
                    {pl.items.length===0?(
                      <div style={{fontSize:12.5,color:'#b3bac4',padding:'4px 2px',marginBottom:10}}>ยังไม่มีรายการย่อยในแผนงานนี้</div>
                    ):(
                      <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:10}}>
                        {pl.items.map((t,idx)=>(
                          <div key={idx} style={{display:'flex',alignItems:'center',gap:9,background:'#fff',border:'1px solid #eef1f4',borderRadius:9,padding:'8px 11px'}}>
                            <i className="bi bi-check2-square" style={{fontSize:13,color:'#9aa3af'}}></i>
                            {editingItem&&editingItem.planId===pl.id&&editingItem.idx===idx?(
                              <input autoFocus value={editingItemVal} onChange={e=>setEditingItemVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&commitEditItem()} onBlur={commitEditItem} style={{flex:1,border:'1px solid '+primary,borderRadius:8,padding:'6px 9px',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
                            ):(
                              <span onClick={()=>startEditItem(pl.id,idx,t)} style={{flex:1,fontSize:13,color:'#3a4452',cursor:'text'}}>{t}</span>
                            )}
                            <button onClick={()=>removeItem(pl.id,idx)} style={{width:24,height:24,borderRadius:7,border:'none',background:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                              <i className="bi bi-x-lg" style={{fontSize:11,color:'#b3bac4'}}></i>
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{display:'flex',gap:8}}>
                      <input value={newItemText[pl.id]||''} onChange={e=>setNewItemText(s=>({...s,[pl.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addItem(pl.id)} placeholder="เพิ่มรายการย่อย..." style={{flex:1,border:'1.5px solid #e1e5ec',borderRadius:9,padding:'8px 12px',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
                      <button onClick={()=>addItem(pl.id)} style={{background:primary,color:'#fff',border:'none',borderRadius:9,padding:'0 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>เพิ่ม</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:11.5,color:'#9aa3af',marginTop:14}}>
        <i className="bi bi-info-circle" style={{fontSize:14,color:'#b3bac4'}}></i>
        <span>แต่ละแผนงานคือชุด TODO ที่มีรายการย่อยของตัวเอง จะแสดงในแท็บ "แผนประจำวัน" ของหน้ารายละเอียดแผนธุรกิจนี้ (ดูอย่างเดียว) และจะถูกเรียกใช้/ติ๊ก/แก้ไขได้จริงที่การประชุม (VM) ที่ผูกกับแผนนี้</span>
      </div>
    </div>
  );
}

              <div style={{position:'relative'}}>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

                </div>
              </div>
              <div>

                </div>
              </div>
            </div>

            <div style={{width:200}}>
              <div style={labelStyle}><i className="bi bi-gift-fill" style={{fontSize:12,color:primary}}></i>จำนวน Prize ที่มอบให้</div>
              <input value={prize} onChange={e=>setPrize(e.target.value.replace(/[^0-9]/g,''))} style={inputStyle}/>

            <div style={{flex:1}}></div>

              <button onClick={()=>setEnabled(true)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,height:'100%',border:'none',padding:'0 18px',fontSize:13,fontWeight:700,cursor:'pointer',background:enabled?'#e5f5ec':'#fff',color:enabled?'#1f8a5b':'#9aa3af'}}>

              </button>
              <button onClick={()=>setEnabled(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,height:'100%',border:'none',borderLeft:'1.5px solid #e1e5ec',padding:'0 18px',fontSize:13,fontWeight:700,cursor:'pointer',background:!enabled?'#fbe9e7':'#fff',color:!enabled?'#b8493d':'#9aa3af'}}>

            </div>
          </div>

/* ═══════════ ROUNDS: ADD/EDIT FORM (nested evaluation periods) ═══════════ */
function RoundFormView({round,rounds,onBack,onSave}){
  const [label,setLabel]=useState(round?round.label:'');
  const [start,setStart]=useState(round?round.start:'');
  const [end,setEnd]=useState(round?round.end:'');
  const [copyFrom,setCopyFrom]=useState('');
  const [subRounds,setSubRounds]=useState(round?.subRounds||[]);
  const [editingSub,setEditingSub]=useState(null);
  const [draft,setDraft]=useState({start:'',end:'',confirm:''});

  const inputStyle={width:'100%',border:'1.5px solid #e1e5ec',borderRadius:11,padding:'12px 14px',fontSize:14,outline:'none',color:'#1f2733',background:'#fff'};
  const smallInputStyle={...inputStyle,flex:1,minWidth:120,padding:'7px 10px',fontSize:13};
  const labelStyle={fontSize:12.5,fontWeight:700,color:'#3a4452',marginBottom:7,display:'flex',alignItems:'center',gap:5};
  const canSave=label.trim()&&start.trim()&&end.trim();

  const addSub=()=>{
    const id='sr'+Date.now();
    setSubRounds(s=>[...s,{id,start:'',end:'',confirm:'',confirmed:false}]);
    setEditingSub(id);
    setDraft({start:'',end:'',confirm:''});
  };
  const startEdit=(sr)=>{ setEditingSub(sr.id); setDraft({start:sr.start,end:sr.end,confirm:sr.confirm}); };
  const cancelEdit=(sr)=>{
    if(!sr.start&&!sr.end) setSubRounds(s=>s.filter(x=>x.id!==sr.id));
    setEditingSub(null);
  };
  const commitEdit=(sr)=>{
    setSubRounds(s=>s.map(x=>x.id===sr.id?{...x,start:draft.start,end:draft.end,confirm:draft.confirm,confirmed:!!draft.confirm.trim()}:x));
    setEditingSub(null);
  };
  const removeSub=(sr)=>setSubRounds(s=>s.filter(x=>x.id!==sr.id));

  const doSave=()=>{
    if(!canSave) return;
    const published=subRounds.filter(s=>s.confirmed).map(s=>s.confirm).sort().slice(-1)[0]||'';
    onSave({label,start,end,published,subRounds});
  };

  return (
    <div style={{maxWidth:1180,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
        <button onClick={onBack} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,color:'#5a6473',fontSize:13,fontWeight:600,height:40,padding:'0 16px',borderRadius:11,background:'#fff',border:'1px solid #e3e7ec',cursor:'pointer'}}>
          <i className="bi bi-arrow-left" style={{fontSize:15}}></i>กลับ
        </button>
        <div style={{width:38,height:38,borderRadius:10,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
          <i className="bi bi-calendar2-range" style={{fontSize:17,color:primary}}></i>
        </div>
        <div style={{fontWeight:700,fontSize:17,color:'#1a2332',flex:1}}>{round?'แก้ไขรอบการดำเนินการตามแผนธุรกิจ':'กำหนดรอบการดำเนินการตามแผนธุรกิจ'}</div>
        <button onClick={onBack} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,background:'#e5920b',color:'#fff',border:'none',borderRadius:11,height:40,padding:'0 18px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
          <i className="bi bi-x-lg" style={{fontSize:14}}></i>ยกเลิก
        </button>
        <button onClick={()=>canSave&&doSave()} disabled={!canSave} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,background:canSave?'#1eb372':'#c7ccd4',color:'#fff',border:'none',borderRadius:11,height:40,padding:'0 20px',fontSize:14,fontWeight:700,cursor:canSave?'pointer':'default'}}>
          <i className="bi bi-check-lg" style={{fontSize:16}}></i>บันทึก
        </button>
      </div>

      <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:16,padding:'22px 24px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
        <div style={{marginBottom:18}}>
          <div style={labelStyle}>ชื่อรอบการดำเนินการตามแผนธุรกิจ<span style={{color:'#e0468c'}}>*</span></div>
          <input value={label} onChange={e=>setLabel(e.target.value.slice(0,120))} placeholder="เป้าหมายรอบปี 2024 -2026" style={inputStyle}/>
        </div>
        <div style={{marginBottom:18}}>
          <div style={labelStyle}><i className="bi bi-calendar2-range" style={{fontSize:13,color:'#e5920b'}}></i>ช่วงวันที่ดำเนินการ<span style={{color:'#e0468c'}}>*</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <input value={start} onChange={e=>setStart(e.target.value)} placeholder="dd/MM/yyyy" style={inputStyle}/>
            <input value={end} onChange={e=>setEnd(e.target.value)} placeholder="dd/MM/yyyy" style={inputStyle}/>
          </div>
          <div style={{fontSize:11.5,color:'#9aa3af',marginTop:6}}>ช่วงวันที่สำหรับการวัดผลของรอบแผนธุรกิจ</div>
        </div>
        <div style={{marginBottom:26}}>
          <div style={labelStyle}>คัดลอกข้อมูลจากรอบการดำเนินการตามแผนธุรกิจ</div>
          <div style={{position:'relative'}}>
            <select value={copyFrom} onChange={e=>setCopyFrom(e.target.value)} style={{...inputStyle,appearance:'none',cursor:'pointer',color:copyFrom?'#1f2733':'#9aa3af'}}>
              <option value="">— ไม่คัดลอกข้อมูล —</option>
              {(rounds||[]).filter(r=>!round||r.id!==round.id).map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
            </select>
            <i className="bi bi-chevron-down" style={{position:'absolute',right:14,top:15,fontSize:13,color:'#9aa3af',pointerEvents:'none'}}></i>
          </div>
          <div style={{fontSize:11.5,color:'#9aa3af',marginTop:6,lineHeight:1.6}}>ระบบจะบันทึกเป้าเคยบันทึกไว้ในรอบที่เลือกนี้ โดยจะบันทึกเฉพาะแผนธุรกิจที่ยังอยู่ในช่วงเวลาที่เลือกและเปิดการใช้งานเท่านั้น</div>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:'#3a4452',flex:1}}>รอบการวัดประเมินผล</div>
          <button onClick={addSub} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,background:'#f1f3f6',color:'#3a4452',border:'none',borderRadius:8,height:32,padding:'0 14px',fontSize:12.5,fontWeight:700,cursor:'pointer'}}>
            <i className="bi bi-plus-lg" style={{fontSize:12}}></i>ช่วงประเมินใหม่
          </button>
        </div>

        {subRounds.length===0?(
          <div style={{fontSize:12.5,color:'#b3bac4',padding:'10px 2px'}}>ยังไม่มีรอบการวัดประเมินผล — กด "ช่วงประเมินใหม่" เพื่อเพิ่ม</div>
        ):(
          <div style={{border:'1px solid #eceef2',borderRadius:12,overflow:'hidden'}}>
            {subRounds.map((sr,i)=>{
              const editing=editingSub===sr.id;
              return (
                <div key={sr.id} style={{display:'flex',alignItems:editing?'flex-start':'center',gap:16,padding:'13px 16px',borderTop:i?'1px solid #f0f2f5':'none',flexWrap:'wrap',background:editing?'#fafbfc':'#fff'}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#1a2332',width:64,flex:'none',paddingTop:editing?9:0}}>รอบที่ {i+1}</div>
                  {editing?(
                    <div style={{display:'flex',flexDirection:'column',gap:12,flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,flex:2,minWidth:280}}>
                          <span style={{fontSize:12,color:'#8a93a3',flex:'none'}}>ช่วงวันที่ประเมิน</span>
                          <input value={draft.start} onChange={e=>setDraft(d=>({...d,start:e.target.value}))} placeholder="dd/MM/yyyy" style={smallInputStyle}/>
                          <span style={{color:'#c7ccd4',flex:'none'}}>–</span>
                          <input value={draft.end} onChange={e=>setDraft(d=>({...d,end:e.target.value}))} placeholder="dd/MM/yyyy" style={smallInputStyle}/>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:200}}>
                          <span style={{fontSize:12,color:'#8a93a3',flex:'none'}}>ยืนยันข้อมูล</span>
                          <input value={draft.confirm} onChange={e=>setDraft(d=>({...d,confirm:e.target.value}))} placeholder="dd/MM/yyyy" style={smallInputStyle}/>
                        </div>
                      </div>
                      <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
                        <button onClick={()=>cancelEdit(sr)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,background:'#f1f3f6',color:'#5a6473',border:'none',borderRadius:8,height:32,padding:'0 14px',fontSize:12.5,fontWeight:700,cursor:'pointer'}}>
                          <i className="bi bi-x-lg" style={{fontSize:12}}></i>ยกเลิก
                        </button>
                        <button onClick={()=>commitEdit(sr)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,background:'#1eb372',color:'#fff',border:'none',borderRadius:8,height:32,padding:'0 14px',fontSize:12.5,fontWeight:700,cursor:'pointer'}}>
                          <i className="bi bi-check-lg" style={{fontSize:12}}></i>บันทึก
                        </button>
                      </div>
                    </div>
                  ):(
                    <React.Fragment>
                      <div style={{fontSize:12.5,color:'#5a6473'}}>ช่วงวันที่ประเมิน <span style={{fontWeight:700,color:'#3a4452'}}>{sr.start||'—'} – {sr.end||'—'}</span></div>
                      <div style={{fontSize:12.5,color:'#5a6473'}}>ยืนยันข้อมูล <span style={{fontWeight:700,color:'#3a4452'}}>{sr.confirm||'—'}</span></div>
                      <div style={{flex:1}}></div>
                      {sr.confirmed?(
                        <span style={{display:'inline-flex',alignItems:'center',gap:6,background:'#e7f7ee',color:'#12805e',border:'1px solid #bfe9d6',borderRadius:8,padding:'5px 11px',fontSize:12,fontWeight:700}}>
                          <i className="bi bi-check-circle-fill" style={{fontSize:12.5}}></i>ยืนยันแล้ว
                        </span>
                      ):(
                        <React.Fragment>
                          <ToolBtn icon="bi-pencil" title="แก้ไข" onClick={()=>startEdit(sr)}/>
                          <ToolBtn icon="bi-trash" title="ลบ" onClick={()=>removeSub(sr)} tone="#e0468c"/>
                        </React.Fragment>
                      )}
                    </React.Fragment>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

              <div style={{flex:1}}></div>
              <div style={{fontSize:11.5,color:'#9aa3af',maxWidth:420,lineHeight:1.6,display:'flex',gap:7}}>

}
function MissionMeasureList({round,onBack}){
  const [cfgs,setCfgs]=useState(MEASURE_CFG_SEED);
  const [editing,setEditing]=useState(null); // item being measure-edited
  const [path,setPath]=useState([]); // [{levelKey,item}]

  const parent=path.length?path[path.length-1]:null;
  const levelKey=parent?tierKey(LV(parent.levelKey).tier+1):'mission';
  const L=LV(levelKey);
  const items=levelKey==='mission'?DATA.mission.filter(m=>m.enabled):childrenOf(levelKey,parent.item.id);
  const nextKey=L.tier<4?tierKey(L.tier+1):null;

  const goBack=()=>{ if(path.length) setPath(p=>p.slice(0,-1)); else onBack(); };
  const drillInto=(it)=>setPath(p=>[...p,{levelKey,item:it}]);
  const save=(vals)=>{ setCfgs(c=>({...c,[editing.id]:vals})); setEditing(null); };

  if(editing){
    return <MeasureEditForm mission={editing} cfg={cfgs[editing.id]} onBack={()=>setEditing(null)} onSave={save}/>;
  }

  return (
    <div style={{maxWidth:1040,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:path.length?10:18}}>
        <button onClick={goBack} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,color:'#5a6473',fontSize:13,fontWeight:600,height:40,padding:'0 16px',borderRadius:11,background:'#fff',border:'1px solid #e3e7ec',cursor:'pointer'}}>
          <i className="bi bi-arrow-left" style={{fontSize:15}}></i>กลับ
        </button>
        <div style={{fontWeight:700,fontSize:18,color:'#1a2332'}}>{round.label}</div>
      </div>
      {path.length>0&&(
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:16,fontSize:12.5,color:'#8a93a3'}}>
          <span>{LV('mission').name}</span>
          {path.map((p,i)=>(
            <React.Fragment key={i}>
              <i className="bi bi-chevron-right" style={{fontSize:9}}></i>
              <span style={{color:i===path.length-1?primary:'#8a93a3',fontWeight:i===path.length-1?700:500}}>{LV(p.levelKey).prefix} {p.item.no}</span>
            </React.Fragment>
          ))}
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {items.map(m=>{
          const cfg=cfgs[m.id];
          const activeTags=cfg?MEASURE_DISPLAY_OPTS.filter(o=>cfg[o.key]):[];
          const kidCount=nextKey?childrenOf(nextKey,m.id).length:0;
          return (
            <div key={m.id} className="bp-card" style={{display:'flex',alignItems:'center',gap:16,background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'16px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
              <Avatar name={m.owner} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14.5,color:'#1a2332',marginBottom:9}}>{L.prefix} {m.no} : {m.title}</div>
                {cfg?(
                  <React.Fragment>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:9,fontSize:12.5,color:'#3a4452'}}>
                      <i className="bi bi-record-circle" style={{fontSize:14,color:primary}}></i>{cfg.kpiDesc}
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {activeTags.length?activeTags.map(o=><MeasureChip key={o.key} label={o.label} tone={o.tone}/>):<span style={{fontSize:11.5,color:'#b3bac4'}}>ไม่แสดงผลรูปแบบใด</span>}
                      {cfg.budget>0&&<MeasureChip label={cfg.budget.toLocaleString()+' บาท'} tone="info"/>}
                    </div>
                  </React.Fragment>
                ):<MeasureChip label="ไม่มีตัวชี้วัด" tone="danger"/>}
              </div>
              <div style={{textAlign:'right',flex:'none',width:150}}>
                <div style={{fontSize:11,color:'#9aa3af',marginBottom:5}}>ผู้ประเมินผล</div>
                {cfg&&cfg.assessor?(
                  <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end'}}>
                    <Avatar name={cfg.assessor} size={24}/>
                    <span style={{fontSize:12.5,fontWeight:700,color:'#3a4452'}}>{cfg.assessor}</span>
                  </div>
                ):(
                  <span style={{fontSize:12,color:'#c4ccd4',fontWeight:600}}>ไม่มีผู้ประเมิน</span>
                )}
              </div>
              <button onClick={()=>setEditing(m)} title="แก้ไขตัวชี้วัด" style={{width:36,height:36,borderRadius:'50%',border:'none',background:'#fdefdc',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flex:'none'}}>
                <i className="bi bi-pencil-fill" style={{fontSize:14,color:'#e5920b'}}></i>
              </button>
              {kidCount>0?(
                <button onClick={()=>drillInto(m)} title={'ดู'+LV(nextKey).name+'ภายใต้รายการนี้'} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,background:'#eef1f5',color:'#3a4452',border:'none',borderRadius:8,height:32,padding:'0 14px',fontSize:12,fontWeight:700,cursor:'pointer',flex:'none',whiteSpace:'nowrap'}}>
                  {LV(nextKey).name}<i className="bi bi-chevron-right" style={{fontSize:11}}></i>
                </button>
              ):nextKey&&(
                <span title={'ไม่มี'+LV(nextKey).name} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,background:'#f5f6f8',color:'#c4ccd4',border:'1px solid #eceef2',borderRadius:8,height:32,padding:'0 14px',fontSize:12,fontWeight:700,flex:'none',whiteSpace:'nowrap'}}>
                  ไม่มี{LV(nextKey).name}
                </span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}



/* ═══════════ ROUNDS CONTAINER (list / form / plans) ═══════════ */
function RoundsContainer(){
  const [rounds,setRounds]=useState(ROUND_DATA);
  const [view,setView]=useState('list'); // list | form | plans
  const [active,setActive]=useState(null);

  const openAdd=()=>{setActive(null);setView('form');};
  const openEdit=(r)=>{setActive(r);setView('form');};
  const openPlans=(r)=>{setActive(r);setView('plans');};
  const back=()=>{setView('list');setActive(null);};
  const del=(r)=>setRounds(rs=>rs.filter(x=>x.id!==r.id));
  const save=(vals)=>{
    if(active){ setRounds(rs=>rs.map(x=>x.id===active.id?{...x,...vals}:x)); }
    else{ setRounds(rs=>[{id:Date.now(),cnt:0,...vals},...rs]); }
    back();
  };

  if(view==='form') return <RoundFormView round={active} rounds={rounds} onBack={back} onSave={save}/>;
  if(view==='plans') return <MissionMeasureList round={active} onBack={back}/>;
  return <RoundsView rounds={rounds} onAdd={openAdd} onEdit={openEdit} onPlans={openPlans} onDelete={del}/>;
}

/* ═══════════ MAIN CONTENT ═══════════ */
function Content({level,rounds,dailyTasks,setDailyTasks}){
  const L=LV(level);
  const [view,setView]=useState('list'); // list | form
  const [viewMode,setViewMode]=useState('list'); // list | grid
  const [asc,setAsc]=useState(true);
  const [chain,setChain]=useState(()=>firstChainForLevel(level));
  const [editItem,setEditItem]=useState(null);

  React.useEffect(()=>{setView('list');setEditItem(null);setChain(firstChainForLevel(level));},[level,rounds]);

  if(rounds) return (
    <div style={{flex:1,padding:'22px 26px',overflowY:'auto',height:'calc(100vh - 58px)',minWidth:0}}>
      <RoundsContainer/>
    </div>
  );

  if(view==='form') return (
    <div style={{flex:1,padding:'22px 26px',overflowY:'auto',height:'calc(100vh - 58px)',minWidth:0}}>
      <FormView level={level} chain={chain} setChain={setChain} onBack={()=>{setView('list');setEditItem(null);}} editItem={editItem} dailyTasks={dailyTasks} setDailyTasks={setDailyTasks}/>
    </div>
  );

  const base=level==='mission'?DATA.mission:childrenOf(level,chain[tierKey(L.tier-1)]);
  const items=[...base].sort((a,b)=>asc?a.no.localeCompare(b.no,undefined,{numeric:true}):b.no.localeCompare(a.no,undefined,{numeric:true}));

  return (
    <div style={{flex:1,padding:'22px 26px',overflowY:'auto',height:'calc(100vh - 58px)',minWidth:0}}>
      <div style={{maxWidth:1180,margin:'0 auto'}}>
        {/* header */}
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,flexWrap:'wrap'}}>
          <div style={{width:40,height:40,borderRadius:11,background:L.accent+'16',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
            <i className={'bi '+L.icon} style={{fontSize:19,color:L.accent}}></i>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:18,color:'#1a2332'}}>กำหนด{L.name}</div>
            <div style={{fontSize:12.5,color:'#8a93a3',marginTop:1}}>ลำดับชั้นที่ {L.tier} · ทั้งหมด {items.length} รายการ</div>
          </div>
          <button onClick={()=>setAsc(a=>!a)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,background:'#fff',color:'#5a6473',border:'1px solid #e3e7ec',borderRadius:11,height:40,padding:'0 15px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            <i className={'bi '+(asc?'bi-sort-numeric-down':'bi-sort-numeric-up-alt')} style={{fontSize:15}}></i>เรียงลำดับ
          </button>
          <button onClick={()=>{setEditItem(null);setView('form');}} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,background:primary,color:'#fff',border:'none',borderRadius:11,height:40,padding:'0 18px',fontSize:13.5,fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px rgba(21,160,143,.28)'}}>
            <i className="bi bi-plus-lg" style={{fontSize:15}}></i>เพิ่มรายการใหม่
          </button>
        </div>

        {/* hierarchy chain selector for levels 2-4 */}
        {L.parent&&<ChainSelector level={level} chain={chain} setChain={setChain}/>}

        {/* view toggle */}
        <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
          <div style={{flex:1}}></div>
          <span style={{fontSize:12.5,color:'#8a93a3',marginRight:10}}>เปลี่ยนมุมมอง</span>
          <div style={{display:'flex',background:'#eef1f5',borderRadius:10,padding:3,gap:2}}>
            {[['list','bi-list-ul'],['grid','bi-grid-3x3-gap-fill']].map(([m,ic])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{width:36,height:32,borderRadius:8,border:'none',background:viewMode===m?'#fff':'transparent',boxShadow:viewMode===m?'0 1px 3px rgba(16,24,40,.12)':'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <i className={'bi '+ic} style={{fontSize:15,color:viewMode===m?primary:'#9aa3af'}}></i>
              </button>
            ))}
          </div>
        </div>

        {/* list / grid */}
        {items.length===0?(
          <div style={{background:'#fff',border:'1px dashed #d9dee6',borderRadius:14,padding:'40px 20px',textAlign:'center'}}>
            <i className={'bi '+L.icon} style={{fontSize:30,color:'#c4ccd4'}}></i>
            <div style={{fontSize:13.5,fontWeight:700,color:'#5a6473',marginTop:12}}>ยังไม่มี{L.name}ภายใต้ลำดับชั้นที่เลือก</div>
            <div style={{fontSize:12.5,color:'#9aa3af',marginTop:4}}>กด “เพิ่มรายการใหม่” เพื่อสร้าง{L.name}แรก</div>
          </div>
        ):viewMode==='list'?(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {items.map(it=><ListCard key={it.id} level={level} item={it} onEdit={()=>{setEditItem(it);setView('form');}}/>)}
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
            {items.map(it=><GridCard key={it.id} level={level} item={it} onEdit={()=>{setEditItem(it);setView('form');}}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [level,setLevel]=useState('mission');
  const [rounds,setRounds]=useState(false);
  const [dailyTasks,setDailyTasks]=useState(DAILY_TASKS_SEED);
  return (
    <GD5AppShell active="business" onGoAdmin={()=>{setRounds(false);setLevel('mission');}}>
      <LevelPanel level={level} setLevel={setLevel} rounds={rounds} setRounds={setRounds}/>
      <Content level={level} rounds={rounds} dailyTasks={dailyTasks} setDailyTasks={setDailyTasks}/>
    </GD5AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
