<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สร้างโพสต์ — GiveDeeFive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{box-sizing:border-box}
.bi{vertical-align:-2px}
body{margin:0;font-family:'IBM Plex Sans Thai',sans-serif;color:#1f2733;background:#eef1f6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:none;border:none}
input,textarea,select{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cfd6e0;border-radius:9px}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fld{border:1px solid #e3e7ee;border-radius:12px;background:#fff;transition:border-color .15s, box-shadow .15s}
.fld:focus-within{border-color:#15a08f;box-shadow:0 0 0 3px rgba(21,160,143,.10)}
.ghost:hover{background:#f3f5f8}
.tealbtn:hover{background:#118a7b}
.coralbtn:hover{background:#ec6373}
.addbtn:hover{background:#e3f3f0;border-color:#bfe6df;color:#0f8475}
.tbtn:hover{background:#eef1f5}
.editor:empty:before{content:attr(data-ph);color:#aab2be}
.editor:focus{outline:none}
.rmchip:hover{color:#d83a3a}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="jsx-src">
const {useState, useRef} = React;
const ICON={"tag":"hash","account_balance":"bank","account_circle":"person-circle","account_tree":"diagram-3","add":"plus-lg","add_circle":"plus-circle","add_task":"plus-square","arrow_back":"arrow-left","arrow_drop_down":"caret-down-fill","arrow_drop_up":"caret-up-fill","assignment":"clipboard","attach_file":"paperclip","autorenew":"arrow-repeat","back_hand":"hand-index","bar_chart":"bar-chart","bolt":"lightning-charge","bookmark":"bookmark","bookmark_add":"bookmark-plus","calendar_month":"calendar3","calendar_today":"calendar","campaign":"megaphone","cancel":"x-circle","chat_bubble_outline":"chat","check":"check-lg","check_box":"check-square","check_box_outline_blank":"square","check_circle":"check-circle","checklist":"list-check","chevron_right":"chevron-right","close":"x-lg","content_copy":"files","delete":"trash","description":"file-text","desktop_windows":"display","domain":"building","done_all":"check2-all","donut_small":"pie-chart","download":"download","drag_indicator":"grip-vertical","ecg_heart":"activity","edit":"pencil","edit_note":"pencil-square","engineering":"tools","event":"calendar-event","expand_less":"chevron-up","expand_more":"chevron-down","fact_check":"ui-checks","favorite":"heart","filter_alt_off":"funnel","filter_list":"funnel","format_list_bulleted":"list-ul","forum":"chat-square-text","grid_view":"grid","group":"people","group_add":"person-plus","groups":"people","help":"question-circle","hourglass_bottom":"hourglass-bottom","hourglass_empty":"hourglass","hourglass_top":"hourglass-top","how_to_reg":"person-check","image":"image","inbox":"inbox","ink_eraser":"eraser","insert_chart":"bar-chart","insights":"graph-up","inventory_2":"box-seam","keyboard_arrow_down":"chevron-down","keyboard_arrow_up":"chevron-up","leaderboard":"bar-chart-line","list":"list","lock":"lock","low_priority":"sort-down","menu_book":"book","monitor_heart":"activity","monitoring":"graph-up-arrow","more_vert":"three-dots-vertical","move_up":"arrow-up-square","note_add":"file-earmark-plus","open_in_full":"arrows-fullscreen","open_in_new":"box-arrow-up-right","outbox":"box-arrow-up","palette":"palette","person":"person","play_arrow":"play-fill","play_circle":"play-circle","playlist_add":"list-task","playlist_add_check":"list-check","power_settings_new":"power","public":"globe","push_pin":"pin-angle","radio_button_unchecked":"circle","reply":"reply","search":"search","search_off":"search","send":"send","shield_lock":"shield-lock","shield_person":"shield-check","signpost":"signpost-2","sort":"sort-down","speed":"speedometer2","support":"life-preserver","swap_vert":"arrow-down-up","task_alt":"check2-circle","title":"type","touch_app":"hand-index","trending_up":"graph-up-arrow","tune":"sliders","unfold_more":"chevron-expand","upload_file":"file-earmark-arrow-up","verified_user":"patch-check","videocam":"camera-video","view_agenda":"card-heading","visibility":"eye","volunteer_activism":"hand-heart","waving_hand":"emoji-smile"};
const ICONF={"check_circle":"check-circle-fill","favorite":"heart-fill","person":"person-fill","groups":"people-fill","group":"people-fill","play_circle":"play-circle-fill","lock":"lock-fill","send":"send-fill","push_pin":"pin-angle-fill","verified_user":"patch-check-fill","shield_person":"shield-fill-check","inbox":"inbox-fill","waving_hand":"emoji-smile-fill","fact_check":"ui-checks"};
const primary='#15a08f', primarySoft='#e3f3f0', coral='#f1717f';
const ms=(name,size,color,fill)=>{var c=(fill&&ICONF[name])||ICON[name]||'bi-record-circle';return (<i className={'bi '+(/^bi-/.test(c)?c:'bi-'+c)} style={{fontSize:size,color:color,lineHeight:1,verticalAlign:'middle',display:'inline-flex'}}></i>);};

/* ---------- small reusable bits ---------- */
function Section({label, children, note}){
  return (
    <div style={{marginBottom:22}}>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:13.5,fontWeight:600,color:'#46505f'}}>{label}</span>
        {note}
      </div>
      {children}
    </div>
  );
}

function SideRow({icon, label, onAdd}){
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 2px'}}>
      <span style={{width:34,height:34,borderRadius:9,background:'#f3f5f8',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms(icon,19,'#5a6473')}</span>
      <span style={{flex:1,fontSize:14,fontWeight:600,color:'#3a4452'}}>{label}</span>
      <button onClick={onAdd} className="addbtn" style={{display:'inline-flex',alignItems:'center',gap:5,border:'1px solid #e3e7ee',color:'#5a6473',borderRadius:9,padding:'6px 12px',fontSize:13,fontWeight:600,transition:'all .15s'}}>
        <i className="bi bi-plus-lg" style={{fontSize:13}}></i>เพิ่ม
      </button>
    </div>
  );
}

function Chips({items, onRemove, color}){
  if(!items.length) return null;
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:2,paddingLeft:46,marginBottom:4}}>
      {items.map((t,i)=>(
        <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,background:color.bg,color:color.fg,borderRadius:8,padding:'4px 6px 4px 10px',fontSize:12.5,fontWeight:600}}>
          {t}
          <button onClick={()=>onRemove(i)} className="rmchip" style={{color:color.fg,opacity:.65,display:'flex'}}><i className="bi bi-x" style={{fontSize:15}}></i></button>
        </span>
      ))}
    </div>
  );
}

/* ---------- rich text toolbar ---------- */
function Toolbar({onCmd}){
  const [size,setSize]=useState('3');
  const btns=[['bi-type-bold','bold'],['bi-type-italic','italic'],['bi-type-underline','underline'],['bi-type-strikethrough','strikeThrough']];
  return (
    <div style={{display:'flex',alignItems:'center',gap:4,padding:'7px 10px',borderBottom:'1px solid #eef0f4'}}>
      <select value={size} onChange={(e)=>{setSize(e.target.value);onCmd('fontSize',e.target.value);}}
        style={{border:'1px solid #e3e7ee',borderRadius:8,padding:'5px 8px',fontSize:13,color:'#46505f',background:'#fff',outline:'none',marginRight:4}}>
        <option value="2">เล็ก</option><option value="3">ปกติ</option><option value="5">ใหญ่</option>
      </select>
      <div style={{width:1,height:20,background:'#e7eaef',margin:'0 4px'}}></div>
      {btns.map(([ic,cmd])=>(
        <button key={cmd} onMouseDown={(e)=>{e.preventDefault();onCmd(cmd);}} className="tbtn"
          style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#46505f'}}>
          <i className={'bi '+ic} style={{fontSize:16}}></i>
        </button>
      ))}
      <div style={{width:1,height:20,background:'#e7eaef',margin:'0 4px'}}></div>
      {[['bi-list-ol','insertOrderedList'],['bi-list-ul','insertUnorderedList']].map(([ic,cmd])=>(
        <button key={cmd} onMouseDown={(e)=>{e.preventDefault();onCmd(cmd);}} className="tbtn"
          style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#46505f'}}>
          <i className={'bi '+ic} style={{fontSize:16}}></i>
        </button>
      ))}
    </div>
  );
}

const inputStyle={width:'100%',border:'none',outline:'none',background:'transparent',fontSize:14.5,color:'#1f2733',padding:'13px 15px'};
const taStyle={width:'100%',border:'none',outline:'none',background:'transparent',fontSize:14.5,color:'#1f2733',padding:'13px 15px',resize:'vertical',minHeight:62,lineHeight:1.55};

function App(){
  const [title,setTitle]=useState('');
  const [help,setHelp]=useState(false);
  const [theme,setTheme]=useState('ทั่วไป (ไม่ติดธีม)');
  const [tags,setTags]=useState([]);
  const [hashtags,setHashtags]=useState(['#GiveDeeFive']);
  const [wis,setWis]=useState([]);
  const edRef=useRef(null);
  const cmd=(c,v)=>{ if(edRef.current) edRef.current.focus(); document.execCommand(c,false,v); };
  const addTo=(setter,promptLabel,prefix)=>{ const v=window.prompt(promptLabel); if(v&&v.trim()) setter(a=>[...a,(prefix||'')+v.trim()]); };

  return (
    <div style={{minHeight:'100vh',position:'relative'}}>

      {/* ===== dimmed app behind ===== */}
      <div style={{position:'fixed',inset:0,filter:'blur(1.5px)',opacity:.55,pointerEvents:'none'}}>
        <div style={{height:58,background:'#fff',borderBottom:'1px solid #e7eaef',display:'flex',alignItems:'center',gap:14,padding:'0 18px'}}>
          <div style={{width:34,height:34,borderRadius:9,background:primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800}}>G</div>
          <div style={{width:300,height:34,borderRadius:10,background:'#f0f2f5'}}></div>
          <div style={{flex:1}}></div>
          <div style={{width:120,height:34,borderRadius:10,background:'#f0f2f5'}}></div>
        </div>
        <div style={{display:'flex'}}>
          <div style={{width:60,height:'calc(100vh - 58px)',background:'#fff',borderRight:'1px solid #e7eaef'}}></div>
          <div style={{flex:1,padding:24}}>
            <div style={{maxWidth:900,height:200,borderRadius:16,background:'#fff'}}></div>
          </div>
        </div>
      </div>

      {/* ===== overlay ===== */}
      <div style={{position:'fixed',inset:0,background:'rgba(17,24,39,.42)',animation:'fadeIn .2s ease'}}></div>

      {/* ===== modal ===== */}
      <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:'30px 24px'}}>
        <div style={{width:'100%',maxWidth:1080,maxHeight:'90vh',background:'#fff',borderRadius:18,boxShadow:'0 24px 70px rgba(16,24,40,.28)',display:'flex',flexDirection:'column',overflow:'hidden',animation:'modalIn .25s cubic-bezier(.2,.7,.3,1)'}}>

          {/* header */}
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'16px 20px',borderBottom:'1px solid #eef0f4',flex:'none'}}>
            <div style={{width:30,height:30,borderRadius:8,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('edit_note',20,primary)}</div>
            <span style={{fontSize:16.5,fontWeight:700,letterSpacing:'.1px'}}>สร้างโพสต์</span>
            <div style={{flex:1}}></div>
            <button className="ghost" style={{width:36,height:36,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#8a93a3'}}>{ms('open_in_full',19,'#8a93a3')}</button>
            <a href="dashboard.html" className="ghost" style={{width:36,height:36,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#8a93a3'}}>{ms('close',22,'#8a93a3')}</a>
          </div>

          {/* author */}
          <div style={{display:'flex',alignItems:'flex-start',gap:13,padding:'16px 24px 4px'}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:18,flex:'none'}}>P</div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15}}>Piyawat Takaew</div>
              <div style={{fontSize:12.5,color:'#8a93a3',lineHeight:1.5,marginTop:2}}>เพิ่มแฮชแท็กได้โดยพิมพ์ <span style={{color:primary,fontWeight:600}}>#</span> ตามด้วยชื่อแฮชแท็ก ในช่องเนื้อหาต่าง ๆ</div>
            </div>
          </div>

          {/* body: two columns */}
          <div style={{display:'flex',gap:0,padding:'14px 24px 0',overflowY:'auto',flex:1}}>

            {/* LEFT */}
            <div style={{flex:'1 1 0',minWidth:0,paddingRight:26}}>

              <Section label="ชื่อเรื่อง"
                note={<span style={{fontSize:12,color:title.length>0&&title.length<4?'#d8743a':'#aab2be'}}>{title.length} / 255</span>}>
                <div className="fld">
                  <input value={title} maxLength={255} onChange={(e)=>setTitle(e.target.value)} placeholder="ตั้งชื่อเรื่องของโพสต์" style={inputStyle}/>
                </div>
                <div style={{fontSize:11.5,color:'#aab2be',marginTop:6}}>ต้องการตัวอักษร 4 ตัวขึ้นไป</div>
              </Section>

              <Section label="เรื่องที่ต้องการแชร์">
                <div className="fld" style={{overflow:'hidden'}}>
                  <Toolbar onCmd={cmd}/>
                  <div ref={edRef} className="editor" contentEditable suppressContentEditableWarning data-ph="แบ่งปันสิ่งที่คุณอยากเล่า…"
                    style={{minHeight:96,padding:'14px 15px',fontSize:14.5,lineHeight:1.6,color:'#1f2733'}}></div>
                </div>
                <div style={{fontSize:11.5,color:'#aab2be',marginTop:6}}>ต้องการตัวอักษร 4 ตัวขึ้นไป</div>
              </Section>

              <Section label="สิ่งที่ได้เรียนรู้ด้วยตัวเอง">
                <div className="fld"><textarea placeholder="บทเรียนหรือสิ่งที่ได้เรียนรู้…" style={taStyle}></textarea></div>
              </Section>

              <Section label="ข้อเสนอแนะ / ปรับปรุง">
                <div className="fld"><textarea placeholder="ข้อเสนอแนะ (ถ้ามี)" style={taStyle}></textarea></div>
              </Section>

              {/* help */}
              <div style={{marginBottom:24}}>
                <label style={{display:'inline-flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:help?12:0,userSelect:'none'}}>
                  <span onClick={()=>setHelp(h=>!h)} style={{width:22,height:22,borderRadius:7,border:'2px solid '+(help?primary:'#cfd6e0'),background:help?primary:'#fff',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}>
                    {help && <i className="bi bi-check" style={{color:'#fff',fontSize:16}}></i>}
                  </span>
                  <span onClick={()=>setHelp(h=>!h)} style={{display:'inline-flex',alignItems:'center',gap:7,fontSize:14,fontWeight:600,color:help?'#1f2733':'#5a6473'}}>{ms('volunteer_activism',19,help?coral:'#b3bac4')}ต้องการความช่วยเหลือ</span>
                </label>
                {help && (
                  <div className="fld" style={{display:'flex',gap:0,overflow:'hidden',animation:'fadeIn .2s ease',borderColor:'#fbd9dd'}}>
                    <div style={{width:52,background:'#fdeef0',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('support',24,coral)}</div>
                    <textarea autoFocus placeholder="อธิบายเรื่องที่ต้องการให้ช่วยเหลือ…" style={{...taStyle,minHeight:70}}></textarea>
                  </div>
                )}
              </div>
            </div>

            {/* RIGHT */}
            <div style={{flex:'0 0 320px',width:320,borderLeft:'1px solid #eef0f4',paddingLeft:24}}>

              <div style={{marginBottom:6}}>
                <div style={{fontSize:13.5,fontWeight:600,color:'#46505f',marginBottom:8}}>เลือกธีม</div>
                <div className="fld" style={{display:'flex',alignItems:'center',gap:10,padding:'4px 6px 4px 14px'}}>
                  {ms('palette',20,'#5a6473')}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:10.5,color:'#aab2be'}}>ประเภทโพสต์</div>
                    <select value={theme} onChange={(e)=>setTheme(e.target.value)} style={{border:'none',outline:'none',background:'transparent',fontSize:14,fontWeight:600,color:'#1f2733',width:'100%',padding:'1px 0 4px',cursor:'pointer',appearance:'none'}}>
                      <option>ทั่วไป (ไม่ติดธีม)</option>
                      <option>พันธกิจที่ 1 : EDR</option>
                      <option>พันธกิจที่ 2 : GiveDeeFive</option>
                      <option>AAR / บทเรียน</option>
                    </select>
                  </div>
                  {ms('unfold_more',20,'#9aa3af')}
                </div>
              </div>

              <div style={{height:1,background:'#f0f2f5',margin:'10px 0 4px'}}></div>

              <SideRow icon="group_add" label="แท็ก" onAdd={()=>addTo(setTags,'พิมพ์ชื่อผู้ที่ต้องการแท็ก','@')}/>
              <Chips items={tags} onRemove={(i)=>setTags(a=>a.filter((_,j)=>j!==i))} color={{bg:'#eef3ff',fg:'#3b6fd4'}}/>

              <SideRow icon="tag" label="แฮชแท็ก" onAdd={()=>addTo(setHashtags,'พิมพ์แฮชแท็ก','#')}/>
              <Chips items={hashtags} onRemove={(i)=>setHashtags(a=>a.filter((_,j)=>j!==i))} color={{bg:primarySoft,fg:'#0f8475'}}/>

              <SideRow icon="menu_book" label="แนะนำเอกสาร WI" onAdd={()=>addTo(setWis,'พิมพ์ชื่อเอกสาร WI','')}/>
              <Chips items={wis} onRemove={(i)=>setWis(a=>a.filter((_,j)=>j!==i))} color={{bg:'#f4eefe',fg:'#7c3aed'}}/>

              {/* attachments */}
              <div style={{marginTop:14,border:'1px dashed #d7dde6',borderRadius:14,padding:16,background:'#fafbfc'}}>
                <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:13}}>
                  <span style={{width:34,height:34,borderRadius:9,background:'#fff',border:'1px solid #e7eaef',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('attach_file',19,'#5a6473')}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:'#3a4452'}}>ไฟล์แนบ</div>
                    <div style={{fontSize:11.5,color:'#9aa3af'}}>จำกัดไฟล์ไม่เกิน 20 ไฟล์</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="addbtn" style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,border:'1px solid #e3e7ee',background:'#fff',color:'#5a6473',borderRadius:10,padding:'9px 0',fontSize:13,fontWeight:600,transition:'all .15s'}}>{ms('image',18,'#5a6473')}รูปภาพ/ไฟล์</button>
                  <button className="addbtn" style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,border:'1px solid #e3e7ee',background:'#fff',color:'#5a6473',borderRadius:10,padding:'9px 0',fontSize:13,fontWeight:600,transition:'all .15s'}}>{ms('videocam',18,'#5a6473')}วิดีโอ</button>
                </div>
              </div>
            </div>
          </div>

          {/* footer */}
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'15px 24px',borderTop:'1px solid #eef0f4',flex:'none'}}>
            <div style={{flex:1}}></div>
            <a href="dashboard.html" className="ghost" style={{padding:'10px 18px',borderRadius:11,fontSize:14,fontWeight:600,color:'#8a93a3'}}>ยกเลิก</a>
            <button className="tealbtn" style={{display:'inline-flex',alignItems:'center',gap:7,background:primary,color:'#fff',borderRadius:11,padding:'11px 22px',fontSize:14.5,fontWeight:700,boxShadow:'0 2px 8px rgba(21,160,143,.28)',transition:'background .15s'}}>{ms('send',18,'#fff')}โพสต์</button>
            <a href="create-command.html" className="coralbtn" style={{display:'inline-flex',alignItems:'center',gap:7,background:coral,color:'#fff',borderRadius:11,padding:'11px 22px',fontSize:14.5,fontWeight:700,boxShadow:'0 2px 8px rgba(241,113,127,.30)',transition:'background .15s'}}>{ms('back_hand',18,'#fff')}โพสต์ + สั่งการ</a>
          </div>

        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  var src=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
