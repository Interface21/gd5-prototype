function PMCard({d}){
  const overdue=d.status==='overdue', done=d.status==='done';
  const barColor=done?'#22b96a':'#5b8def';
  const chipBg=overdue?'#fdecec':'#eafaf0', chipInk=overdue?'#d8513a':'#1f9d57';
  const chipLabel=done?'เสร็จแล้ว':(overdue?'เกิน '+d.day+' วัน':'อีก '+d.day+' วัน');
  return (
    <a href="user-virtual-meeting-group.html?tab=todo" className="grp-card" style={{textDecoration:'none',color:'inherit',background:'#fff',border:'1px solid #eceef2',borderRadius:13,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'14px 15px',display:'flex',flexDirection:'column',gap:9,cursor:'pointer'}}>

      <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:'#5a6473',minWidth:0}}>{ms('account_balance',16,'#9aa3af')}<span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.college}</span></div>
      <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:'#5a6473'}}><span style={{fontWeight:700,color:'#9aa3af',width:16,textAlign:'center',flex:'none'}}>฿</span><span>{d.value}</span></div>
      <div style={{display:'flex',alignItems:'center',gap:9}}>
        {done?ms('check_circle',19,'#22b96a',true):<span style={{width:16,height:16,borderRadius:4,border:'2px solid #c2cad4',flex:'none'}}></span>}
        <div style={{flex:1,height:8,borderRadius:99,background:'#eef1f5',overflow:'hidden'}}><div style={{width:d.pct+'%',height:'100%',background:barColor,borderRadius:99}}></div></div>
        <span style={{fontSize:12,fontWeight:700,color:'#3a4452',width:48,textAlign:'right',flex:'none'}}>{d.pct}%</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:'#5a6473',flexWrap:'wrap'}}>
        {ms('assignment',16,'#9aa3af')}
        <span style={{background:'#eef1f5',color:'#5a6473',borderRadius:7,padding:'2px 10px',fontWeight:600}}>{d.done}/{d.total}</span>
        {d.near>0 && <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fcf3c7',color:'#a9870a',borderRadius:7,padding:'2px 9px',fontSize:12,fontWeight:700}}>{ms('hourglass_top',14,'#caa204')}{d.near}</span>}
        {d.over>0 && <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fdecec',color:'#d8513a',borderRadius:7,padding:'2px 9px',fontSize:12,fontWeight:700}}>{ms('hourglass_bottom',14,'#d8513a')}{d.over}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,color:'#5a6473'}}>
        {ms('calendar_month',16,'#9aa3af')}<span>{d.date}</span>
        <span style={{display:'inline-flex',alignItems:'center',gap:4,background:chipBg,color:chipInk,borderRadius:7,padding:'2px 9px',fontSize:11.5,fontWeight:700}}>{ms(done?'check':(overdue?'hourglass_bottom':'hourglass_top'),13,chipInk)}{chipLabel}</span>

          <div key={i} style={{width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></div>
        ))}
        <div style={{width:36,height:36,borderRadius:'50%',background:'#f0f2f5',display:'flex',alignItems:'center',justifyContent:'center',marginTop:4}}><i className="bi bi-chevron-down" style={{fontSize:18,color:'#5a6473'}}></i></div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,padding:'22px 26px',minWidth:0}}>
       <div style={{maxWidth:1500,margin:'0 auto',display:'flex',gap:26,alignItems:'flex-start'}}>

        {/* CONTENT */}
        <div style={{flex:1,minWidth:0}}>
          {/* TABS + SEARCH */}
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:18}}>
            <div style={{display:'flex',alignItems:'center',gap:26}}>
              {TABS.map(t=>{const a=tab===t.key;return (
                <button key={t.key} onClick={()=>setTab(t.key)} style={{border:'none',background:'transparent',padding:'0 0 10px',fontSize:14,fontWeight:a?700:600,color:a?primary:'#8a93a3',borderBottom:'2.5px solid '+(a?primary:'transparent')}}>{t.label}</button>
              );})}
            </div>
            <div style={{flex:1}}></div>
            <div style={{display:'flex',alignItems:'center',gap:8,background:'#fff',border:'1px solid #e7eaef',borderRadius:11,padding:'7px 8px 7px 13px'}}>
              <i className="bi bi-search" style={{fontSize:15,color:'#9aa3af'}}></i>
              <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="ค้นหากลุ่มของคุณ" style={{border:'none',outline:'none',fontSize:13,width:200,background:'transparent',color:'#1f2733'}}/>
              <button style={{background:primary,color:'#fff',border:'none',borderRadius:8,padding:'6px 16px',fontSize:13,fontWeight:600}}>ค้นหา</button>
            </div>
            <button title="สร้างกลุ่มใหม่" style={{width:38,height:38,borderRadius:'50%',border:'1.5px solid '+primary,background:'#fff',color:primary,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('add',23,primary)}</button>
          </div>

          {/* MODE BAR */}
          <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            {mode==='easypm' && <div style={{display:'inline-flex',alignItems:'center',gap:7,fontSize:13.5,fontWeight:700,color:'#3a4452',paddingTop:5}}>{ms('swap_vert',18,'#8a93a3')}ครุภัณฑ์ 69 <span style={{color:'#9aa3af',fontWeight:500}}>(12)</span></div>}
            <div style={{flex:1}}></div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}}>
              <div style={{display:'inline-flex',background:'#eef1f5',borderRadius:10,padding:3,gap:2}}>
                {[['normal','view_list','โหมดทั่วไป'],['easypm','grid_view','โหมด Easy PM']].map(([k,ic,lb])=>{const a=mode===k;return (
                  <button key={k} onClick={()=>setMode(k)} style={{display:'inline-flex',alignItems:'center',gap:6,border:'none',borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer',background:a?'#fff':'transparent',color:a?primary:'#5a6473',boxShadow:a?'0 1px 3px rgba(16,24,40,.12)':'none'}}>{ms(ic,17,a?primary:'#8a93a3')}{lb}</button>
                );})}
              </div>
              {mode==='easypm' && (
                <div style={{display:'inline-flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {[['all','ทั้งหมด'],['progress','ที่อยู่ระหว่างดำเนินการ'],['overdue','เกินสัญญา'],['done','เสร็จแล้ว']].map(([k,lb])=>{const a=pmFilter===k;return (
                    <button key={k} onClick={()=>setPmFilter(k)} style={{border:'1px solid '+(a?primary:'#e3e7ec'),background:a?primarySoft:'#fff',color:a?primary:'#5a6473',borderRadius:99,padding:'5px 13px',fontSize:12.5,fontWeight:a?700:600,cursor:'pointer'}}>{lb}</button>
                  );})}
                </div>
              )}
            </div>
          </div>

          {mode==='easypm' ? (
           <div style={{animation:'fadeIn .2s ease'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(292px,1fr))',gap:14}}>
              {pmList.map((d,i)=>(<PMCard key={i} d={d}/>))}
            </div>
            {pmList.length===0 && (<div style={{textAlign:'center',color:'#aeb6c2',fontSize:13.5,padding:'50px 0',border:'1px dashed #e4e8ee',borderRadius:12}}>{ms('inventory_2',34,'#cfd6e0')}<div style={{marginTop:8}}>ไม่พบรายการในสถานะนี้</div></div>)}
           </div>
          ) : tab==='mine' ? (
           <div style={{animation:'fadeIn .2s ease'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,color:'#5a6473'}}>
              {ms('push_pin',19,primary,true)}<span style={{fontWeight:700,fontSize:13.5,color:'#3a4452'}}>กลุ่มที่ปักหมุด</span>
              <span style={{fontSize:12.5,color:'#9aa3af',fontWeight:500}}>· {featured.length} กลุ่ม</span>
              <div style={{flex:1}}></div>
              <div style={{display:'inline-flex',alignItems:'center',gap:6,color:'#9aa3af',fontSize:13}}>{ms('swap_vert',18,'#9aa3af')}ทั้งหมด ({total})</div>
            </div>

            {/* FEATURED GRID */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(232px,1fr))',gap:16,marginBottom:22}}>
              {featured.map((g,i)=>(
                <div key={i} className="grp-card" style={{background:'#fff',border:'1px solid #eceef2',borderRadius:13,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>
                  <div style={{position:'absolute',top:9,left:9,zIndex:2,width:24,height:24,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(16,24,40,.14)',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('push_pin',15,primary,true)}</div>
                  <Banner kind={g.banner}/>
                  <div style={{padding:'14px 15px 16px',display:'flex',flexDirection:'column',flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.title}</div>
                    <div style={{fontSize:12.5,color:'#9aa3af',textAlign:'center',marginTop:5,lineHeight:1.5,minHeight:36}}>{g.desc}</div>
                    <div style={{fontSize:12,color:'#9aa3af',textAlign:'center',marginTop:8}}>สมาชิก {g.members} คน{g.unread>0 && <span style={{color:'#d8513a',fontWeight:600}}> · {g.unread} ยังไม่ได้อ่าน</span>} · โพสต์ {g.posts}</div>
                    <div style={{display:'flex',justifyContent:'center',marginTop:12}}><Avatars n={g.av} extra={g.extra>0?g.extra:null}/></div>
                    <div style={{flex:1}}></div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:14}}>
                      <a href="user-virtual-meeting-group.html" className="ghost-btn" style={{flex:1,textAlign:'center',border:'1px solid #e3e7ec',background:'#fff',borderRadius:9,padding:'8px 0',fontSize:13,fontWeight:600,color:'#3a4452'}}>ดูกลุ่ม</a>
                      <button title="ปักหมุดอยู่" style={{width:36,height:36,borderRadius:9,border:'1px solid '+primarySoft,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('push_pin',18,primary,true)}</button>
                      <IconBtn icon="chat_bubble_outline"/>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* LIST ROWS (2 per row) */}
            <div style={{display:'flex',alignItems:'center',gap:8,margin:'4px 0 13px',color:'#5a6473'}}>
              <span style={{fontWeight:700,fontSize:13.5,color:'#3a4452'}}>กลุ่มอื่น ๆ</span>
              <span style={{fontSize:12.5,color:'#9aa3af'}}>· {groups.length} กลุ่ม</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {groups.map((g,i)=>(
                <div key={i} className="grp-row" style={{background:'#fff',border:'1px solid #eceef2',borderRadius:13,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'13px 15px',display:'flex',alignItems:'center',gap:13}}>
                  <Thumb kind={g.thumb}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.title}</div>
                    <div style={{marginTop:4}}><MetaLine m={g.members} unread={g.unread} posts={g.posts}/></div>
                    <div style={{marginTop:8}}><Avatars n={g.av} extra={g.extra}/></div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,flex:'none'}}>
                    <IconBtn icon="push_pin"/>
                    <IconBtn icon="chat_bubble_outline"/>
                    <a href="user-virtual-meeting-group.html" className="ghost-btn" style={{border:'1px solid #e3e7ec',background:'#fff',borderRadius:9,padding:'8px 16px',fontSize:13,fontWeight:600,color:'#3a4452'}}>ดูกลุ่ม</a>
                  </div>
                </div>
              ))}
            </div>
            {featured.length===0 && groups.length===0 && (
              <div style={{textAlign:'center',color:'#aeb6c2',fontSize:13.5,padding:'50px 0',border:'1px dashed #e4e8ee',borderRadius:12}}>{ms('search_off',34,'#cfd6e0')}<div style={{marginTop:8}}>ไม่พบกลุ่มที่ค้นหา</div></div>
            )}
           </div>
          ) : (
           <div style={{animation:'fadeIn .2s ease',textAlign:'center',color:'#aeb6c2',fontSize:13.5,padding:'70px 0',border:'1px dashed #e4e8ee',borderRadius:14,background:'#fff'}}>
             {ms(tab==='invite'?'mail':tab==='request'?'how_to_reg':'lock',40,'#cfd6e0')}
             <div style={{marginTop:10,fontWeight:600,color:'#9aa3af'}}>{tab==='invite'?'ยังไม่มีคำเชิญเข้ากลุ่ม':tab==='request'?'ยังไม่มีคำขอเข้ากลุ่ม':'ยังไม่มีกลุ่มที่ปิดถาวร'}</div>
           </div>
          )}
        </div>

        {/* RIGHT SIDEBAR */}
        <div style={{width:320,flex:'none'}}>
          <div style={{fontWeight:700,fontSize:17,marginBottom:14}}>กลุ่มที่คุณอาจสนใจ</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {SUGGEST.map((g,i)=>(
              <div key={i} style={{background:'#fff',border:'1px solid #eceef2',borderRadius:13,overflow:'hidden'}}>
                <Banner kind="teal" h={76}/>
                <div style={{padding:'12px 15px 15px'}}>
                  <div style={{fontWeight:700,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.title}</div>
                  <div style={{fontSize:12,color:'#9aa3af',marginTop:4}}>สมาชิก {g.members} คน · โพสต์ {g.posts}</div>
                  <div style={{marginTop:9}}><Avatars n={5} extra={g.extra}/></div>
                  <button className="join-btn" style={{width:'100%',marginTop:13,background:primary,color:'#fff',border:'none',borderRadius:9,padding:'8px 0',fontSize:13,fontWeight:700}}>เข้าร่วม</button>
                </div>
              </div>
            ))}
          </div>
          <button style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,width:'100%',marginTop:16,background:'transparent',border:'none',color:primary,fontSize:13.5,fontWeight:700}}>{ms('expand_more',20,primary)}ดูเพิ่ม</button>
        </div>

       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  var src = document.getElementById('jsx-src').textContent;
  var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
