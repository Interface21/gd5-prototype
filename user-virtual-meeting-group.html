function GanttView({topics}){
  const [filter,setFilter]=React.useState('all'); // 'all' | topic index
  const DAY=86400000;
  const base=new Date(2026,0,1);
  const todayDay=13; // 14 Jan 2026
  const fmt=(d)=>{const dt=new Date(base.getTime()+d*DAY);return dt.getDate()+'/'+(dt.getMonth()+1);};
  // build rows with synthetic date ranges (prototype: seed has no explicit ranges)
  let rows=[];
  topics.forEach((t,ti)=>{
    if(filter!=='all' && ti!==filter) return; // ti kept = original index → ranges stable
    const tStart=ti*2;
    const subRows=t.subs.map((s,i)=>{
      const start=tStart+i*2;
      const dur=8+((i+ti)%3)*6;
      const end=start+dur;
      let color = s.done?'#37b86e' : s.daysType==='over'?'#ef9a9a' : (s.op||s.days>0)?'#7aa7d9' : '#d6dce3';
      return {type:'sub',title:s.title,start,end,color};
    });
    rows.push({type:'topic',title:t.title});
    subRows.forEach(r=>rows.push(r));
  });
  const maxEnd=Math.max(49,...rows.filter(r=>r.type==='sub').map(r=>r.end));
  const total=maxEnd+3;
  const pct=(d)=>(d/total*100)+'%';
  const ticks=[];for(let d=0;d<=total-3;d+=7)ticks.push(d);
  const LBL=232;

  return (
   <div>
    {/* topic filter */}
    <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexWrap:'wrap'}}>
      {ms('filter_list',18,'#8a93a3')}
      <span style={{fontSize:12.5,color:'#8a93a3',fontWeight:600}}>หัวข้อหลัก</span>
      <select value={filter} onChange={(e)=>setFilter(e.target.value==='all'?'all':parseInt(e.target.value,10))} style={{flex:'1 1 200px',maxWidth:360,border:'1px solid #e3e7ec',borderRadius:9,padding:'8px 11px',fontSize:13,color:'#2b3440',fontFamily:'inherit',outline:'none',cursor:'pointer',background:'#fff'}}>
        <option value="all">ทุกหัวข้อ ({topics.length})</option>
        {topics.map((t,i)=>(<option key={i} value={i}>{t.title}</option>))}
      </select>
      {filter!=='all' && <button onClick={()=>setFilter('all')} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,fontWeight:600,color:primary}}>{ms('close',16,primary)}ล้าง</button>}
    </div>
    {/* today label */}
    <div style={{display:'flex'}}>
      <div style={{width:LBL,flex:'none'}}></div>
      <div style={{flex:1,position:'relative',height:20}}>
        <div style={{position:'absolute',left:pct(todayDay),transform:'translateX(-50%)',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <span style={{fontSize:11,color:'#1f9d57',fontWeight:700}}>วันนี้</span>
        </div>
      </div>
    </div>

    <div style={{position:'relative',borderTop:'1px solid #f1f3f6'}}>
      {/* plot overlay: gridlines + today line */}
      <div style={{position:'absolute',left:LBL,right:0,top:0,bottom:0,pointerEvents:'none'}}>
        {ticks.map((d,i)=>(<div key={i} style={{position:'absolute',left:pct(d),top:0,bottom:0,width:1,background:'#f4f6f8'}}></div>))}
        <div style={{position:'absolute',left:pct(todayDay),top:0,bottom:0,width:2,marginLeft:-1,background:'#37b86e',opacity:.45}}></div>
      </div>
      {/* rows */}
      {rows.map((r,i)=> r.type==='topic' ? (
        <div key={i} style={{display:'flex',alignItems:'center',minHeight:34,borderTop:i?'1px solid #f4f6f8':'none'}}>
          <div style={{width:LBL,flex:'none',paddingRight:14,fontWeight:700,fontSize:12.5,color:'#2b3440',lineHeight:1.3,paddingTop:6,paddingBottom:6,textWrap:'pretty'}}>{r.title}</div>
          <div style={{flex:1}}></div>
        </div>
      ) : (
        <div key={i} style={{display:'flex',alignItems:'center',minHeight:30}}>
          <div style={{width:LBL,flex:'none',paddingLeft:8,paddingRight:14,fontSize:12,color:'#5a6473',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.title}</div>
          <div style={{flex:1,position:'relative',height:30}}>
            <div style={{position:'absolute',top:'50%',transform:'translateY(-50%)',left:pct(r.start),width:pct(r.end-r.start),height:11,borderRadius:99,background:r.color}}></div>
          </div>
        </div>
      ))}
    </div>

    {/* axis */}

function TodoPanel(){
  const [mode,setMode]=React.useState('do');   // 'do' | 'edit'
  const [calView,setCalView]=React.useState(false); // false = list, true = gantt
  const [topics,setTopics]=React.useState(TD_SEED);
  const [open,setOpen]=React.useState(()=>{const o={};o[TD_SEED[0].id]=true;o[TD_SEED[1].id]=true;return o;});
  const [modal,setModal]=React.useState(null);

  const cnt=(t)=>({done:t.subs.filter(s=>s.done).length,total:t.subs.length});
  const complete=(t)=>{const c=cnt(t);return c.total>0&&c.done===c.total;};
  const overallN=topics.length, overallDone=topics.filter(complete).length;
  const overallPct=overallN?Math.round(overallDone/overallN*1000)/10:0;

  const toggleOpen=(id)=>setOpen(o=>({...o,[id]:!o[id]}));
  const toggleDone=(tid,sid)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.map(s=>s.id!==sid?s:{...s,done:!s.done})}));
  const moveTopic=(i,dir)=>setTopics(ts=>{const a=[...ts],j=i+dir;if(j<0||j>=a.length)return ts;const x=a[i];a[i]=a[j];a[j]=x;return a;});
  const delTopic=(id)=>setTopics(ts=>ts.filter(t=>t.id!==id));
  const delSub=(tid,sid)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.filter(s=>s.id!==sid)}));
  const addTopic=(d)=>setTopics(ts=>[...ts,{id:uid(),title:d.title||'หัวข้อใหม่',inContract:d.inContract,subs:[]}]);
  const editTopic=(id,d)=>setTopics(ts=>ts.map(t=>t.id!==id?t:{...t,title:d.title,inContract:d.inContract}));
  const addSub=(tid,d)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:[...t.subs,sub(d.title||'รายการใหม่',false,'',0,'left',d.inContract,null)]}));
  const editSub=(tid,sid,d)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.map(s=>s.id!==sid?s:{...s,title:d.title,inContract:d.inContract})}));

  const Count=({c})=>{const done=c.total&&c.done===c.total;return <span style={{minWidth:30,textAlign:'right',color:done?'#22b573':'#aab2bd',fontWeight:600,fontSize:12,flex:'none'}}>{c.done}/{c.total||0}</span>;};
  const MiniBar=({c})=>{const p=c.total?c.done/c.total*100:0,done=p>=100;return <span style={{width:96,height:5,background:'#eef1f5',borderRadius:99,overflow:'hidden',flex:'none'}}><span style={{display:'block',height:'100%',borderRadius:99,background:done?'#22b573':'#15a08f',width:p+'%'}}></span></span>;};

  const ICONBTN=(icon,active,onClick,title)=>(<button onClick={onClick} title={title} style={{width:34,height:32,borderRadius:8,border:'1px solid '+(active?primary:'#e7eaef'),background:active?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(icon,18,active?primary:'#8a93a3')}</button>);

  return (
   <div>
    <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'16px 18px'}}>
      {/* TOOLBAR */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,flexWrap:'wrap'}}>
        <div style={{fontWeight:700,fontSize:15}}>สิ่งที่ต้องทำ</div>
        {mode==='do' ? (
          <React.Fragment>
            <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:'#9aa3af',flex:'none'}}><span style={{color:'#22b573',fontWeight:700}}>{overallDone}</span>/{overallN} เสร็จ</span>
            <span style={{flex:'1 1 120px',maxWidth:260,height:6,background:'#eef1f5',borderRadius:99,overflow:'hidden'}}><span style={{display:'block',height:'100%',borderRadius:99,background:'#15a08f',width:overallPct+'%'}}></span></span>
            <span style={{fontSize:12.5,color:'#9aa3af',fontWeight:600}}>{overallPct} %</span>
            <div style={{flex:1}}></div>
            {ICONBTN('format_list_bulleted',!calView,()=>setCalView(false),'รายการ')}
            {ICONBTN('calendar_month',calView,()=>setCalView(true),'ปฏิทิน (Gantt)')}
            {ICONBTN('edit',false,()=>setMode('edit'),'โหมดแก้ไข')}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={{flex:1}}></div>
            <button onClick={()=>setModal({kind:'topic'})} title="เพิ่มหัวข้อ" style={{width:34,height:32,borderRadius:8,border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('add',20,primary)}</button>
            {ICONBTN('upload_file',false,null,'นำเข้า')}
            {ICONBTN('view_column',false,null,'')}
            {ICONBTN('check_circle',true,()=>setMode('do'),'โหมดดำเนินการ')}
          </React.Fragment>
        )}
      </div>

      {/* TOPICS */}
      {calView ? <GanttView topics={topics} open={open} toggleOpen={toggleOpen}/> : (
      <div>
        {topics.map((t,ti)=>{const c=cnt(t),isOpen=open[t.id];return (
          <div key={t.id} style={{borderTop:ti?'1px solid #f4f6f8':'none'}}>
            {/* topic row */}
            <div className="td-row" style={{display:'flex',alignItems:'center',gap:12,padding:'13px 8px',margin:'0 -8px',borderRadius:10}}>
              <button onClick={()=>toggleOpen(t.id)} style={{display:'flex',alignItems:'center',flex:'none'}}>{ms(complete(t)?'check_circle':'radio_button_unchecked',22,complete(t)?'#22b96a':'#c4ccd4',complete(t))}</button>
              <div onClick={()=>toggleOpen(t.id)} style={{flex:1,minWidth:0,fontWeight:600,fontSize:13.5,color:'#2b3440',cursor:'pointer'}}>{t.title}</div>
              {mode==='do' && c.total>0 && <MiniBar c={c}/>}
              {c.total>0 && <Count c={c}/>}
              {mode==='edit' ? (
                <div style={{display:'flex',alignItems:'center',gap:6,flex:'none'}}>
                  <button onClick={()=>setModal({kind:'sub',topicId:t.id})} title="เพิ่มรายการ" style={{width:28,height:28,borderRadius:7,border:'1px solid #e3e7ec',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('add',17,primary)}</button>
                  <button onClick={()=>toggleOpen(t.id)} title="กาง/ยุบ" style={{width:28,height:28,borderRadius:7,border:'1px solid #e3e7ec',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('swap_vert',17,'#8a93a3')}</button>
                  <button onClick={()=>delTopic(t.id)} title="ลบ" style={{width:28,height:28,borderRadius:7,border:'1px solid #f6d3d0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('delete',17,'#d83a3a')}</button>
                  <div style={{display:'flex',flexDirection:'column'}}>
                    <button onClick={()=>moveTopic(ti,-1)} style={{height:14,display:'flex',alignItems:'center',color:'#9aa3af'}}>{ms('keyboard_arrow_up',16,'#9aa3af')}</button>
                    <button onClick={()=>moveTopic(ti,1)} style={{height:14,display:'flex',alignItems:'center',color:'#9aa3af'}}>{ms('keyboard_arrow_down',16,'#9aa3af')}</button>
                  </div>
                </div>
              ) : (
                <button onClick={()=>toggleOpen(t.id)} style={{flex:'none',width:34,height:34,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',marginLeft:2,background:isOpen?'#cde2df':'#ebebeb',border:'none'}}>{ms(isOpen?'expand_less':'expand_more',21,isOpen?'#4e9b92':'#2b3440')}</button>
              )}
            </div>
            {/* subs */}
            {isOpen && t.subs.length>0 && (
              <div style={{paddingLeft:14,paddingBottom:8}}>
                {t.subs.map(s=>(
                  <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 8px',borderRadius:9,background:s.done?'#f1faf4':'transparent',marginBottom:3,flexWrap:'wrap'}}>
                    <button onClick={()=>mode==='do'&&toggleDone(t.id,s.id)} style={{display:'flex',cursor:mode==='do'?'pointer':'default',flex:'none'}}>{ms(s.done?'check_box':'check_box_outline_blank',20,s.done?'#22b573':'#c2cad4',s.done)}</button>
                    <div style={{flex:'1 1 180px',minWidth:140,fontSize:13,color:s.done?'#6b7785':'#2b3440',textDecoration:s.done?'line-through':'none'}}>{s.title}</div>
                    {s.date && <Pill bg={s.daysType==='over'?'#fdeaea':'#e9f6ee'} color={s.daysType==='over'?'#d8513a':'#1f9d57'} icon="event">{s.date}</Pill>}
                    {mode==='do' && s.days>0 && <Pill bg={s.daysType==='over'?'#fdeaea':'#fff3df'} color={s.daysType==='over'?'#d8513a':'#c77d1a'} icon="hourglass_top">{s.daysType==='over'?'เกิน':'เหลือ'} {s.days} วัน</Pill>}
                    <Pill bg={s.inContract?'#eaf1fe':'#f1f3f6'} color={s.inContract?'#3b6fd4':'#8a93a3'}>{s.inContract?'ในสัญญา':'นอกสัญญา'}</Pill>
                    {mode==='do' ? (
                      s.op ? (s.op.avatar ? <div style={{width:24,height:24,borderRadius:'50%',background:AV[3],flex:'none'}}></div> :
                        <span style={{display:'inline-flex',alignItems:'center',gap:5,flex:'none'}}><span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#eaf1fe',color:'#3b6fd4',borderRadius:7,padding:'4px 10px',fontSize:11,fontWeight:600}}>{ms('autorenew',14,'#3b6fd4')}{s.op.label}</span>{s.op.count && <span style={{fontSize:11,color:'#9aa3af',fontWeight:600}}>{s.op.count}</span>}</span>)
                      : <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#eaf1fe',color:'#3b6fd4',borderRadius:7,padding:'4px 10px',fontSize:11,fontWeight:600,flex:'none'}}>{ms('play_circle',14,'#3b6fd4')}ดูสถานะ</span>
                    ) : (
                      <div style={{display:'flex',alignItems:'center',gap:6,flex:'none'}}>
                        <button onClick={()=>setModal({kind:'sub',topicId:t.id,id:s.id,title:s.title,inContract:s.inContract})} style={{width:26,height:26,borderRadius:7,border:'1px solid #e3e7ec',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('edit',15,'#3b6fd4')}</button>
                        <button onClick={()=>delSub(t.id,s.id)} style={{width:26,height:26,borderRadius:7,border:'1px solid #f6d3d0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('delete',15,'#d83a3a')}</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );})}
      </div>
      )}

      {mode==='edit' && !calView && (
        <button onClick={()=>setModal({kind:'topic'})} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,width:'100%',marginTop:12,padding:'11px 0',border:'1.5px dashed #cdd4de',borderRadius:11,background:'#fafbfc',color:primary,fontSize:13.5,fontWeight:700}}>{ms('add',20,primary)}เพิ่มหัวข้อสิ่งที่ต้องทำ</button>
      )}
    </div>

    {modal && (
      <TodoModal
        data={modal}
        onClose={()=>setModal(null)}
        onSave={(d)=>{ if(modal.kind==='topic'){ modal.id?editTopic(modal.id,d):addTopic(d);} else { modal.id?editSub(modal.topicId,modal.id,d):addSub(modal.topicId,d);} }}
        onDelete={modal.id?(()=>{ modal.kind==='topic'?delTopic(modal.id):delSub(modal.topicId,modal.id);}):null}
      />
    )}
   </div>
  );
}

        <i className="bi bi-search" style={{fontSize:16,color:'#9aa3af'}}></i><span style={{color:'#9aa3af',fontSize:13}}>ค้นหา GiveDeeFive</span>
      </div>
      <div style={{flex:1}}></div>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-bell" style={{fontSize:21,color:'#5a6473'}}></i><span style={{position:'absolute',top:-2,right:-2,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>1</span></div>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-chat" style={{fontSize:21,color:'#5a6473'}}></i><span style={{position:'absolute',top:-2,right:-2,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>10</span></div>
      <div style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473'}}><i className="bi bi-globe" style={{fontSize:18}}></i><span style={{fontSize:13}}>ไทย</span><i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i></div>
      <i className="bi bi-moon" style={{fontSize:20,color:'#5a6473'}}></i>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingLeft:10,borderLeft:'1px solid #e7eaef'}}>
        <div style={{lineHeight:1.2,textAlign:'right'}}><div style={{fontWeight:700,fontSize:13.5}}>Piyawat Takaew</div><div style={{fontSize:11.5,color:'#8a93a3'}}>SA Staff</div></div>
        <img src="https://cdn.quasar.dev/img/avatar.png" style={{width:38,height:38,borderRadius:'50%',objectFit:'cover'}} alt="avatar"/>
        <i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i>
      </div>
    </div>

    <div style={{display:'flex'}}>
      {/* ICON RAIL */}
      <div style={{width:60,background:'#fff',borderRight:'1px solid #e7eaef',display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 0',position:'sticky',top:58,height:'calc(100vh - 58px)'}}>
        <div style={{width:34,height:34,borderRadius:'50%',background:'#e7eaef',overflow:'hidden',marginBottom:6}}><img src="https://cdn.quasar.dev/img/avatar.png" style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/></div>
        {[['bi-layout-sidebar',false,'dashboard.html'],['bi-graph-up'],['bi-arrow-down-left',false,'assignee-action-list.html'],['bi-arrow-up-right',false,'commander-action-dashboard.html'],['bi-easel',true,'user-virtual-meeting.html'],['bi-file-earmark-arrow-down'],['bi-book'],['bi-clipboard-data']].map(([ic,act,url],i)=> url ? (
          <a href={url} key={i} style={{textDecoration:'none',width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></a>
        ) : (
          <div key={i} style={{width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></div>

      </div>

      {/* MAIN 3-COL */}
      <div style={{flex:1,padding:'22px 26px',minWidth:0}}>
       <div style={{maxWidth:1560,minWidth:1180,margin:'0 auto',display:'grid',gridTemplateColumns:'300px minmax(0,1fr) 290px',gap:22,alignItems:'start'}}>

        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>เกี่ยวกับ</div>
            <div style={{fontSize:13,color:'#5a6473',lineHeight:1.6,marginBottom:14}}>สำหรับกลุ่มพัฒนาซอฟแวร์และวิเคราะห์ระบบเท่านั้น</div>
            {[['อนุญาตให้ค้นหาชื่อกลุ่มได้'],['อนุญาตให้แชร์โพสต์ออกจากกลุ่มได้'],['อนุญาตให้ออกจากกลุ่มได้']].map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',fontSize:13,color:'#3a4452'}}>{ms('check_circle',19,primary,true)}{p[0]}</div>
            ))}
          </Card>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>{ms('edit_note',21,'#8a93a3')}<span style={{fontWeight:600,fontSize:13.5}}>จำนวนโพสต์จากกลุ่ม</span><div style={{flex:1}}></div>{ms('done_all',19,primary)}</div>
            {[['ทั้งหมด',10,'#eef0f4','#3a4452'],['มีข้อสรุป',0,'#eef0f4','#3a4452'],['ยังไม่ได้อ่าน',0,'#fdeaea','#d8513a']].map((r,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',fontSize:13,color:'#5a6473'}}>
                <span>{r[0]}</span><span style={{minWidth:30,textAlign:'center',background:r[2],color:r[3],fontWeight:700,borderRadius:8,padding:'2px 9px',fontSize:12.5}}>{r[1]}</span>
              </div>
            ))}
          </Card>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:13}}>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14.5}}>Virtual Meeting</div><div style={{fontSize:12,color:'#9aa3af'}}>กลุ่มของคุณ</div></div>
              <button className="ghost-btn" style={{width:32,height:32,borderRadius:8,border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('group_add',18,'#8a93a3')}</button>
              <a href="user-virtual-meeting.html" className="ghost-btn" style={{width:32,height:32,borderRadius:8,border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('add',20,'#8a93a3')}</a>
            </div>
            <div style={{display:'flex',flexDirection:'column'}}>
              {VM.map((g,i)=>(
                <a key={i} href="user-virtual-meeting-group.html" className="vm-row" style={{display:'flex',alignItems:'center',gap:11,padding:'9px 6px',borderRadius:10,borderTop:i?'1px solid #f3f5f8':'none'}}>
                  <VMThumb/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.title}</div>
                    <div style={{fontSize:11.5,color:'#9aa3af',marginTop:2}}>สมาชิก {g.members} คน{g.unread>0 && <span style={{color:'#d8513a'}}> · {g.unread} ยังไม่ได้อ่าน</span>} · โพสต์ {g.posts}</div>
                  </div>
                  {ms('chat_bubble_outline',18,'#c2cad4')}
                </a>
              ))}
            </div>
          </Card>
        </div>

        {/* CENTER */}
        <div style={{minWidth:0,display:'flex',flexDirection:'column',gap:16}}>
          {/* HERO */}
          <Card pad="0">
            <div style={{height:230,position:'relative',overflow:'hidden',borderRadius:'13px 13px 0 0',background:'repeating-linear-gradient(46deg,#f6c916,#f6c916 26px,#e9bd11 26px,#e9bd11 52px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{textAlign:'center',color:'#3a3526',fontWeight:800,fontSize:46,lineHeight:1,letterSpacing:2,textShadow:'0 2px 0 rgba(255,255,255,.18)'}}>RESTRICTED<br/>AREA</div>
            </div>
            <div style={{padding:'16px 20px 6px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:22}}>SA-Developer</div>
                  <div style={{fontSize:13,color:'#8a93a3',margin:'4px 0 8px'}}>สมาชิก 4 คน</div>
                  <Avatars n={4} sz={28}/>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:9}}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <button className="ghost-btn" style={{width:38,height:38,borderRadius:'50%',border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('chat_bubble_outline',20,'#5a6473')}</button>
                    <button style={{display:'inline-flex',alignItems:'center',gap:6,background:primary,color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13.5,fontWeight:700}}>{ms('add',19,'#fff')}เชิญ</button>
                    <button style={{display:'inline-flex',alignItems:'center',gap:6,background:'#fff',color:'#3a4452',border:'1px solid #e3e7ec',borderRadius:9,padding:'9px 14px',fontSize:13.5,fontWeight:600}}>{ms('check',18,primary)}เข้าร่วมแล้ว</button>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:9,padding:'8px 13px',width:220}}>
                    <i className="bi bi-search" style={{fontSize:14,color:'#9aa3af'}}></i><span style={{color:'#9aa3af',fontSize:12.5}}>ค้นหา SA-Developer</span>
                  </div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:26,marginTop:16,borderBottom:'1px solid #f1f3f6'}}>
                {TABS.map(t=>{const a=tab===t.key;return (
                  <button key={t.key} onClick={()=>setTab(t.key)} style={{border:'none',background:'transparent',padding:'0 0 11px',fontSize:13.5,fontWeight:a?700:600,color:a?primary:'#8a93a3',borderBottom:'2.5px solid '+(a?primary:'transparent'),marginBottom:-1}}>{t.label}</button>
                );})}
              </div>
            </div>
          </Card>

          {tab==='talk' ? (
           <div style={{animation:'fadeIn .2s ease',display:'flex',flexDirection:'column',gap:16}}>
            {/* COMPOSER */}
            <Card>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:42,height:42,borderRadius:'50%',background:'#5d7088',flex:'none'}}></div>
                <div style={{flex:1,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:99,padding:'11px 16px',fontSize:13,color:'#9aa3af'}}>ถ้าเรียนรู้อะไรดีๆมา โพสต์แชร์เพื่อนเลย</div>
                <button style={{width:42,height:42,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('send',20,primary)}</button>
              </div>
            </Card>

            {/* FEED HEADER */}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>โพสต์ล่าสุด</span>
              {ms('unfold_more',18,'#9aa3af')}
              <div style={{flex:1}}></div>
              <button onClick={()=>setView('list')} className="ghost-btn" style={{width:34,height:32,borderRadius:8,border:'1px solid '+(view==='list'?primary:'#e7eaef'),background:view==='list'?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('view_agenda',19,view==='list'?primary:'#8a93a3')}</button>
              <button onClick={()=>setView('grid')} className="ghost-btn" style={{width:34,height:32,borderRadius:8,border:'1px solid '+(view==='grid'?primary:'#e7eaef'),background:view==='grid'?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('grid_view',18,view==='grid'?primary:'#8a93a3')}</button>
            </div>

            {/* POSTS */}
            <div style={{display:view==='grid'?'grid':'flex',gridTemplateColumns:'1fr 1fr',flexDirection:view==='grid'?undefined:'column',gap:16}}>
              {POSTS.map((p,i)=>(
                <div key={i} className="post" style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'15px 18px',transition:'box-shadow .15s'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <div style={{width:40,height:40,borderRadius:'50%',background:AV[i%AV.length],flex:'none'}}></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}><span style={{fontWeight:700,fontSize:14}}>{p.who}</span><span style={{fontSize:11.5,color:'#9aa3af'}}>{p.date}</span></div>
                      <div style={{fontSize:11.5,color:'#9aa3af'}}>{p.role}</div>
                    </div>
                    {ms('more_vert',20,'#c2cad4')}
                  </div>
                  <div style={{display:'flex',gap:14,marginTop:12,alignItems:'flex-start'}}>
                    <PostThumb icon={p.icon} tone={p.tone}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14.5,lineHeight:1.4,color:'#2b3440'}}>{p.title}</div>
                      <div style={{fontSize:12.5,color:'#8a93a3',marginTop:5,lineHeight:1.55}}>{p.excerpt}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:16,marginTop:12,paddingTop:11,borderTop:'1px solid #f3f5f8',fontSize:12,color:'#9aa3af'}}>
                    {p.reacts>0 && <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('favorite',16,'#ef4444',true)}{p.reacts}</span>}
                    <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('visibility',16,'#9aa3af')}{p.views}</span>
                    <div style={{flex:1}}></div>
                    {p.comments>0 && <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('chat_bubble_outline',16,'#9aa3af')}{p.comments} ความคิดเห็น</span>}
                  </div>
                </div>
              ))}
            </div>
           </div>
          ) : tab==='todo' ? (
           <TodoPanel/>
          ) : (
           <Card pad="70px 0"><div style={{textAlign:'center',color:'#aeb6c2'}}>{ms(tab==='members'?'group':tab==='invite'?'mail':tab==='verify'?'fact_check':'insights',40,'#cfd6e0')}<div style={{marginTop:10,fontWeight:600,color:'#9aa3af',fontSize:13.5}}>{tab==='members'?'รายชื่อสมาชิกในกลุ่ม':tab==='invite'?'ยังไม่มีคำเชิญที่รอตอบรับ':tab==='verify'?'ตรวจสอบโพสต์ในกลุ่ม':'ภาพรวมกลุ่ม'}</div></div></Card>
          )}
        </div>

        {/* RIGHT */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:13}}>{ms('verified_user',19,primary)}<span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>เจ้าของกลุ่ม</span></div>
            <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:16}}>
              <div style={{width:42,height:42,borderRadius:'50%',background:AV[1],flex:'none'}}></div>
              <div><div style={{fontWeight:700,fontSize:14}}>Chanavee Bekaku</div><div style={{fontSize:12,color:'#9aa3af'}}>Dev Manager</div></div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:11}}>{ms('shield_person',19,'#8a93a3')}<span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>ผู้ดูแลกลุ่ม</span></div>
            <Avatars n={1} sz={36}/>
          </Card>
          <ContractCard/>
          <AttachmentsCard/>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:13}}><span style={{width:30,height:30,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('trending_up',18,primary)}</span><span style={{fontWeight:600,fontSize:13,color:'#5a6473',lineHeight:1.3}}>โพสต์ที่มียอดวิวสูงสุดสัปดาห์นี้</span></div>
            <div style={{display:'flex',alignItems:'flex-start',gap:11}}>
              <span style={{minWidth:26,height:26,borderRadius:8,background:'#eaf1fe',color:'#3b6fd4',fontWeight:800,fontSize:14,display:'inline-flex',alignItems:'center',justifyContent:'center',flex:'none'}}>1</span>
              <div><div style={{fontWeight:600,fontSize:13.5,lineHeight:1.4,color:'#2b3440'}}>Group Arrangement Properties …</div><div style={{fontSize:12,color:'#9aa3af',marginTop:3}}>โดย Narate Boonmee</div></div>
            </div>
          </Card>
        </div>

       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

(function(){
  var src = document.getElementById('jsx-src').textContent;
