const pickColor=(name)=>{const c=['#0e8c7d','#4f46e5','#dd7a16','#d83a3a','#0891b2','#7c3aed','#1f9d57'];let h=0;const s=name||'?';for(let i=0;i<s.length;i++)h=(h+s.charCodeAt(i))%c.length;return c[h];};
const barColorFor=(p)=> p>=100?'#22b573':p>=40?primary:p>0?'#f5b301':'#cbd5e1';
const statsFor=(arr)=>{const total=arr.length,done=arr.filter(j=>j.progress>=100).length,over=arr.filter(j=>j.daysType==='over').length,avg=total?Math.round(arr.reduce((s,j)=>s+j.progress,0)/total):0;return {total,done,over,pending:total-done,avg,avgStyle:avg+'%'};};

function ChipScroller({statuses,base}){
  const msc=(name,size,color)=>{var k=(ICON[name]||'bi-record-circle');return (<i className={'bi '+(/^bi-/.test(k)?k:'bi-'+k)} style={{fontSize:size,color:color,lineHeight:1,verticalAlign:'middle',display:'inline-flex'}}></i>);};
  const ref=React.useRef(null);
  const [ov,setOv]=React.useState({l:false,r:false});
  const update=()=>{const el=ref.current;if(!el)return;setOv({l:el.scrollLeft>4,r:el.scrollLeft+el.clientWidth<el.scrollWidth-4});};
  React.useEffect(()=>{const el=ref.current;if(!el)return;const h=()=>update();el.addEventListener('scroll',h);window.addEventListener('resize',h);const t=setTimeout(update,60);return()=>{el.removeEventListener('scroll',h);window.removeEventListener('resize',h);clearTimeout(t);};},[]);
  const go=(d)=>{const el=ref.current;if(el)el.scrollBy({left:d*180,behavior:'smooth'});};
  return (
    <div style={{position:'relative',marginTop:10,paddingLeft:53}}>
      {ov.l && <button onClick={()=>go(-1)} style={{position:'absolute',top:'50%',left:48,transform:'translateY(-50%)',width:26,height:26,borderRadius:'50%',border:'1px solid #e3e7ec',background:'#fff',boxShadow:'0 1px 5px rgba(16,24,40,.14)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,color:'#5a6473'}}>{msc('chevron_left',18)}</button>}
      <div ref={ref} className="chip-scroll" style={{display:'flex',gap:7,overflowX:'auto',scrollbarWidth:'none'}}>
        {statuses.map((st,j)=>(
          <a key={j} className="fn-status-row" href={base+'&status='+st.key} style={{display:'inline-flex',alignItems:'center',gap:7,padding:'4px 11px 4px 5px',borderRadius:99,textDecoration:'none',color:'#5a6473',border:'1px solid #eef0f4',background:'#fff',whiteSpace:'nowrap',flex:'none',transition:'background .15s,border-color .15s'}}>
            <span style={{minWidth:21,height:21,borderRadius:99,border:'1.5px solid '+st.color,color:st.color,fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{st.count}</span>
            <span style={{fontSize:12,fontWeight:500}}>{st.label}</span>
          </a>
        ))}
      </div>
      {ov.r && <button onClick={()=>go(1)} style={{position:'absolute',top:'50%',right:0,transform:'translateY(-50%)',width:26,height:26,borderRadius:'50%',border:'1px solid #e3e7ec',background:'#fff',boxShadow:'0 1px 5px rgba(16,24,40,.14)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,color:'#5a6473'}}>{msc('chevron_right',18)}</button>}
    </div>
  );
}

  const [view,setView]=useState('dashboard');
  const [manageMode,setManageMode]=useState('me');
  const [selectedMember,setSelectedMember]=useState(0);
  React.useEffect(()=>{
    try{
      const p=new URLSearchParams(window.location.search).get('member');
      if(p){
        const idx=MEMBERS0.findIndex(m=>m.name===decodeURIComponent(p));
        if(idx>=0){ setSelectedMember(idx); setView('member'); }
      }
    }catch(e){}
  },[]);
  const [reorderOpen,setReorderOpen]=useState(false);
  const [reorderKind,setReorderKind]=useState('me');
  const [openFn,setOpenFn]=useState(1);
  const [poolFilter,setPoolFilter]=useState('all');
  const [poolSearch,setPoolSearch]=useState('');
  const [todayJobs,setTodayJobs]=useState(TODAY0);
  const [members,setMembers]=useState(MEMBERS0);
  const [pool,setPool]=useState(POOL0);
  const dragRef = React.useRef(null);

  const getList=(kind)=> kind==='team' ? (members[selectedMember]?members[selectedMember].jobs:[]) : todayJobs;
  const setList=(kind,arr)=>{ if(kind==='team'){ setMembers(ms=>ms.map((m,i)=>i===selectedMember?{...m,jobs:arr}:m)); } else setTodayJobs(arr); };
  const move=(kind,id,dir)=>{ const arr=[...getList(kind)];const i=arr.findIndex(j=>j.id===id);const ni=i+dir;if(i<0||ni<0||ni>=arr.length)return;const t=arr[i];arr[i]=arr[ni];arr[ni]=t;setList(kind,arr); };
  const remove=(kind,id)=> setList(kind,getList(kind).filter(j=>j.id!==id));
  const addProgress=(kind,id)=> setList(kind,getList(kind).map(j=>{if(j.id!==id)return j;const np=Math.min(100,j.progress+25);return {...j,progress:np,status:np>=100?'green':j.status};}));
  const dropOn=(kind,targetId)=>{const d=dragRef.current;if(!d||d===targetId)return;const arr=[...getList(kind)];const from=arr.findIndex(j=>j.id===d);const to=arr.findIndex(j=>j.id===targetId);if(from<0||to<0)return;const [mv]=arr.splice(from,1);arr.splice(to,0,mv);setList(kind,arr);dragRef.current=null;};
  const importJob=(id)=>{const p=pool.find(x=>x.id===id);if(!p)return;const kind=manageMode==='team'?'team':'me';const job={id:'imp-'+id+'-'+Date.now(),title:p.title,commander:p.commander,priority:p.priority,due:p.due,days:p.days,daysType:p.daysType||'left',progress:0,status:'yellow',type:p.type||'daily'};setList(kind,[...getList(kind),job]);setPool(pl=>pl.filter(x=>x.id!==id));};

  const mapJob=(job,idx,kind)=>{
    const pr=prStyle(job.priority),ty=tyStyle(job.type),hi=job.progress>=100||job.inProgress;
    return {...job,rank:idx+1,widthStyle:job.progress+'%',barColor:barColorFor(job.progress),
      statusColor:job.status==='red'?'#ef4444':job.status==='green'?'#22b573':'#f5b301',
      prBg:pr.bg,prText:pr.text,prLabel:pr.label,tyBg:ty.bg,tyText:ty.text,tyLabel:ty.label,
      daysColor:job.daysType==='over'?'#d83a3a':'#16916f',daysIcon:job.daysType==='over'?'warning':'schedule',
      rowBg:hi?'#eaf7f0':'#ffffff',rowBorder:hi?'#bfe6d3':'#eef0f4',

        <div style={{padding:'6px 18px 18px',overflowY:'auto'}}>
          {reorderView.map(job=>(
            <div key={job.id} draggable onDragStart={job.onDragStart} onDragOver={(e)=>e.preventDefault()} onDrop={job.onDrop} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 12px',border:'1px solid #e7ebf1',borderRadius:11,background:'#fcfdfe',marginBottom:8,cursor:'grab'}}>
              <div style={{width:24,textAlign:'center',fontWeight:700,fontSize:18,color:'#4338ca',flex:'none'}}>{job.rank}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{job.title}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,fontSize:11,color:'#8a93a3',flexWrap:'wrap'}}>
                  <span style={{padding:'1px 7px',borderRadius:99,fontWeight:600,background:job.prBg,color:job.prText}}>{job.prLabel}</span>
                  <span style={{display:'inline-flex',alignItems:'center',gap:3}}>{ms('event',13)}{job.due}</span>
                  <span style={{color:job.daysColor,fontWeight:600}}>{job.days}</span>
                </div>
              </div>
              {ms('drag_indicator',22,'#b8c0cc')}
            </div>
          ))}
        </div>
        <div style={{padding:'14px 18px',borderTop:'1px solid #eef0f4',display:'flex',justifyContent:'flex-end',gap:10}}>
          <button onClick={()=>setReorderOpen(false)} style={{background:primary,border:'none',color:'#fff',borderRadius:9,padding:'9px 22px',fontSize:13.5,fontWeight:600}}>เสร็จสิ้น</button>
        </div>
      </div>
     </div>
    )}
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
