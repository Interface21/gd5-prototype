const pickColor=(name)=>{const c=['#0e8c7d','#4f46e5','#dd7a16','#d83a3a','#0891b2','#7c3aed','#1f9d57'];let h=0;const s=name||'?';for(let i=0;i<s.length;i++)h=(h+s.charCodeAt(i))%c.length;return c[h];};
const barColorFor=(p)=> p>=100?'#22b573':p>=40?teal:p>0?'#f5b301':'#cbd5e1';
const statsFor=(arr)=>{const total=arr.length,done=arr.filter(j=>j.progress>=100).length,over=arr.filter(j=>j.daysType==='over').length,avg=total?Math.round(arr.reduce((s,j)=>s+j.progress,0)/total):0;return {total,done,over,pending:total-done,avg,avgStyle:avg+'%'};};

function App(){
  const [tab,setTab]=useState('more');      // home | chat | analytics | more  (real bottom bar)
  const [route,setRoute]=useState(null); // null | 'todayjob'  (pushed over a tab)
  const [tj,setTj]=useState('me');           // me | team | member | manage   (inside today's job)
  const [sel,setSel]=useState(0);
  const [manageTab,setManageTab]=useState('list');
  const [poolFilter,setPoolFilter]=useState('all');
  const [poolSearch,setPoolSearch]=useState('');
  const [myJobs,setMyJobs]=useState(MYJOBS0);
  const [members,setMembers]=useState(MEMBERS0);
  const [pool,setPool]=useState(POOL0);

  const openTab=(k)=>{setRoute(null);setTab(k);};
  const openTodayJob=()=>{setRoute('todayjob');setTj('me');};
  const backFromTJ=()=>{ if(tj==='member'){setTj('team');} else {setRoute(null);} };

  const getList=(kind)=> kind==='team'?(members[sel]?members[sel].jobs:[]):myJobs;
  const setList=(kind,arr)=>{ if(kind==='team'){ setMembers(ms=>ms.map((m,i)=>i===sel?{...m,jobs:arr}:m)); } else setMyJobs(arr); };
  const move=(kind,id,dir)=>{const arr=[...getList(kind)];const i=arr.findIndex(j=>j.id===id),ni=i+dir;if(i<0||ni<0||ni>=arr.length)return;const t=arr[i];arr[i]=arr[ni];arr[ni]=t;setList(kind,arr);};
  const remove=(kind,id)=>setList(kind,getList(kind).filter(j=>j.id!==id));
  const addProgress=(kind,id)=>setList(kind,getList(kind).map(j=>{if(j.id!==id)return j;const np=Math.min(100,j.progress+25);return {...j,progress:np,status:np>=100?'green':j.status};}));
  const importJob=(id)=>{const p=pool.find(x=>x.id===id);if(!p)return;const job={id:'imp-'+id+'-'+Date.now(),title:p.title,commander:p.commander,priority:p.priority,due:p.due,days:p.days,daysType:p.daysType||'left',progress:0,status:'yellow'};setMyJobs(a=>[...a,job]);setPool(pl=>pl.filter(x=>x.id!==id));setManageTab('list');};

  const PR=(p)=>{const m={urgent:{bg:'#fdeaea',text:'#d83a3a',label:'ด่วนมาก'},high:{bg:'#fff2e2',text:'#dd7a16',label:'ด่วน'},normal:{bg:'#eef1f5',text:'#6b7280',label:'ปกติ'}};return m[p]||m.normal;};

  const mapJob=(job,idx)=>{const pr=PR(job.priority),hi=job.progress>=100;return {...job,rank:idx+1,widthStyle:job.progress+'%',barColor:barColorFor(job.progress),
    statusColor:job.status==='red'?'#ef4444':job.status==='green'?'#22b573':'#f5b301',
    prBg:pr.bg,prText:pr.text,prLabel:pr.label,
    daysColor:job.daysType==='over'?'#d83a3a':'#16916f',daysIcon:job.daysType==='over'?'warning':'schedule',
    rowBg:hi?'#eaf7f0':bg1,rowBorder:hi?'#bfe6d3':line,
    avatarInitial:(job.commander||'?').trim().charAt(0),avatarColor:pickColor(job.commander)};};

  const myStats=statsFor(myJobs);
  const teamAll=members.reduce((a,m)=>a.concat(m.jobs),[]);
  const teamStats=statsFor(teamAll);
  const mem=members[sel]||{name:'',role:'',jobs:[]};
  const memberStats=statsFor(mem.jobs||[]);

  const flt=poolFilter,q=(poolSearch||'').trim();
  const poolView=pool.filter(p=>(flt==='all'||p.priority===flt)&&(!q||p.title.indexOf(q)>=0)).map(p=>{const pr=PR(p.priority);return {...p,prBg:pr.bg,prText:pr.text,prLabel:pr.label,avatarInitial:(p.commander||'?').charAt(0),avatarColor:pickColor(p.commander),daysColor:p.daysType==='over'?'#ff7676':'#2ec27e'};});
  const ft=[{key:'all',label:'ทั้งหมด'},{key:'urgent',label:'ด่วนมาก'},{key:'high',label:'ด่วน'},{key:'normal',label:'ปกติ'}];

  const StatRow=({s})=>(
    <div style={{display:'flex',alignItems:'center',gap:7,marginTop:11,flexWrap:'wrap'}}>
      <span style={{fontSize:11.5,color:sub,fontWeight:500}}>{s.pending} รอดำเนินการ</span>
      <span style={{background:'#e4f4ec',color:'#1f9d57',fontSize:11.5,fontWeight:600,borderRadius:99,padding:'3px 10px'}}>{s.done} ดำเนินการแล้ว</span>
      <span style={{background:'#fdeaea',color:'#d83a3a',fontSize:11.5,fontWeight:600,borderRadius:99,padding:'3px 10px'}}>{s.over} งานค้าง</span>
    </div>
  );

  const JobCard=({job,kind,reorder})=>(
    <div style={{background:job.rowBg,border:'1px solid '+job.rowBorder,borderRadius:14,padding:13,marginBottom:10,animation:'popIn .2s ease'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
        <div style={{width:26,height:26,borderRadius:8,background:tealDim,color:teal,fontWeight:800,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{job.rank}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13.5,lineHeight:1.35,color:txt}}>{job.title}</div>
          <div style={{display:'flex',alignItems:'center',gap:7,marginTop:7,flexWrap:'wrap',fontSize:11,color:sub}}>
            {!reorder && <span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:16,height:16,borderRadius:'50%',background:job.avatarColor,color:'#fff',fontSize:9,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{job.avatarInitial}</span>{job.commander}</span>}
            <span style={{padding:'1px 8px',borderRadius:99,fontWeight:600,background:job.prBg,color:job.prText}}>{job.prLabel}</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:3,color:job.daysColor,fontWeight:600}}>{ic(job.daysIcon,13,job.daysColor)}{job.days}</span>
          </div>
        </div>

          <div style={{display:'flex',flexDirection:'column',border:'1px solid '+line,borderRadius:8,overflow:'hidden',flex:'none'}}>

          </div>

        <button onClick={()=>addProgress(kind,job.id)} style={{display:'inline-flex',alignItems:'center',gap:3,background:tealDim,color:teal,borderRadius:8,padding:'6px 9px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{ic('add',15,teal)}เพิ่ม</button>

    </div>

      const titles={me:"คำสั่งที่ได้รับ",team:"Today's Job ของลูกทีม",member:'รายละเอียดลูกทีม',manage:'จัดการ Daily Job'};

          <div style={{fontWeight:700,fontSize:16,color:txt}}>{titles[tj]}</div>
        </div>
      );
    }
    if(tab==='home'){
      return (
        <div style={{height:52,display:'flex',alignItems:'center',gap:10,padding:'0 14px',background:bg1,borderBottom:'1px solid '+line,flex:'none'}}>
          <div style={{width:30,height:30,borderRadius:8,overflow:'hidden',flex:'none',background:'#15a08f'}}><img src="image/logo.png" style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/></div>
          <div style={{flex:1,textAlign:'center',fontWeight:700,fontSize:16,color:txt}}>Piyawat Takaew</div>
          <div style={{position:'relative',display:'flex',alignItems:'center'}}>{ic('notifications',23,txt)}<span style={{position:'absolute',top:-4,right:-5,background:pink,color:'#fff',fontSize:9,fontWeight:800,borderRadius:99,minWidth:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>1</span></div>

  const menuItems=[

            {ic('search',18,sub)}
            <input value={poolSearch} onChange={(e)=>setPoolSearch(e.target.value)} placeholder="ค้นหาคำสั่งการ" style={{border:'none',background:'transparent',outline:'none',fontSize:13,width:'100%',color:txt}}/>
          </div>
          <div className="appscroll" style={{display:'flex',gap:6,marginBottom:11,overflowX:'auto'}}>
            {ft.map(t=>{const a=flt===t.key;return <button key={t.key} onClick={()=>setPoolFilter(t.key)} style={{border:'1px solid '+(a?teal:line),borderRadius:99,padding:'6px 13px',fontSize:12,fontWeight:600,background:a?teal:bg1,color:a?'#fff':sub,whiteSpace:'nowrap',flex:'none'}}>{t.label}</button>;})}
          </div>
          {poolView.map(p=>(
            <div key={p.id} style={{background:bg1,border:'1px solid '+line,borderRadius:13,padding:12,marginBottom:9,display:'flex',alignItems:'center',gap:11,animation:'popIn .2s ease'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,lineHeight:1.35,color:txt}}>{p.title}</div>
                <div style={{display:'flex',alignItems:'center',gap:7,marginTop:6,flexWrap:'wrap',fontSize:10.5,color:sub}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:15,height:15,borderRadius:'50%',background:p.avatarColor,color:'#fff',fontSize:8,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{p.avatarInitial}</span>{p.commander}</span>
                  <span style={{padding:'1px 7px',borderRadius:99,fontWeight:600,background:p.prBg,color:p.prText}}>{p.prLabel}</span>
                  <span style={{color:p.daysColor,fontWeight:600}}>{p.days}</span>
                </div>
              </div>
              <button onClick={()=>importJob(p.id)} style={{width:38,height:38,borderRadius:'50%',background:teal,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ic('add',22,'#fff')}</button>
            </div>
          ))}
          {poolView.length===0 && <div style={{textAlign:'center',color:sub,fontSize:12.5,padding:'30px 0'}}>ไม่พบคำสั่งการ</div>}
        </React.Fragment>)}
      </React.Fragment>)}
    </div>
  );

  const navDef=[{key:'home',icon:'home',label:'หน้าหลัก'},{key:'chat',icon:'chat_bubble',label:'แชท',badge:10},{key:'analytics',icon:'pie_chart',label:'วิเคราะห์ข้อมูล'},{key:'more',icon:'more_horiz',label:'อื่นๆ'}];
  const activeNav = route==='todayjob' ? 'more' : tab;

  let body;
  if(route==='todayjob') body=<TodayJob/>;
  else if(tab==='home') body=<Feed/>;
  else if(tab==='chat') body=<ChatList/>;
  else if(tab==='analytics') body=<Analytics/>;
  else body=<MoreMenu/>;

  return (
   <div style={{position:'relative',width:390,height:844,background:'#000',borderRadius:52,padding:11,boxShadow:'0 30px 60px rgba(16,24,40,.28)',flex:'none'}}>
    <div style={{position:'absolute',inset:11,borderRadius:42,overflow:'hidden',display:'flex',flexDirection:'column',background:bg0}}>

      {/* STATUS BAR */}
      <div style={{height:44,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 26px',position:'relative',background:bg1,flex:'none'}}>
        <span style={{fontSize:14,fontWeight:700,color:txt}}>15:55</span>
        <div style={{position:'absolute',left:'50%',top:8,transform:'translateX(-50%)',width:96,height:26,background:'#000',borderRadius:99}}></div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>{ic('signal_cellular_alt',17,txt,true)}{ic('wifi',17,txt,true)}{ic('battery_full',19,txt,true)}</div>
      </div>

      <TopBar/>

      {body}

      {/* BOTTOM NAV — real GD5 tabs */}
      <div style={{position:'absolute',left:0,right:0,bottom:0,background:'rgba(255,255,255,.95)',backdropFilter:'blur(12px)',borderTop:'1px solid '+line,padding:'8px 10px 22px',display:'flex',alignItems:'flex-end',justifyContent:'space-around',zIndex:30}}>
        {navDef.map(n=>{const a=n.key===activeNav;return (
          <button key={n.key} onClick={()=>openTab(n.key)} style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 10px',color:a?teal:'#9aa3af'}}>
            {n.badge && <span style={{position:'absolute',top:-4,right:6,background:pink,color:'#fff',fontSize:9,fontWeight:800,borderRadius:99,minWidth:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{n.badge}</span>}
            {ic(n.icon,25,a?teal:'#9aa3af',a)}
            <span style={{fontSize:10,fontWeight:a?700:500}}>{n.label}</span>
          </button>
        );})}
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  var src = document.getElementById('jsx-src').textContent;
  var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
