  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Symbols Rounded';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"59274144-71bf-4001-9dbb-5facb6829dc7\") format('woff2');\n}\n\n.material-symbols-rounded {\n  font-family: 'Material Symbols Rounded';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box}\nbody{margin:0;font-family:'IBM Plex Sans Thai',sans-serif;color:#1f2733;background:#eef1f6;-webkit-font-smoothing:antialiased}\nbutton{font-family:inherit;cursor:pointer}\ninput{font-family:inherit}\n::-webkit-scrollbar{width:9px;height:9px}\n::-webkit-scrollbar-thumb{background:#cfd6e0;border-radius:9px}\n@keyframes popIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#eef1f6\">\n\n  <!-- ============ TOP BAR ============ -->\n  <div style=\"height:58px;background:#fff;border-bottom:1px solid #e7eaef;display:flex;align-items:center;gap:18px;padding:0 18px;position:sticky;top:0;z-index:30\">\n    <div style=\"display:flex;align-items:center;gap:9px\">\n      <div style=\"width:38px;height:38px;border-radius:10px;background:#15a08f;display:flex;align-items:center;justify-content:center\">\n        <span style=\"font-family:'Material Symbols Rounded';font-size:24px;color:#fff\">volunteer_activism<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"line-height:1.0;font-weight:700;font-size:11px;letter-spacing:.6px;color:#15a08f\">GIVE<br>DEE<br>FIVE<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;background:#f1f3f7;border:1px solid #e7eaef;border-radius:10px;padding:9px 12px;width:280px\">\n      <span style=\"font-family:'Material Symbols Rounded';font-size:18px;color:#9aa3af\">search<\u002Fspan>\n      <span style=\"color:#9aa3af;font-size:13px\">ค้นหา GiveDeeFive<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px\">\n      <span style=\"font-family:'Material Symbols Rounded';font-size:23px;color:#5a6473\">notifications<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px\">\n      <span style=\"font-family:'Material Symbols Rounded';font-size:23px;color:#5a6473\">chat<\u002Fspan>\n      <span style=\"position:absolute;top:-2px;right:-2px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px\">7<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:5px;color:#5a6473\">\n      <span style=\"font-family:'Material Symbols Rounded';font-size:21px\">language<\u002Fspan>\n      <span style=\"font-size:13px\">ไทย<\u002Fspan>\n      <span style=\"font-family:'Material Symbols Rounded';font-size:18px;color:#9aa3af\">unfold_more<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#5a6473\">dark_mode<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:10px;padding-left:10px;border-left:1px solid #e7eaef\">\n      <div style=\"width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#8aa0b8,#5d7088);background-size:cover\"><\u002Fdiv>\n      <div style=\"line-height:1.2\">\n        <div style=\"font-weight:700;font-size:13.5px\">Piyawat Takaew<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#8a93a3\">SA Staff<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:'Material Symbols Rounded';font-size:18px;color:#9aa3af\">unfold_more<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex\">\n    <!-- ============ ICON RAIL ============ -->\n    <div style=\"width:60px;background:#fff;border-right:1px solid #e7eaef;display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 0;position:sticky;top:58px;height:calc(100vh - 58px)\">\n      <div style=\"width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#8aa0b8,#5d7088);margin-bottom:6px\"><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;background:{{ primarySoft }};display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:{{ primary }}\">space_dashboard<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">monitoring<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">call_received<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">call_made<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">download<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">menu_book<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">bar_chart<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">schedule<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">tag<\u002Fspan><\u002Fdiv>\n      <div style=\"width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center\"><span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:#9aa3af\">group<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ MAIN ============ -->\n    <div style=\"flex:1;padding:22px;min-width:0\">\n\n      <!-- ===================== DASHBOARD ===================== -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:1480px;margin:0 auto;display:grid;grid-template-columns:1.62fr 1fr;gap:18px;align-items:start\">\n\n        <!-- LEFT COLUMN -->\n        <div style=\"display:flex;flex-direction:column;gap:18px;min-width:0\">\n\n          <!-- profile -->\n          <div style=\"background:#fff;border:1px solid #eceef2;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);padding:16px;display:flex;align-items:center;gap:15px\">\n            <div style=\"width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#8aa0b8,#5d7088);flex:none\"><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-weight:700;font-size:17px\">Piyawat Takaew<\u002Fdiv>\n              <div style=\"font-size:13px;color:#8a93a3;margin-bottom:6px\">SA Staff<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;font-size:12px;color:#8a93a3\">\n                <span style=\"display:inline-flex;align-items:center;gap:4px\"><span style=\"font-family:'Material Symbols Rounded';font-size:15px\">visibility<\u002Fspan>กำลังติดตาม 12<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:4px\"><span style=\"font-family:'Material Symbols Rounded';font-size:15px\">group<\u002Fspan>ผู้ติดตาม 34<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#f5b301\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#ef4444\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#22b573\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Today's Job -->\n          <div style=\"background:#fff;border:1px solid #eceef2;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px\">\n              <span style=\"font-family:'Material Symbols Rounded';font-size:22px;color:{{ primary }}\">checklist<\u002Fspan>\n              <div style=\"font-weight:700;font-size:16px\">Today's Job <span style=\"color:#8a93a3;font-weight:500;font-size:14px\">(คำสั่งที่ได้รับ)<\u002Fspan><\u002Fdiv>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <button onclick=\"{{ openReorder }}\" style=\"display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #d8dde4;color:#4a5360;border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:600\">\n                <span style=\"font-family:'Material Symbols Rounded';font-size:17px\">swap_vert<\u002Fspan>เรียงลำดับ\n              <\u002Fbutton>\n              <button onclick=\"{{ openManage }}\" style=\"display:inline-flex;align-items:center;gap:5px;background:{{ primary }};border:none;color:#fff;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600\">\n                <span style=\"font-family:'Material Symbols Rounded';font-size:17px\">tune<\u002Fspan>จัดการ Daily Job\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:12px;background:#f7f9fb;border:1px solid #eef1f5;border-radius:10px;padding:9px 12px;margin-bottom:13px\">\n              <div style=\"display:flex;align-items:center;gap:13px;font-size:12px;color:#5a6473;flex-wrap:wrap\">\n                <span style=\"display:inline-flex;align-items:center;gap:4px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#f5b301\"><\u002Fspan>{{ myStats.pending }} รอดำเนินการ<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:4px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#22b573\"><\u002Fspan>{{ myStats.done }} ปิดงานแล้ว<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:4px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#ef4444\"><\u002Fspan>{{ myStats.over }} เกินกำหนด<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;min-width:170px\">\n                <div style=\"flex:1;height:7px;background:#e7ebf1;border-radius:99px;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:{{ primary }};width:{{ myStats.avgStyle }}\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"font-weight:700;font-size:13px;color:{{ primary }}\">{{ myStats.avgStyle }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-for list=\"{{ todayView }}\" as=\"job\" hint-placeholder-count=\"7\"> e(p){ return p==='urgent'?{bg:'#fdeaea',text:'#d83a3a',label:'ด่วนมาก'} : p==='high'?{bg:'#fff2e2',text:'#dd7a16',label:'ด่วน'} : {bg:'#eef1f5',text:'#6b7280',label:'ปกติ'}; }\n  tyStyle(t){ return t==='strategic'?{bg:'#fdeee0',text:'#d98223',label:'งานตามแผนธุรกิจ'} : t==='pa'?{bg:'#fef3d4',text:'#b88407',label:'PA'} : {bg:'#e3f3f0',text:'#0e8c7d',label:'งานประจำวัน'}; }\n  pickColor(name){ const c=['#0e8c7d','#4f46e5','#dd7a16','#d83a3a','#0891b2','#7c3aed','#1f9d57']; let h=0; const s=name||'?'; for(let i=0;i<s.length;i++)h=(h+s.charCodeAt(i))%c.length; return c[h]; }\n  barColorFor(p){ return p>=100?'#22b573': p>=40?this.primaryHex(): p>0?'#f5b301':'#cbd5e1'; }\n\n  getList(kind){ return kind==='team' ? (this.state.members[this.state.selectedMember]?this.state.members[this.state.selectedMember].jobs:[]) : this.state.todayJobs; }\n  setList(kind,arr){\n    if(kind==='team'){ const sel=this.state.selectedMember; this.setState(s=>({members:s.members.map((m,i)=> i===sel?{...m,jobs:arr}:m)})); }\n    else this.setState({todayJobs:arr});\n  }\n  move(kind,id,dir){ const arr=[...this.getList(kind)]; const i=arr.findIndex(j=>j.id===id); const ni=i+dir; if(i<0||ni<0||ni>=arr.length)return; const t=arr[i];arr[i]=arr[ni];arr[ni]=t; this.setList(kind,arr); }\n  remove(kind,id){ this.setList(kind,this.getList(kind).filter(j=>j.id!==id)); }\n  addProgress(kind,id){ this.setList(kind,this.getList(kind).map(j=>{ if(j.id!==id)return j; const np=Math.min(100,j.progress+25); return {...j,progress:np,status:np>=100?'green':j.status}; })); }\n  dropOn(kind,targetId){ const d=this.dragId; if(!d||d===targetId)return; const arr=[...this.getList(kind)]; const from=arr.findIndex(j=>j.id===d); const to=arr.findIndex(j=>j.id===targetId); if(from<0||to<0)return; const [mv]=arr.splice(from,1); arr.splice(to,0,mv); this.setList(kind,arr); this.dragId=null; }\n  importJob(id){\n    const p=this.state.pool.find(x=>x.id===id); if(!p)return;\n    const kind=this.state.manageMode==='team'?'team':'me';\n    const job={id:'imp-'+id+'-'+Date.now(),title:p.title,commander:p.commander,priority:p.priority,due:p.due,days:p.days,daysType:p.daysType||'left',progress:0,status:'yellow',type:p.type||'daily'};\n    this.setList(kind,[...this.getList(kind),job]);\n    this.setState(s=>({pool:s.pool.filter(x=>x.id!==id)}));\n  }\n\n  mapJob(job,idx,kind){\n    const pr=this.prStyle(job.priority), ty=this.tyStyle(job.type);\n    const hi=job.progress>=100||job.inProgress;\n    return {...job, rank:idx+1, widthStyle:job.progress+'%', barColor:this.barColorFor(job.progress),\n      statusColor: job.status==='red'?'#ef4444':job.status==='green'?'#22b573':'#f5b301',\n      prBg:pr.bg,prText:pr.text,prLabel:pr.label, tyBg:ty.bg,tyText:ty.text,tyLabel:ty.label,\n      daysColor: job.daysType==='over'?'#d83a3a':'#16916f', daysIcon: job.daysType==='over'?'warning':'schedule',\n      rowBg: hi?'#eaf7f0':'#ffffff', rowBorder: hi?'#bfe6d3':'#eef0f4',\n      avatarInitial:(job.commander||'?').trim().charAt(0), avatarColor:this.pickColor(job.commander),\n      onMoveUp:()=>this.move(kind,job.id,-1), onMoveDown:()=>this.move(kind,job.id,1),\n      onRemove:()=>this.remove(kind,job.id), onAddProgress:()=>this.addProgress(kind,job.id),\n      onDragStart:(e)=>{ this.dragId=job.id; try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',job.id);}catch(_){} },\n      onDrop:(e)=>{ e.preventDefault(); this.dropOn(kind,job.id); },\n    };\n  }\n  statsFor(arr){ const total=arr.length; const done=arr.filter(j=>j.progress>=100).length; const over=arr.filter(j=>j.daysType==='over').length; const pending=total-done; const avg=total?Math.round(arr.reduce((s,j)=>s+j.progress,0)/total):0; return {total,done,over,pending,avg,avgStyle:avg+'%'}; }\n\n  renderVals(){\n    const primary=this.primaryHex(), primarySoft=this.primarySoftHex();\n    const isManage=this.state.view==='manage';\n    const isTeamMode=this.state.manageMode==='team';\n    const activeKind=isTeamMode?'team':'me';\n\n    const todayView=this.state.todayJobs.map((j,i)=>this.mapJob(j,i,'me'));\n    const teamView=this.state.members.map((m,i)=>{ const st=this.statsFor(m.jobs); return {...m, idx:i, avatarInitial:m.name.charAt(0), avatarColor:this.pickColor(m.name), widthStyle:m.progress+'%', barColor:m.progress>=60?'#22b573':m.progress>=30?'#f5b301':'#ef4444', total:st.total, done:st.done, over:st.over, pending:st.pending, barFill:'#3730dc', onManage:()=>this.setState({view:'member',selectedMember:i,manageMode:'team'})}; });\n\n    const selM=this.state.selectedMember; const mem=this.state.members[selM]||{name:'',role:'',jobs:[]};\n    const memberJobsView=(mem.jobs||[]).map((j,i)=>this.mapJob(j,i,'team'));\n    const memberStats=this.statsFor(mem.jobs||[]);\n    const memberInfo={name:mem.name,role:mem.role,avatarInitial:(mem.name||'?').charAt(0),avatarColor:this.pickColor(mem.name)};\n    const mt=memberStats;\n    const memberStatCards=[\n      {label:'งานที่ได้รับ',count:mt.total,unit:'งาน',icon:'call_received',color:'#4f46e5',softBg:'#ecebfb',pct:100},\n      {label:'ปิดงานแล้ว',count:mt.done,unit:'งาน',icon:'task_alt',color:'#22b573',softBg:'#e4f4ec',pct:mt.total?Math.round(mt.done/mt.total*100):0},\n      {label:'เกินกำหนด',count:mt.over,unit:'งาน',icon:'warning',color:'#ef4444',softBg:'#fdeaea',pct:mt.total?Math.round(mt.over/mt.total*100):0},\n      {label:'ความก้าวหน้าเฉลี่ย',count:mt.avg,unit:'%',icon:'trending_up',color:'#0e8c7d',softBg:'#e3f3f0',pct:mt.avg},\n    ].map(s=>({...s,pctStyle:s.pct+'%'}));\n\n    const manageList=this.getList(activeKind).map((j,i)=>this.mapJob(j,i,activeKind));\n    const reorderView=this.getList(this.state.reorderKind).map((j,i)=>this.mapJob(j,i,this.state.reorderKind));\n\n    const flt=this.state.poolFilter, q=(this.state.poolSearch||'').trim();\n    const poolView=this.state.pool.filter(p=> (flt==='all'||p.priority===flt) && (!q||p.title.indexOf(q)>=0)).map(p=>{\n      const pr=this.prStyle(p.priority);\n      return {...p, prBg:pr.bg
