  const doneCount=items.filter(x=>x.evaluated).length;
  const totalCount=items.length;

  const filtered=items.filter(x=>tab==='all'?true:tab==='done'?x.evaluated:!x.evaluated);
  const openItem=items.find(x=>x.id===openId);

  const TABS=[
    {key:'all',label:'ทั้งหมด',icon:'bi-list-ul'},
    {key:'done',label:'ประเมินผลแล้ว',icon:'bi-check-circle'},
    {key:'pending',label:'รอประเมิน',icon:'bi-clock'},
  ];

  return (
    <div style={{flex:1,padding:'22px 26px',overflowY:'auto',height:'calc(100vh - 58px)'}}>

                <i className="bi bi-bullseye" style={{fontSize:12}}></i>{item.statusLabel}

            )}
          </div>
        ))}
      </div>

      {openItem&&(
        <EvaluateModal
          item={openItem}
          onClose={()=>setOpenId(null)}

            setItems(prev=>prev.map(x=>x.id===openItem.id?{...x,...patch,evaluated:true}:x));
            setOpenId(null);
          }}
        />
      )}
    </div>
  );
}

function ApprovalModal({item,task,onClose,onApprove,onReject}){
  const [showReject,setShowReject]=useState(false);
  const [reason,setReason]=useState('');
  const [err,setErr]=useState(false);
  const TypeBadge=({type})=>type==='individual'
    ?<span style={{display:'inline-flex',alignItems:'center',background:'#fce7f3',color:'#db2777',borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:600}}>งานรายบุคคล</span>

  const doReject=()=>{
    if(!reason.trim()){setErr(true);return;}
    onReject(reason.trim());
  };
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(16,24,40,.48)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99998,padding:'24px 16px'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:18,width:560,maxWidth:'100%',boxShadow:'0 24px 64px rgba(16,24,40,.28)',animation:'fadeIn .15s ease'}}>

        <div style={{display:'flex',alignItems:'center',gap:11,padding:'18px 22px 16px',borderBottom:'1px solid #f0f2f5'}}>
          <div style={{width:38,height:38,borderRadius:10,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
            <i className="bi bi-clipboard-check" style={{fontSize:19,color:primary}}></i>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:15.5}}>อนุมัติแผนงานย่อย</div>
            <div style={{fontSize:12,color:'#9aa3af',marginTop:1}}>{item.title}</div>
          </div>
          <div style={{flex:1}}></div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:9,background:'#f1f3f7',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer'}}>
            <i className="bi bi-x-lg" style={{fontSize:14,color:'#5a6473'}}></i>
          </button>
        </div>
        {/* content */}
        <div style={{padding:'18px 22px'}}>

            <div style={{fontSize:13,color:'#4b5563',lineHeight:1.7}}>{task.detail}</div>
          </div>
          {!showReject ? (
            <div style={{display:'flex',gap:10}}>
              <button onClick={onApprove} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7,background:primary,color:'#fff',border:'none',borderRadius:11,padding:'12px 0',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                <i className="bi bi-check2-circle" style={{fontSize:16}}></i>อนุมัติ
              </button>
              <button onClick={()=>setShowReject(true)} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7,background:'#fdeaea',color:'#d83a3a',border:'1px solid #f6c4c4',borderRadius:11,padding:'12px 0',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                <i className="bi bi-x-circle" style={{fontSize:16}}></i>ไม่อนุมัติ

function ApprovalContent({items}){
  const [taskStatus,setTaskStatus]=useState({});   // key: itemId-taskId → 'approved'|'rejected'
  const [taskReasons,setTaskReasons]=useState({});  // key: itemId-taskId → reason string
  const [modal,setModal]=useState(null);            // {item, task}
  const key=(iid,tid)=>iid+'-'+tid;
  const approve=(iid,tid)=>{setTaskStatus(s=>({...s,[key(iid,tid)]:'approved'}));setModal(null);};
  const reject=(iid,tid,reason)=>{setTaskStatus(s=>({...s,[key(iid,tid)]:'rejected'}));setTaskReasons(r=>({...r,[key(iid,tid)]:reason}));setModal(null);};
  const getStatus=(iid,tid)=>taskStatus[key(iid,tid)]||'pending';
  const StatusBadge=({status})=>{
    if(status==='approved') return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#eafaf0',color:'#1f9d57',border:'1px solid #a7f3d0',borderRadius:99,padding:'3px 11px',fontSize:12,fontWeight:700,whiteSpace:'nowrap',flex:'none'}}><i className="bi bi-check2" style={{fontSize:12}}></i>อนุมัติ</span>;
    if(status==='rejected') return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fdeaea',color:'#d83a3a',border:'1px solid #fca5a5',borderRadius:99,padding:'3px 11px',fontSize:12,fontWeight:700,whiteSpace:'nowrap',flex:'none'}}><i className="bi bi-x" style={{fontSize:13}}></i>ไม่อนุมัติ</span>;
    return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fff7e3',color:'#b45309',border:'1px solid #fcd34d',borderRadius:99,padding:'3px 11px',fontSize:12,fontWeight:700,whiteSpace:'nowrap',flex:'none',cursor:'pointer'}}><i className="bi bi-clock" style={{fontSize:12}}></i>รออนุมัติ</span>;
  };
  const TypeBadge=({type})=>type==='individual'
    ?<span style={{display:'inline-flex',alignItems:'center',background:'#fce7f3',color:'#db2777',borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:600,whiteSpace:'nowrap',flex:'none'}}>งานรายบุคคล</span>
    :<span style={{display:'inline-flex',alignItems:'center',background:'#eaf1fe',color:'#3b6fd4',borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:600,whiteSpace:'nowrap',flex:'none'}}>งานกลุ่ม</span>;
  return (
    <React.Fragment>
      {modal && <ApprovalModal item={modal.item} task={modal.task} onClose={()=>setModal(null)} onApprove={()=>approve(modal.item.id,modal.task.id)} onReject={(r)=>reject(modal.item.id,modal.task.id,r)}/>}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {items.map(item=>{
          const tasks=APPROVAL_TASKS[item.id]||[];
          return (
            <div key={item.id} style={{background:'#fff',border:'1.5px solid rgba(21,160,143,0.28)',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 4px rgba(16,24,40,.05)'}}>
              {/* header */}
              <div style={{display:'flex',alignItems:'center',gap:11,padding:'14px 18px',borderBottom:'1px solid #f4f6f8'}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                  <i className="bi bi-person-fill" style={{fontSize:16,color:primary}}></i>
                </div>
                <div style={{fontWeight:700,fontSize:14,color:'#1a2332'}}>{item.title}</div>

                    <div style={{flex:1}}></div>
                    <span style={{fontSize:17,fontWeight:700,color:budgetPct>100?RED:primary}}>{budgetPct.toFixed(1)}%</span>
                  </div>
                  <div style={{display:'flex',height:10,background:'#eef0f3',borderRadius:99,overflow:'hidden',marginBottom:10}}>
                    {hasChildren&&usedChildren>0&&<div style={{width:Math.min(100,usedChildren/budget*100)+'%',background:primary}}></div>}
                    {usedSelf>0&&<div style={{width:Math.min(100,usedSelf/budget*100)+'%',background:'#3b6fd4'}}></div>}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px 22px',fontSize:12.5,color:'#3c4350'}}>
                    {hasChildren&&(
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span style={{width:10,height:10,borderRadius:3,background:primary,flex:'none'}}></span>
                        <span>รวมจากแผนใต้ 1 ระดับ</span>
                        <span style={{fontWeight:700}}>{usedChildren.toLocaleString()} บาท</span>
                      </div>
                    )}
                    <div style={{display:'flex',alignItems:'center',gap:7}}>
                      <span style={{width:10,height:10,borderRadius:3,background:'#3b6fd4',flex:'none'}}></span>
                      <span>บันทึกเองในแผนนี้</span>
                      <span style={{fontWeight:700}}>{usedSelf.toLocaleString()} บาท</span>
                    </div>
                  </div>
                </React.Fragment>
              ):(
                <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'14px 0'}}>ไม่ได้ตั้งงบประมาณ</div>
              )}
            </div>

            {/* KPI + progress table — บล็อกแยก */}
            <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>

              {/* tabs + add button */}
              <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:14,flexWrap:'wrap'}}>
                {['ความก้าวหน้า','รายการใช้งบประมาณ','แจ้งเตือน'].map((t,i)=>(
                  <button key={i} onClick={()=>setProgTab(i)} style={{padding:'7px 14px',fontWeight:progTab===i?700:400,color:progTab===i?primary:'#8a93a3',fontSize:13,background:'none',border:'none',borderBottom:'2px solid '+(progTab===i?primary:'transparent'),cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                    <span style={{minWidth:18,height:18,borderRadius:99,background:progTab===i?primarySoft:'#f4f5f7',color:progTab===i?primary:'#9aa3af',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 5px'}}>{i===0?item.progress.filter(p=>p.val).length:i===1?bLogs.length:0}</span>
                    {t}
                  </button>
                ))}
                <div style={{flex:1}}></div>
                <button onClick={()=>setShowReport(true)} style={{display:'inline-flex',alignItems:'center',gap:5,background:primarySoft,color:primary,border:'none',borderRadius:8,padding:'6px 13px',fontSize:12.5,fontWeight:700,cursor:'pointer'}}>
                  <i className="bi bi-plus-lg" style={{fontSize:13}}></i>รายงานผล
                </button>
              </div>

              {progTab===0 ? (
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
                    <thead>
                      <tr style={{background:'#f8f9fb'}}>
                        {['รอบการบันทึก','ค่าที่บันทึก','ค่าเฉลี่ย','ค่าสะสม','',''].map((h,i)=>(
                          <th key={i} style={{padding:'9px 10px',textAlign:i===0?'left':'center',fontWeight:600,color:'#8a93a3',borderBottom:'1px solid #f0f2f5',whiteSpace:'nowrap',fontSize:12}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {item.progress.map((p,i)=>(
                        <tr key={i} style={{borderBottom:'1px solid #f4f6f8'}}>
                          <td style={{padding:'11px 10px',color:p.val?'#1a2332':'#c4ccd4',fontSize:12.5}}>{p.date}</td>
                          <td style={{padding:'11px 10px',textAlign:'center'}}><ValPill val={p.val} color={GRN}/></td>
                          <td style={{padding:'11px 10px',textAlign:'center'}}><ValPill val={p.avg} color='#3b6fd4'/></td>
                          <td style={{padding:'11px 10px',textAlign:'center'}}><ValPill val={p.sum} color='#db2777'/></td>
                          <td style={{padding:'11px 10px',textAlign:'center'}}>{p.status?<StatusDot s={p.status} size={12}/>:<span style={{color:'#e2e8f0',fontSize:14}}>—</span>}</td>
                          <td style={{padding:'11px 10px',textAlign:'center'}}>
                            <button style={{width:28,height:28,borderRadius:7,border:'1px solid #eceef2',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',cursor:'pointer'}}>
                              <i className="bi bi-pencil" style={{fontSize:13,color:'#9aa3af'}}></i>
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : progTab===1 ? (
                budget<=0 ? (
                  <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'28px 0'}}>ไม่ได้ตั้งงบประมาณ</div>
                ) : bLogs.length===0 ? (
                  <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'28px 0'}}>ยังไม่มีการบันทึกการใช้งบประมาณ</div>
                ) : (
                  <div>
                    {bLogs.map((l,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'flex-start',gap:11,padding:'11px 2px',borderBottom:i<bLogs.length-1?'1px solid #f4f6f8':'none'}}>
                        <div style={{width:30,height:30,borderRadius:'50%',background:'#eaf0fb',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                          <i className="bi bi-wallet2" style={{fontSize:14,color:'#3b6fd4'}}></i>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12.5,color:'#1a2332',fontWeight:600,lineHeight:1.4,marginBottom:2}}>{l.note}</div>
                          <div style={{fontSize:11.5,color:'#9aa3af'}}>{l.date} · {l.by}</div>
                        </div>
                        <span style={{fontSize:13,fontWeight:700,color:'#3b6fd4',flex:'none'}}>{l.amount.toLocaleString()} บาท</span>
                      </div>
                    ))}
                  </div>
                )
              ) : (
                <div style={{color:'#b3bac4',fontSize:13,textAlign:'center',padding:'28px 0'}}>ไม่มีการแจ้งเตือน</div>
              )}
            </div>
          </div>

          {/* ── RIGHT ── */}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>

            {/* สรุปข้อมูลคำสั่งการ */}
            <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <i className="bi bi-people-fill" style={{fontSize:19,color:primary}}></i>
                <span style={{fontWeight:700,fontSize:14}}>สรุปข้อมูลคำสั่งการ</span>
                <div style={{flex:1}}></div>
                <span style={{fontSize:12,color:'#9aa3af',fontWeight:600,background:'#f4f5f7',borderRadius:99,padding:'4px 11px'}}>ทั้งหมด {item.cmdTotal} คำสั่งการ</span>
              </div>
              <div style={{fontSize:12.5,color:'#8a93a3',marginBottom:8}}>
                งานตามแผนธุรกิจนี้ <span style={{fontWeight:700,color:'#1a2332'}}>{cmdFiltered}</span> คำสั่งการ
              </div>
              <div style={{display:'flex',height:20,borderRadius:99,overflow:'hidden',marginBottom:10}}>
                {item.cmdG>0&&<div style={{flexGrow:item.cmdG,background:GRN}}></div>}
                {item.cmdY>0&&<div style={{flexGrow:item.cmdY,background:YEL}}></div>}
                {item.cmdR>0&&<div style={{flexGrow:item.cmdR,background:RED}}></div>}
              </div>
              <div style={{display:'flex',gap:18,flexWrap:'wrap',fontSize:12.5,color:'#3c4350',marginBottom:12}}>
                {[[GRN,item.cmdG],[YEL,item.cmdY],[RED,item.cmdR]].map(([c,v],i)=>(
                  <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:11,height:11,borderRadius:'50%',background:c}}></span>{v} คำสั่งการ</span>
                ))}
              </div>
              <div style={{borderTop:'1px solid #f0f2f5',paddingTop:10,display:'flex',alignItems:'center',gap:7,fontSize:12,color:'#9aa3af'}}>
                <i className="bi bi-question-circle" style={{fontSize:14,color:'#b3bac4'}}></i>
                นับคำสั่งการที่ติดแผนงานนี้เท่านั้น
              </div>
            </div>

            {/* แผนธุรกิจภายใต้แผนธุรกิจนี้ */}
            {item.children&&item.children.length>0&&(
              <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'18px 20px',boxShadow:'0 1px 3px rgba(16,24,40,.04)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                  <i className="bi bi-diagram-3" style={{fontSize:18,color:'#8a93a3'}}></i>
                  <span style={{fontWeight:700,fontSize:14}}>แผนธุรกิจภายใต้แผนธุรกิจนี้</span>
                </div>
                <div>
                  {item.children.map((c,i)=>(
                    <div key={i} className="goal-row" onClick={()=>onOpenChild&&onOpenChild(c)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderTop:i?'1px solid #f4f6f8':'none',borderRadius:9,cursor:'pointer'}}>
                      <div style={{width:32,height:32,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                        <i className="bi bi-person-fill" style={{fontSize:15,color:primary}}></i>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:13,color:'#1a2332',lineHeight:1.35,marginBottom:3}}>{c.title}</div>
                        <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#9aa3af'}}>
                          <i className="bi bi-plus-circle" style={{fontSize:12}}></i>
                          <span>{c.kpi}</span>
                        </div>
                      </div>
                      <StatusDot s={c.status} size={14}/>
                      <i className="bi bi-chevron-right" style={{fontSize:13,color:'#c4ccd4',flex:'none'}}></i>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* เปิดดูข้อมูลและสถานะของแผนย่อยจากหน้ารายละเอียด — ถ้ามีข้อมูลเต็มใน ITEMS ใช้ตัวนั้น
   ถ้าไม่มี (mock) สร้างรายการย่อจากข้อมูลที่มีเพื่อให้ดูหน้าจอเดียวกันได้ */
const resolveChildItem=(parent,c)=>{
  const found=ITEMS.find(x=>x.title===c.title);
  if(found) return found;
  const type=c.title.startsWith('เป้าหมาย')?'เป้าหมาย':c.title.startsWith('กลยุทธ์')?'กลยุทธ์':'แผนงาน';
  return {id:'child-'+c.title,type,title:c.title,kpi:c.kpi,hasKpi:!!c.kpi&&c.kpi!=='ไม่มีตัวชี้วัด',status:c.status,updatedAt:null,needApproval:false,period:parent.period,cmdTotal:0,cmdG:0,cmdY:0,cmdR:0,budget:0,spentChildren:0,budgetLogs:[],reporter:'',reportedAt:'',action:'',progress:parent.progress.map(p=>({date:p.date,val:null,avg:null,sum:null,status:''})),children:[]};
};

function App(){
  const [view,setView]=useState('responsible'); // 'responsible' | 'evaluate'
  const [selStack,setSelStack]=useState([]); // stack ของแผนที่เปิดดู — กดแผนย่อยจากหน้ารายละเอียดเพื่อดูต่อ และย้อนกลับทีละชั้นได้
  const sel=selStack.length?selStack[selStack.length-1]:null;
  const [evalItems,setEvalItems]=useState(EVAL_ITEMS_SEED);
  const evalPendingCount=evalItems.filter(x=>!x.evaluated).length;
  const changeView=(v)=>{setView(v);setSelStack([]);};
  return (
    <GD5AppShell active="business">
        {view==='evaluate' ? (
          <React.Fragment>
            <LeftNav view={view} setView={changeView} evalPendingCount={evalPendingCount}/>
            <EvaluateListView items={evalItems} setItems={setEvalItems}/>
          </React.Fragment>
        ) : sel ? (
          <DetailContent item={sel} onBack={()=>setSelStack(s=>s.slice(0,-1))} onOpenChild={(c)=>setSelStack(s=>[...s,resolveChildItem(sel,c)])}/>
        ) : (
          <React.Fragment>
            <LeftNav view={view} setView={changeView} evalPendingCount={evalPendingCount}/>
            <ListContent onSelect={(it)=>setSelStack([it])}/>
          </React.Fragment>
        )}
    </GD5AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(async function(){
  var shellSrc='';
  try{ shellSrc=await (await fetch('gd5-app-shell.jsx')).text(); }catch(e){}
  var pageSrc=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(shellSrc+'\n'+pageSrc,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
