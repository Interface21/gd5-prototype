// ====== card-view mini horizontal bar chart ======
function MiniBars({b}){
  const max=10, ticks=[0,2,4,6,8,10];
  return (
    <div style={{marginTop:4}}>
      {b.map((v,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>

            <div style={{height:'100%',width:(v/max*100)+'%',background:'linear-gradient(90deg,#c79fe8,#b487df)',borderRadius:3}}></div>
          </div>
        </div>
      ))}
      <div style={{display:'flex',marginLeft:82,justifyContent:'space-between',fontSize:9,color:'#b3bac4',marginTop:1}}>
        {ticks.map(t=><span key={t}>{t}</span>)}
      </div>
    </div>
  );
}

// workload per member (total bars stacked: in-progress vs overdue-ish), purple theme
function WorkloadBars(){
  const W=560,H=230,L=30,R=12,T=12,B=58,max=50;
  const data=MEMBERS;
  const pw=W-L-R,ph=H-T-B,band=pw/data.length,bw=26;
  const ys=[0,10,20,30,40,50], yOf=v=>T+ph*(1-v/max);
  return (
    <div>
      <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
        <defs><linearGradient id="vbar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#c79fe8"/><stop offset="1" stopColor="#a878d6"/></linearGradient></defs>
        {ys.map((v,i)=>(<g key={i}><line x1={L} y1={yOf(v)} x2={W-R} y2={yOf(v)} stroke="#eef1f5"/><text x={L-7} y={yOf(v)+4} textAnchor="end" fontSize="10.5" fill="#aab2bd" fontFamily="'IBM Plex Sans Thai'">{v}</text></g>))}
        {data.map((d,i)=>{const x=L+band*i+(band-bw)/2;const y=yOf(d.total),base=yOf(0);return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={base-y} fill="url(#vbar)" rx="4"/>
            <text x={x+bw/2} y={H-38} textAnchor="middle" fontSize="9" fill="#8a93a3" fontFamily="'IBM Plex Sans Thai'">{d.n.split(' ')[0]}</text>
          </g>
        );})}

      <Legend items={[{c:'#a878d6',l:'จำนวนคำสั่งที่ได้รับต่อคน'}]}/>
    </div>
  );
}
// status distribution across the whole team
function StatusBars(){
  const data=BARLABELS.map((l,i)=>({l,v:sum(i)}));
  const W=560,H=230,L=30,R=12,T=12,B=58,max=Math.max(...data.map(d=>d.v))+8;
  const pw=W-L-R,ph=H-T-B,band=pw/data.length,bw=34;
  const step=Math.ceil(max/6/5)*5, ys=[]; for(let v=0;v<=max;v+=step)ys.push(v);
  const yOf=v=>T+ph*(1-v/max);
  return (
    <div>
      <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
        <defs><linearGradient id="tbar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#74dbe2"/><stop offset="1" stopColor="#4ec9d2"/></linearGradient></defs>
        {ys.map((v,i)=>(<g key={i}><line x1={L} y1={yOf(v)} x2={W-R} y2={yOf(v)} stroke="#eef1f5"/><text x={L-7} y={yOf(v)+4} textAnchor="end" fontSize="10.5" fill="#aab2bd" fontFamily="'IBM Plex Sans Thai'">{v}</text></g>))}
        {data.map((d,i)=>{const x=L+band*i+(band-bw)/2;const y=yOf(d.v),base=yOf(0);return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={base-y} fill="url(#tbar)" rx="4"/>
            <text x={x+bw/2} y={H-38} textAnchor="middle" fontSize="8.5" fill="#8a93a3" fontFamily="'IBM Plex Sans Thai'">{d.l}</text>
          </g>
        );})}
      </svg>
    </div>
  );
}

function IndivStatusBars({b}){

          <rect x={x} y={y} width={bw} height={base-y} fill="url(#tbar2)" rx="4"/>

// this person's status distribution donut
function IndivDonut({b}){
  const segs=[{v:b[0],c:'#f5d34a',l:'คำสั่งใหม่'},{v:b[1],c:'#5bc5e8',l:'กำลังดำเนินการ'},{v:b[2],c:'#a878d6',l:'รอปิดงาน'},{v:b[3],c:'#22b96a',l:'ปิดงานแล้ว'}];
  const total=segs.reduce((a,s)=>a+s.v,0)||1;
  const C=2*Math.PI*52; let off=0;
  const circles=segs.map((s,i)=>{const len=C*s.v/total;const el=(<circle key={i} r="52" cx="90" cy="90" fill="none" stroke={s.c} strokeWidth="24" strokeDasharray={len+' '+(C-len)} strokeDashoffset={-off}/>);off+=len;return el;});
  return (
    <div style={{display:'flex',alignItems:'center',gap:20,padding:'10px 4px',flexWrap:'wrap'}}>
      <svg viewBox="0 0 180 180" style={{width:160,height:160,flex:'none'}}><g transform="rotate(-90 90 90)">{circles}</g></svg>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {segs.map((s,i)=>(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:9,fontSize:13,color:'#5a6473'}}><span style={{width:12,height:12,borderRadius:'50%',background:s.c}}></span>{s.l} <b style={{color:'#2b3440'}}>({Math.round(s.v/total*100)}%)</b></span>))}
      </div>
    </div>
  );
}

    return (<button onClick={()=>setView(mode)} className="tgl" style={{width:40,height:36,borderRadius:9,border:'1px solid '+(a?primary:'#e3e7ec'),background:a?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(icon,20,a?primary:'#8a93a3')}</button>);
  };

  return (
   <div style={{minHeight:'100vh',background:'#eef1f6'}}>
    {/* TOP BAR */}
    <div style={{height:58,background:'#fff',borderBottom:'1px solid #e7eaef',display:'flex',alignItems:'center',gap:18,padding:'0 18px',position:'sticky',top:0,zIndex:30}}>
      <a href="dashboard.html" style={{display:'flex',alignItems:'center'}}><img src="image/logo.png" style={{height:36,objectFit:'contain'}} alt="GiveD5"/></a>
      <div style={{display:'flex',alignItems:'center',gap:8,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:10,padding:'9px 12px',width:280}}>
        <i className="bi bi-search" style={{fontSize:16,color:'#9aa3af'}}></i><span style={{color:'#9aa3af',fontSize:13}}>ค้นหา GiveD5</span>
      </div>
      <div style={{flex:1}}></div>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-bell" style={{fontSize:21,color:'#5a6473'}}></i><span style={{position:'absolute',top:-2,right:-2,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>2</span></div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36}}><i className="bi bi-chat" style={{fontSize:21,color:'#5a6473'}}></i></div>
      <div style={{display:'flex',alignItems:'center',gap:5,color:'#5a6473'}}><i className="bi bi-globe" style={{fontSize:18}}></i><span style={{fontSize:13}}>ไทย</span><i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i></div>
      <i className="bi bi-moon" style={{fontSize:20,color:'#5a6473'}}></i>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingLeft:10,borderLeft:'1px solid #e7eaef'}}>
        <div style={{lineHeight:1.2,textAlign:'right'}}><div style={{fontWeight:700,fontSize:13.5}}>Piyawat Takaew</div><div style={{fontSize:11.5,color:'#8a93a3'}}>SA Staff</div></div>
        <div style={{width:38,height:38,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,flex:'none'}}>P</div>
        <i className="bi bi-chevron-down" style={{fontSize:14,color:'#9aa3af'}}></i>
      </div>
    </div>

    <div style={{display:'flex'}}>
      {/* ICON RAIL */}
      <div style={{width:60,background:'#fff',borderRight:'1px solid #e7eaef',display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 0',position:'sticky',top:58,height:'calc(100vh - 58px)'}}>
        <div style={{width:34,height:34,borderRadius:'50%',background:'#15a08f',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,marginBottom:6,flex:'none'}}>P</div>
        {[['bi-layout-sidebar',false,'dashboard.html'],['bi-graph-up',false,'org-dashboard.html'],['bi-arrow-down-left',false,'assignee-action-list.html'],['bi-arrow-up-right',true,'commander-action-dashboard.html'],['bi-easel',false,'user-virtual-meeting.html'],['bi-file-earmark-arrow-down'],['bi-book'],['bi-clipboard-data',false,'business-plan-responsible-list.html']].map(([ic,act,url],i)=> url ? (
          <a href={url} key={i} style={{textDecoration:'none',width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></a>
        ) : (
          <div key={i} style={{width:40,height:40,borderRadius:11,background:act?primarySoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><i className={'bi '+ic} style={{fontSize:21,color:act?primary:'#9aa3af'}}></i></div>
        ))}
        <div style={{width:36,height:36,borderRadius:'50%',background:'#f0f2f5',display:'flex',alignItems:'center',justifyContent:'center',marginTop:4}}><i className="bi bi-chevron-down" style={{fontSize:18,color:'#5a6473'}}></i></div>
      </div>

      {/* SECONDARY NAV */}
      <div style={{width:264,background:'#fff',borderRight:'1px solid #e7eaef',padding:'18px 14px',position:'sticky',top:58,height:'calc(100vh - 58px)',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {navTop.map((n,i)=>(
            <a key={i} href={i===0?'create-command.html':'#'} className="nav-item" style={{display:'flex',alignItems:'center',gap:11,padding:'9px 10px',borderRadius:10}}>
              <span style={{width:26,height:26,borderRadius:8,background:'#e0322b',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i className="bi bi-plus-lg" style={{fontSize:14,color:'#fff'}}></i></span>
              <span style={{fontSize:13.5,fontWeight:600,color:'#3a4452'}}>{n}</span>
            </a>
          ))}
        </div>
        <div style={{height:1,background:'#eef0f4',margin:'13px 4px'}}></div>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {navList.map((n,i)=>(
            <a key={i} href={n.href} className="nav-item" style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:10,background:n.active?primarySoft:'transparent'}}>
              <i className={'bi '+n.icon} style={{fontSize:18,color:n.active?primary:'#8a93a3'}}></i>
              <span style={{fontSize:13.5,fontWeight:n.active?700:600,color:n.active?primary:'#5a6473'}}>{n.label}</span>
            </a>
          ))}
        </div>
        <div style={{flex:1}}></div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,padding:22,minWidth:0}}>

        {/* HEADER */}
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:4}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('groups',22,primary,true)}</div>

            <div style={{fontWeight:700,fontSize:20,lineHeight:1.2}}>คำสั่งที่ลูกทีมได้รับ</div>

          </div>
          <div style={{flex:1}}></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <ToggleBtn mode="cards" icon="grid_view"/>
            <ToggleBtn mode="list" icon="list"/>
            <ToggleBtn mode="dashboard" icon="bar_chart"/>
          </div>
        </div>

        {/* CONTROLS */}
        {view!=='dashboard' ? (
          <div style={{display:'flex',alignItems:'center',gap:11,margin:'16px 0 18px',flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,background:'#f5f7f9',border:'1px solid #e7eaef',borderRadius:10,padding:'9px 13px',width:300,maxWidth:'100%'}}>
              {ms('search',17,'#9aa3af')}
              <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="ค้นหาชื่อลูกทีม" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:13.5}}/>
            </div>
            <div style={{flex:1}}></div>
            <button style={{display:'inline-flex',alignItems:'center',gap:7,border:'1px solid #e3e7ec',background:'#fff',color:'#5a6473',borderRadius:9,padding:'8px 14px',fontSize:13,fontWeight:600}}>{ms('filter_list',17,'#8a93a3')}ตัวกรอง</button>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',gap:11,margin:'16px 0 16px',flexWrap:'wrap'}}>
            <Letter s={MEMBERS[sel].n} d={38}/>
            <div style={{display:'flex',flexDirection:'column'}}>
              <span style={{fontSize:10.5,color:'#aab2be'}}>เลือกลูกทีม</span>
              <div style={{display:'flex',alignItems:'center',gap:6,border:'1px solid #e3e7ec',borderRadius:9,padding:'4px 10px',background:'#fff'}}>
                <select value={sel} onChange={(e)=>setSel(Number(e.target.value))} style={{border:'none',outline:'none',background:'transparent',fontSize:14,fontWeight:700,color:'#1f2733',cursor:'pointer',appearance:'none',paddingRight:4}}>
                  {MEMBERS.map((m,i)=><option key={i} value={i}>{m.n} — {m.role}</option>)}
                </select>
                {ms('expand_more',18,'#9aa3af')}
              </div>
            </div>
            <div style={{flex:1}}></div>
            <span style={{fontSize:13,color:'#8a93a3'}}>เลือกดูข้อมูล</span>
            <button style={{display:'inline-flex',alignItems:'center',gap:9,border:'1px solid #d3ece7',background:'#f3faf8',color:primary,borderRadius:9,padding:'8px 14px',fontSize:13,fontWeight:600}}>{range}{ms('expand_more',18,primary)}</button>
          </div>
        )}

        {/* ===== CARDS VIEW ===== */}
        {view==='cards' && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
            {members.map((m,i)=><MemberCard key={i} m={m}/>)}
          </div>
        )}

        {/* ===== LIST VIEW ===== */}
        {view==='list' && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:14}}>
            {members.map((m,i)=><MemberRow key={i} m={m}/>)}
          </div>
        )}

        {/* ===== DASHBOARD VIEW ===== */}
        {view==='dashboard' && (
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:13,marginBottom:18}}>
              {indivStat(sel).map((s,i)=>(
                <div key={i} style={{position:'relative',overflow:'hidden',background:'linear-gradient(150deg,'+s.c1+' 0%,'+s.c2+' 100%)',borderRadius:16,padding:'15px 15px 15px',color:'#fff',boxShadow:'0 7px 16px '+s.sh,minHeight:140,display:'flex',flexDirection:'column'}}>
                  <span style={{position:'absolute',right:-16,bottom:-20,opacity:.15,lineHeight:0}}>{ms(s.icon,94,'#fff',true)}</span>
                  <div style={{width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(s.icon,20,'#fff',true)}</div>
                  <div style={{fontSize:13,fontWeight:600,opacity:.96,marginTop:11}}>{s.label}</div>
                  <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:'auto'}}>
                    <div style={{fontSize:34,fontWeight:700,lineHeight:1}}>{s.value}</div>
                    <div style={{fontSize:11.5,opacity:.9}}>{s.unit}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <Card icon="groups" title={'จำนวนคำสั่งแยกตามสถานะ — '+MEMBERS[sel].n.split(' ')[0]}><IndivStatusBars b={MEMBERS[sel].b}/></Card>
              <Card icon="donut_large" title="ติดตามสถานะงานแบบ Real-time"><IndivDonut b={MEMBERS[sel].b}/></Card>
            </div>
          </div>
        )}

       </div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
