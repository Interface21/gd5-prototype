function GanttView({topics}){
  const [filter,setFilter]=React.useState('all'); // 'all' | topic index
  const DAY=86400000;
  const base=new Date(2026,0,1);
  const todayDay=13; // 14 Jan 2026
  const fmt=(d)=>{const dt=new Date(base.getTime()+d*DAY);return dt.getDate()+'/'+(dt.getMonth()+1);};
  // build rows with synthetic date ranges (prototype: seed has no explicit ranges)
  let rows=[];
  topics.forEach((t,ti)=>{
    if(filter!=='all' && ti!==filter) return; // ti kept = original index → ranges stable
    const tStart=ti*2;
    const subRows=t.subs.map((s,i)=>{
      const start=tStart+i*2;
      const dur=8+((i+ti)%3)*6;
      const end=start+dur;
      let color = s.done?'#37b86e' : s.daysType==='over'?'#ef9a9a' : (s.op||s.days>0)?'#7aa7d9' : '#d6dce3';
      return {type:'sub',title:s.title,start,end,color};
    });
    rows.push({type:'topic',title:t.title});
    subRows.forEach(r=>rows.push(r));
  });
  const maxEnd=Math.max(49,...rows.filter(r=>r.type==='sub').map(r=>r.end));
  const total=maxEnd+3;
  const pct=(d)=>(d/total*100)+'%';
  const ticks=[];for(let d=0;d<=total-3;d+=7)ticks.push(d);
  const LBL=232;

  return (
   <div>
    {/* topic filter */}
    <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexWrap:'wrap'}}>
      {ms('filter_list',18,'#8a93a3')}
      <span style={{fontSize:12.5,color:'#8a93a3',fontWeight:600}}>หัวข้อหลัก</span>
      <select value={filter} onChange={(e)=>setFilter(e.target.value==='all'?'all':parseInt(e.target.value,10))} style={{flex:'1 1 200px',maxWidth:360,border:'1px solid #e3e7ec',borderRadius:9,padding:'8px 11px',fontSize:13,color:'#2b3440',fontFamily:'inherit',outline:'none',cursor:'pointer',background:'#fff'}}>
        <option value="all">ทุกหัวข้อ ({topics.length})</option>
        {topics.map((t,i)=>(<option key={i} value={i}>{t.title}</option>))}
      </select>
      {filter!=='all' && <button onClick={()=>setFilter('all')} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,fontWeight:600,color:primary}}>{ms('close',16,primary)}ล้าง</button>}
    </div>
    {/* today label */}
    <div style={{display:'flex'}}>
      <div style={{width:LBL,flex:'none'}}></div>
      <div style={{flex:1,position:'relative',height:20}}>
        <div style={{position:'absolute',left:pct(todayDay),transform:'translateX(-50%)',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <span style={{fontSize:11,color:'#1f9d57',fontWeight:700}}>วันนี้</span>
        </div>
      </div>
    </div>

    <div style={{position:'relative',borderTop:'1px solid #f1f3f6'}}>
      {/* plot overlay: gridlines + today line */}
      <div style={{position:'absolute',left:LBL,right:0,top:0,bottom:0,pointerEvents:'none'}}>
        {ticks.map((d,i)=>(<div key={i} style={{position:'absolute',left:pct(d),top:0,bottom:0,width:1,background:'#f4f6f8'}}></div>))}
        <div style={{position:'absolute',left:pct(todayDay),top:0,bottom:0,width:2,marginLeft:-1,background:'#37b86e',opacity:.45}}></div>
      </div>
      {/* rows */}
      {rows.map((r,i)=> r.type==='topic' ? (
        <div key={i} style={{display:'flex',alignItems:'center',minHeight:34,borderTop:i?'1px solid #f4f6f8':'none'}}>
          <div style={{width:LBL,flex:'none',paddingRight:14,fontWeight:700,fontSize:12.5,color:'#2b3440',lineHeight:1.3,paddingTop:6,paddingBottom:6,textWrap:'pretty'}}>{r.title}</div>
          <div style={{flex:1}}></div>
        </div>
      ) : (
        <div key={i} style={{display:'flex',alignItems:'center',minHeight:30}}>
          <div style={{width:LBL,flex:'none',paddingLeft:8,paddingRight:14,fontSize:12,color:'#5a6473',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.title}</div>
          <div style={{flex:1,position:'relative',height:30}}>
            <div style={{position:'absolute',top:'50%',transform:'translateY(-50%)',left:pct(r.start),width:pct(r.end-r.start),height:11,borderRadius:99,background:r.color}}></div>
          </div>
        </div>
      ))}
    </div>

    {/* axis */}
    <div style={{display:'flex',borderTop:'1px solid #f1f3f6',marginTop:2}}>
      <div style={{width:LBL,flex:'none'}}></div>
      <div style={{flex:1,position:'relative',height:24}}>
        {ticks.map((d,i)=>(<span key={i} style={{position:'absolute',left:pct(d),transform:'translateX(-50%)',top:6,fontSize:11,color:'#9aa3af'}}>{fmt(d)}</span>))}
      </div>
    </div>

    {/* legend */}
    <div style={{display:'flex',alignItems:'center',gap:16,marginTop:12,paddingLeft:LBL,fontSize:11.5,color:'#7b8595',flexWrap:'wrap'}}>
      {[['#37b86e','เสร็จแล้ว'],['#7aa7d9','กำลังดำเนินการ'],['#ef9a9a','เกินกำหนด'],['#d6dce3','ยังไม่เริ่ม']].map((l,i)=>(
        <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:14,height:9,borderRadius:99,background:l[0]}}></span>{l[1]}</span>
      ))}
    </div>
   </div>
  );
}

const bpNode=(level,id)=>(BP_DATA[level]||[]).find(x=>x.id===id);
const bpChildrenOf=(levelKey,pid)=>(BP_DATA[levelKey]||[]).filter(x=>x.pid===pid);
function bpChain(level,id){
  let chain={},tier=BP_LV(level).tier,cur=bpNode(level,id);
  if(!cur)return chain;
  chain[level]=id;
  while(tier>1 && cur){
    tier--;
    const pk=BP_TIERKEY[tier];
    const parentId=cur.pid;
    cur=bpNode(pk,parentId);
    if(cur)chain[pk]=parentId;
  }
  return chain;
}
function bpBreadcrumb(level,id){
  const chain=bpChain(level,id),tier=BP_LV(level).tier,arr=[];
  for(let t=1;t<=tier;t++){const k=BP_TIERKEY[t];if(chain[k])arr.push({level:k,id:chain[k],it:bpNode(k,chain[k])});}
  return arr;
}
const bpLabel=(level,id)=>{const it=bpNode(level,id);return it?(BP_LV(level).name+' '+it.no+': '+it.title):'';};

            </div>

            <div style={{textAlign:'center',padding:'48px 0',color:'#b3bac4',fontSize:13.5}}>{q?'ไม่พบชุดรายการที่ค้นหา':'ยังไม่มีชุดรายการมาตรฐานสำหรับแผนธุรกิจนี้'}</div>
          )}

                  <i className={'bi bi-chevron-'+(open?'up':'down')} style={{fontSize:13,color:'#9aa3af',flex:'none'}}></i>
                  <button onClick={e=>{e.stopPropagation();doImport(t);}} style={{display:'inline-flex',alignItems:'center',gap:5,background:primary,color:'#fff',border:'none',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:'pointer',flex:'none',whiteSpace:'nowrap'}}>
                    <i className="bi bi-download" style={{fontSize:13}}></i>ใช้งาน
                  </button>
                </div>
                {/* expanded topics */}
                {open && t.topics && (
                  <div style={{background:'#f7f9fb',padding:'4px 22px 16px 22px',borderTop:'1px solid #eef0f3'}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 24px',paddingTop:10}}>
                      {t.topics.map((tp,j)=>(
                        <div key={j} style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,color:'#4b5563'}}>
                          <span style={{width:18,height:18,borderRadius:5,background:m.bg,display:'flex',alignItems:'center',justifyContent:'center',flex:'none',fontSize:11,fontWeight:700,color:m.accent}}>{j+1}</span>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tp}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BusinessPlanPickerModal({value,onChange,onClose}){
  const [q,setQ]=React.useState('');
  const [expanded,setExpanded]=React.useState(()=>{
    if(!value)return {};
    const bc=bpBreadcrumb(value.level,value.id),exp={};
    bc.forEach(n=>{exp[n.id]=true;});
    return exp;
  });
  const toggle=(id)=>setExpanded(s=>({...s,[id]:!s[id]}));
  const choose=(level,id)=>{onChange({level,id});onClose();};
  const clear=()=>{onChange(null);onClose();};

  const query=q.trim().toLowerCase();
  let results=[];
  if(query){
    BP_LEVELS.forEach(L=>{
      (BP_DATA[L.key]||[]).forEach(it=>{
        const bc=bpBreadcrumb(L.key,it.id);
        const txt=bc.map(x=>BP_LV(x.level).name+' '+x.it.no+' '+x.it.title).join(' ').toLowerCase();
        if(txt.includes(query))results.push({level:L.key,id:it.id,it,bc});
      });
    });
  }

  const rows=[];
  const walk=(levelKey,pid,depth)=>{
    const items=levelKey==='mission'?BP_DATA.mission:bpChildrenOf(levelKey,pid);
    items.forEach(it=>{
      const L=BP_LV(levelKey);
      const kids=L.tier<4?bpChildrenOf(BP_TIERKEY[L.tier+1],it.id):[];
      const hasKids=kids.length>0;
      const isExp=!!expanded[it.id];
      const isSel=value&&value.level===levelKey&&value.id===it.id;
      rows.push(
        <div key={levelKey+it.id} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px 8px '+(10+depth*20)+'px',borderRadius:8,background:isSel?primarySoft:'transparent'}}>
          {hasKids ? (
            <button onClick={()=>toggle(it.id)} style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',flex:'none',border:'none',background:'transparent',cursor:'pointer'}}>
              <i className={'bi '+(isExp?'bi-caret-down-fill':'bi-caret-right-fill')} style={{fontSize:9,color:'#9aa3af'}}></i>
            </button>
          ) : <span style={{width:18,flex:'none'}}></span>}
          <i className={'bi '+L.icon} style={{fontSize:13,color:L.accent,flex:'none'}}></i>
          <button onClick={()=>choose(levelKey,it.id)} style={{flex:1,minWidth:0,textAlign:'left',border:'none',background:'transparent',cursor:'pointer',padding:'2px 0',overflow:'hidden'}}>
            <span style={{fontSize:13,fontWeight:isSel?700:600,color:isSel?primary:'#1a2332'}}>{L.name} {it.no}</span>
            <span style={{fontSize:12.5,color:'#5a6473',marginLeft:6}}>{it.title}</span>
          </button>
          {hasKids && <span style={{fontSize:10.5,color:'#9aa3af',fontWeight:600,background:'#f1f3f7',borderRadius:99,padding:'1px 8px',flex:'none'}}>{kids.length}</span>}
          {isSel && <i className="bi bi-check-lg" style={{fontSize:14,color:primary,flex:'none'}}></i>}
        </div>
      );
      if(hasKids&&isExp)walk(BP_TIERKEY[L.tier+1],it.id,depth+1);
    });
  };
  walk('mission',null,0);

  return (
   <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(16,24,40,.48)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:110,padding:'28px 16px'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:18,width:560,maxWidth:'100%',maxHeight:'82vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(16,24,40,.28)',animation:'fadeIn .15s ease'}}>
      <div style={{padding:'18px 22px 14px',borderBottom:'1px solid #f0f2f5',flex:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,borderRadius:11,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
            <i className="bi bi-diagram-3-fill" style={{fontSize:19,color:primary}}></i>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:15.5,color:'#1a2332'}}>เลือกแผนธุรกิจที่สนับสนุน</div>
            <div style={{fontSize:12,color:'#9aa3af',marginTop:1}}>เลือกได้ทุกระดับ (พันธกิจ / เป้าหมาย / กลยุทธ์ / แผนงาน)</div>
          </div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:9,background:'#f1f3f7',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',border:'none',cursor:'pointer'}}>
            <i className="bi bi-x-lg" style={{fontSize:14,color:'#5a6473'}}></i>
          </button>
        </div>
        <div style={{position:'relative',marginTop:12}}>
          <i className="bi bi-search" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'#9aa3af',pointerEvents:'none'}}></i>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="ค้นหาชื่อแผนธุรกิจทุกระดับ..." style={{width:'100%',border:'1px solid #e3e7ec',borderRadius:9,padding:'9px 12px 9px 34px',fontSize:13,outline:'none',fontFamily:'inherit',color:'#1f2733',background:'#f6f7f9',boxSizing:'border-box'}}/>
        </div>
      </div>
      <div style={{overflowY:'auto',flex:1,padding:8}}>
        {query ? (
          results.length===0 ? <div style={{textAlign:'center',padding:'40px 0',color:'#b3bac4',fontSize:13}}>ไม่พบผลลัพธ์</div> :
          results.map(n=>{
            const isSel=value&&value.level===n.level&&value.id===n.id;
            return (
              <button key={n.level+n.id} onClick={()=>choose(n.level,n.id)} style={{display:'block',width:'100%',textAlign:'left',padding:'10px 12px',borderRadius:9,border:'none',background:isSel?primarySoft:'transparent',cursor:'pointer'}}>
                <div style={{fontSize:13.5,fontWeight:600,color:isSel?primary:'#1a2332'}}>{BP_LV(n.level).name} {n.it.no}: {n.it.title}</div>
                <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4,flexWrap:'wrap'}}>
                  {n.bc.map((c,i)=>(<React.Fragment key={i}>{i>0&&<i className="bi bi-chevron-right" style={{fontSize:9,color:'#c4ccd4'}}></i>}<span style={{fontSize:11,color:'#9aa3af'}}>{BP_LV(c.level).name} {c.it.no}</span></React.Fragment>))}
                </div>
              </button>
            );
          })
        ) : rows}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 22px',borderTop:'1px solid #f0f2f5',flex:'none'}}>
        {value ? <span style={{fontSize:12.5,color:'#5a6473'}}>เลือกอยู่: <b style={{color:'#1a2332'}}>{bpLabel(value.level,value.id)}</b></span> : <span style={{fontSize:12.5,color:'#9aa3af'}}>ยังไม่ได้เลือก</span>}
        <div style={{flex:1}}></div>
        {value && <button onClick={clear} style={{border:'1px solid #e3e7ec',background:'#fff',color:'#8a93a3',borderRadius:9,padding:'8px 14px',fontSize:12.5,fontWeight:600,cursor:'pointer'}}>ล้างการเลือก</button>}
      </div>
    </div>
   </div>
  );
}

function TodoPanel({bp,setBp}){
  const [mode,setMode]=React.useState('do');   // 'do' | 'edit'
  const [showImport,setShowImport]=React.useState(false);
  const [showPlanPicker,setShowPlanPicker]=React.useState(false);
  const [calView,setCalView]=React.useState(false); // false = list, true = gantt
  const [topics,setTopics]=React.useState(TD_SEED);
  const [open,setOpen]=React.useState({});
  const [modal,setModal]=React.useState(null);
  const [hovSubId,setHovSubId]=React.useState(null);
  const [confirmDel,setConfirmDel]=React.useState(null);

  const cnt=(t)=>({done:t.subs.filter(s=>s.done).length,total:t.subs.length});
  const complete=(t)=>{const c=cnt(t);return c.total>0&&c.done===c.total;};
  const overallN=topics.length, overallDone=topics.filter(complete).length;
  const overallPct=overallN?Math.round(overallDone/overallN*1000)/10:0;

  const toggleOpen=(id)=>setOpen(o=>({...o,[id]:!o[id]}));
  const toggleDone=(tid,sid)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.map(s=>s.id!==sid?s:{...s,done:!s.done})}));
  const moveTopic=(i,dir)=>setTopics(ts=>{const a=[...ts],j=i+dir;if(j<0||j>=a.length)return ts;const x=a[i];a[i]=a[j];a[j]=x;return a;});
  const delTopic=(id)=>setTopics(ts=>ts.filter(t=>t.id!==id));
  const delSub=(tid,sid)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.filter(s=>s.id!==sid)}));
  const addTopic=(d)=>setTopics(ts=>[...ts,{id:uid(),title:d.title||'หัวข้อใหม่',inContract:d.inContract,subs:[]}]);
  const editTopic=(id,d)=>setTopics(ts=>ts.map(t=>t.id!==id?t:{...t,title:d.title,inContract:d.inContract}));
  const addSub=(tid,d)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:[...t.subs,sub(d.title||'รายการใหม่',false,'',0,'left',d.inContract,null)]}));
  const editSub=(tid,sid,d)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:t.subs.map(s=>s.id!==sid?s:{...s,title:d.title,inContract:d.inContract})}));
  const moveSub=(tid,si,dir)=>setTopics(ts=>ts.map(t=>t.id!==tid?t:{...t,subs:(()=>{const a=[...t.subs],j=si+dir;if(j<0||j>=a.length)return a;const x=a[si];a[si]=a[j];a[j]=x;return a;})()}));

  const Count=({c})=>{const done=c.total&&c.done===c.total;return <span style={{minWidth:30,textAlign:'right',color:done?'#22b573':'#aab2bd',fontWeight:600,fontSize:12,flex:'none'}}>{c.done}/{c.total||0}</span>;};
  const MiniBar=({c})=>{const p=c.total?c.done/c.total*100:0,done=p>=100;return <span style={{width:96,height:5,background:'#eef1f5',borderRadius:99,overflow:'hidden',flex:'none'}}><span style={{display:'block',height:'100%',borderRadius:99,background:done?'#22b573':'#15a08f',width:p+'%'}}></span></span>;};

  const ICONBTN=(icon,active,onClick,title)=>(<button onClick={onClick} title={title} style={{width:34,height:32,borderRadius:8,border:'1px solid '+(active?primary:'#e7eaef'),background:active?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms(icon,18,active?primary:'#8a93a3')}</button>);

  return (
   <div>
    <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'16px 18px'}}>
      {/* TOOLBAR */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,flexWrap:'wrap'}}>
        <div style={{fontWeight:700,fontSize:15}}>สิ่งที่ต้องทำ</div>
        {mode==='do' ? (
          <React.Fragment>
            <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:'#9aa3af',flex:'none'}}><span style={{color:'#22b573',fontWeight:700}}>{overallDone}</span>/{overallN} เสร็จ</span>
            <span style={{flex:'1 1 120px',maxWidth:260,height:6,background:'#eef1f5',borderRadius:99,overflow:'hidden'}}><span style={{display:'block',height:'100%',borderRadius:99,background:'#15a08f',width:overallPct+'%'}}></span></span>
            <span style={{fontSize:12.5,color:'#9aa3af',fontWeight:600}}>{overallPct} %</span>
            <div style={{flex:1}}></div>
            {ICONBTN('format_list_bulleted',!calView,()=>setCalView(false),'รายการ')}
            {ICONBTN('calendar_month',calView,()=>setCalView(true),'ปฏิทิน (Gantt)')}
            {ICONBTN('edit',false,()=>setMode('edit'),'โหมดแก้ไข')}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={{flex:1}}></div>
            <button onClick={()=>setModal({kind:'topic'})} title="เพิ่มหัวข้อ" style={{width:34,height:32,borderRadius:8,border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('add',20,primary)}</button>
            {ICONBTN('upload_file',false,()=>setShowImport(true),'นำเข้าชุดรายการมาตรฐาน')}
            <button onClick={()=>setMode('do')} title="เสร็จแก้ไข" style={{display:'inline-flex',alignItems:'center',gap:6,border:'none',background:primary,color:'#fff',borderRadius:9,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}><i className="bi bi-check2" style={{fontSize:15}}></i>เสร็จ</button>
          </React.Fragment>
        )}
      </div>

      {/* TOPICS */}
      {calView ? <GanttView topics={topics} open={open} toggleOpen={toggleOpen}/> : (
      <div>
        {topics.map((t,ti)=>{const c=cnt(t),isOpen=open[t.id];return (
          <div key={t.id} style={{borderTop:ti?'1px solid #f4f6f8':'none'}}>
            {/* topic row */}
            <div className="td-row" style={{display:'flex',alignItems:'center',gap:12,padding:'13px 8px',margin:'0 -8px',borderRadius:10}}>
              <button onClick={()=>toggleOpen(t.id)} style={{display:'flex',alignItems:'center',flex:'none'}}>{mode==='edit'?ms('drag_indicator',22,'#c4ccd4'):ms(complete(t)?'check_circle':'radio_button_unchecked',22,complete(t)?'#22b96a':'#c4ccd4',complete(t))}</button>
              <div onClick={()=>toggleOpen(t.id)} style={{flex:1,minWidth:0,fontWeight:600,fontSize:13.5,color:'#2b3440',cursor:'pointer'}}>{t.title}</div>
              {mode==='do' && c.total>0 && <MiniBar c={c}/>}
              {c.total>0 && <Count c={c}/>}
              {mode==='edit' ? (
                confirmDel&&confirmDel.type==='topic'&&confirmDel.id===t.id ? (
                  <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'#fdeaea',borderRadius:9,padding:'4px 10px',flex:'none'}}>
                    <span style={{fontSize:12,color:'#d83a3a',fontWeight:600}}>ลบหัวข้อนี้?</span>
                    <button onClick={()=>{delTopic(t.id);setConfirmDel(null);}} style={{background:'#d83a3a',color:'#fff',border:'none',borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}}>ยืนยัน</button>
                    <button onClick={()=>setConfirmDel(null)} style={{background:'#f1f3f6',color:'#5a6473',border:'none',borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:600,cursor:'pointer'}}>ยกเลิก</button>
                  </div>

  );
}

function TodoProgressCard(){
  // สรุปจากชุดข้อมูล TD_SEED (นับเฉพาะหัวข้อที่มีรายการย่อย)
  const withSubs=TD_SEED.filter(t=>(t.subs||[]).length>0);
  const allSubs=withSubs.flatMap(t=>t.subs);
  const total=allSubs.length;
  const done=allSubs.filter(s=>s.done).length;
  const pct=total?Math.round(done/total*100):0;
  // สถานะรายหัวข้อ: เสร็จ / กำลังทำ / ยังไม่เริ่ม
  let tDone=0,tProg=0,tNot=0;
  withSubs.forEach(t=>{
    const d=t.subs.filter(s=>s.done).length;
    if(d===t.subs.length)tDone++; else if(d>0)tProg++; else tNot++;
  });
  const nt=withSubs.length||1;
  const seg=[
    {label:'เสร็จ',n:tDone,color:'#22b96a'},
    {label:'กำลังทำ',n:tProg,color:'#f5b301'},
    {label:'ยังไม่เริ่ม',n:tNot,color:'#dfe3e9'},
  ];
  const segTint={'เสร็จ':'#e7f7ee','กำลังทำ':'#fdf3d9','ยังไม่เริ่ม':'#eef1f5'};
  const segText={'เสร็จ':'#1a9e5f','กำลังทำ':'#b5860a','ยังไม่เริ่ม':'#8a93a3'};
  return (
    <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'16px 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:15}}>
        <span style={{width:30,height:30,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('task_alt',18,primary)}</span>
        <span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>ความคืบหน้าสิ่งที่ต้องทำ</span>
      </div>
      {/* progress bar หลัก + จำนวน */}
      <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:28,color:primary,lineHeight:1}}>{pct}<span style={{fontSize:15,fontWeight:700}}>%</span></span>
        <div style={{flex:1,minWidth:0}}></div>
        <div style={{display:'flex',alignItems:'baseline',gap:5}}>
          <span style={{fontWeight:800,fontSize:16,color:'#2b3440'}}>{done}</span>
          <span style={{fontSize:12.5,color:'#9aa3af'}}>/ {total} รายการย่อย</span>
        </div>
      </div>
      <div style={{height:10,borderRadius:99,background:'#eef1f5',overflow:'hidden',marginBottom:6}}>
        <div style={{width:pct+'%',height:'100%',borderRadius:99,background:'linear-gradient(90deg,#15a08f,#2bc0ac)',transition:'width .3s'}}></div>
      </div>
      <div style={{fontSize:12,color:'#8a93a3',marginBottom:16}}>เหลืออีก {total-done} รายการ</div>
      {/* bar graph สถานะรายหัวข้อ */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
        {ms('donut_small',15,'#9aa3af')}
        <span style={{fontSize:11.5,color:'#9aa3af',fontWeight:600}}>สถานะรายหัวข้อ ({withSubs.length})</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
        {seg.map(s=>(
          <div key={s.label} style={{background:segTint[s.label],borderRadius:10,padding:'9px 6px',textAlign:'center'}}>
            <div style={{fontWeight:800,fontSize:18,color:segText[s.label],lineHeight:1}}>{s.n}</div>
            <div style={{fontSize:10.5,color:segText[s.label],marginTop:3,fontWeight:600,opacity:.85}}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'14px 20px',borderTop:'1px solid #f1f3f6'}}>
          <button onClick={onClose} style={{border:'1px solid #e3e7ec',background:'#fff',borderRadius:10,padding:'10px 18px',fontSize:13.5,fontWeight:600,color:'#5a6473',cursor:'pointer'}}>ยกเลิก</button>
          <button onClick={submit} disabled={!valid} style={{border:'none',background:valid?primary:'#cdd4dd',color:'#fff',borderRadius:10,padding:'10px 20px',fontSize:13.5,fontWeight:700,cursor:valid?'pointer':'not-allowed',display:'inline-flex',alignItems:'center',gap:7}}><i className="bi bi-plus-lg" style={{fontSize:14}}></i>เพิ่มเข้ารายการต้องติดตาม</button>
        </div>
      </div>
    </div>
  );
}

function WatchPanel(){
  const [items,setItems]=useState(loadWatch);
  const [catalog,setCatalog]=useState(loadTags);
  const [showAdd,setShowAdd]=useState(false);
  const [openNotes,setOpenNotes]=useState({});
  const [tagMenu,setTagMenu]=useState(null);   // item id whose add-tag menu is open
  const [tagInput,setTagInput]=useState('');
  const [noteInput,setNoteInput]=useState({});
  const ME='Piyawat Takaew';

  const persist=(next)=>{setItems(next);saveWatch(next);};
  const remove=(id)=>persist(items.filter(w=>w.id!==id));
  const addManual=(item)=>{persist([item,...items]);setShowAdd(false);};
  // สิทธิ์: เฉพาะผู้รับผิดชอบโปรเจค Easy PM (ในต้นแบบนี้ ME เป็นผู้รับผิดชอบ)
  const canAdd=true;
  const toggleNotes=(id)=>setOpenNotes(o=>({...o,[id]:!o[id]}));

  const addTag=(id,label)=>{
    label=(label||'').trim();if(!label)return;
    if(!catalog.includes(label)){const c=[...catalog,label];setCatalog(c);saveTags(c);}
    persist(items.map(w=>w.id!==id?w:{...w,tags:(w.tags||[]).includes(label)?w.tags:[...(w.tags||[]),label]}));
    setTagInput('');setTagMenu(null);
  };
  const removeTag=(id,label)=>persist(items.map(w=>w.id!==id?w:{...w,tags:(w.tags||[]).filter(t=>t!==label)}));
  const removeFromCatalog=(label)=>{const c=catalog.filter(t=>t!==label);setCatalog(c);saveTags(c);persist(items.map(w=>({...w,tags:(w.tags||[]).filter(t=>t!==label)})));};
  const addNote=(id)=>{const t=(noteInput[id]||'').trim();if(!t)return;persist(items.map(w=>w.id!==id?w:{...w,notes:[...(w.notes||[]),{by:ME,at:Date.now(),t}]}));setNoteInput(n=>({...n,[id]:''}));};
  const delNote=(id,idx)=>persist(items.map(w=>w.id!==id?w:{...w,notes:(w.notes||[]).filter((_,j)=>j!==idx)}));

  const Tag=({label,onX})=>{const[bg,fg,bd]=tagColor(label);return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:bg,color:fg,border:'1px solid '+bd,borderRadius:99,padding:'3px 5px 3px 11px',fontSize:12,fontWeight:700}}>
      <i className="bi bi-tag-fill" style={{fontSize:11}}></i>{label}
      {onX && <button onClick={onX} style={{width:17,height:17,borderRadius:'50%',border:'none',background:'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:fg,opacity:.7}}><i className="bi bi-x" style={{fontSize:14}}></i></button>}
    </span>
  );};

  return (
   <div style={{animation:'fadeIn .2s ease',display:'flex',flexDirection:'column',gap:16}}>
    {showAdd && <AddWatchModal catalog={catalog} onClose={()=>setShowAdd(false)} onSave={addManual}/>}
    <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'16px 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <i className="bi bi-shield-check" style={{fontSize:21,color:primary}}></i>
        <span style={{fontWeight:700,fontSize:16}}>รายการต้องติดตาม</span>
        <span style={{minWidth:22,height:22,borderRadius:99,background:primarySoft,color:primary,fontSize:12,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 7px'}}>{items.length}</span>
        <div style={{flex:1}}></div>
        {canAdd && <button onClick={()=>setShowAdd(true)} style={{display:'inline-flex',alignItems:'center',gap:7,border:'none',background:primary,color:'#fff',borderRadius:10,padding:'9px 15px',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:'0 1px 2px rgba(21,160,143,.3)'}}><i className="bi bi-plus-lg" style={{fontSize:14}}></i>เพิ่มเอง</button>}
      </div>
      <div style={{fontSize:12.5,color:'#9aa3af',marginTop:9}}>รวมรายการที่เพิ่มจาก Checklist ในคำสั่งการ และที่ผู้รับผิดชอบโปรเจคเพิ่มเอง</div>
    </div>

    {items.length===0 ? (
      <div style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,padding:'64px 0',textAlign:'center',color:'#aeb6c2'}}>
        <i className="bi bi-bookmark-x" style={{fontSize:42,color:'#cfd6e0'}}></i>
        <div style={{marginTop:12,fontSize:13.5}}>ยังไม่มีรายการต้องติดตาม</div>
        <div style={{marginTop:4,fontSize:12.5}}>กดไอคอนเฝ้าติดตามท้ายรายการใน Checklist ของคำสั่งการ</div>
      </div>
    ) : items.map(w=>{
      const notesOpen=openNotes[w.id];const notes=w.notes||[];const tags=w.tags||[];const menu=tagMenu===w.id;
      const suggestions=catalog.filter(t=>!tags.includes(t)&&t.toLowerCase().includes(tagInput.trim().toLowerCase()));
      return (
      <div key={w.id} style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'18px 20px'}}>
        {/* head */}
        <div style={{display:'flex',alignItems:'flex-start',gap:13}}>
          <div style={{width:40,height:40,borderRadius:11,background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i className="bi bi-clipboard-check" style={{fontSize:20,color:primary}}></i></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <div style={{fontWeight:700,fontSize:15.5,lineHeight:1.4,textWrap:'pretty'}}>{w.title}</div>
              {w.manual && <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fef3e2',color:'#b97d09',border:'1px solid #f3d79a',borderRadius:99,padding:'2px 10px',fontSize:11,fontWeight:700,flex:'none'}}><i className="bi bi-hand-index-thumb" style={{fontSize:11}}></i>เพิ่มเอง</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
              {w.due && (()=>{const dl=daysLeft(w.due);const over=dl!==null&&dl<0;const warn=dl!==null&&dl>=0&&dl<=7;return (<><span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:over?'#d8513a':'#b45309',background:over?'#fdecec':'#fff7e8',borderRadius:7,padding:'2px 9px'}}><i className="bi bi-calendar-event" style={{fontSize:12}}></i>{fmtDate(w.due)}</span>{dl!==null&&<span style={{display:'inline-flex',alignItems:'center',gap:4,background:over?'#fdecec':warn?'#fdf3d6':'#f0faf6',color:over?'#d8513a':warn?'#a9870a':'#1f9d57',borderRadius:7,padding:'2px 9px',fontSize:11.5,fontWeight:700}}>{over?'เกินมา '+Math.abs(dl)+' วัน':'อีก '+dl+' วัน'}</span>}</>);})()}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flex:'none'}}>
            {w.manual
              ? <span title="รายการนี้เพิ่มเอง ไม่มีคำสั่งการต้นทาง" style={{display:'inline-flex',alignItems:'center',gap:6,background:'#f4f5f7',color:'#8a93a3',borderRadius:9,padding:'7px 13px',fontSize:12.5,fontWeight:700}}><i className="bi bi-slash-circle" style={{fontSize:14}}></i>ไม่มีคำสั่งการ</span>
              : <a href={(w.href||'#')} title="ย้อนกลับไปคำสั่งการ" style={{display:'inline-flex',alignItems:'center',gap:6,background:'#eaf1fe',color:'#3b6fd4',borderRadius:9,padding:'7px 13px',fontSize:12.5,fontWeight:700}}><i className="bi bi-arrow-return-left" style={{fontSize:14}}></i>ไปยังคำสั่งการ</a>}
            <button onClick={()=>remove(w.id)} title="นำออกจากรายการต้องติดตาม" style={{width:34,height:34,borderRadius:9,border:'1px solid #f6d3d0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="bi bi-x-lg" style={{fontSize:15,color:'#d83a3a'}}></i></button>
          </div>
        </div>

        {/* added by / when */}
        <div style={{display:'flex',alignItems:'center',gap:9,marginTop:14,paddingTop:13,borderTop:'1px solid #f4f6f8'}}>
          <Letter s={w.addedBy||ME} d={26} fs={11}/>
          <span style={{fontSize:12.5,color:'#5a6473'}}>เพิ่มโดย <b style={{color:'#2b3440'}}>{w.addedBy||ME}</b>{w.addedByRole?' · '+w.addedByRole:''}</span>
          {w.owner && <><span style={{color:'#d4d9e0'}}>•</span><span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12.5,color:'#5a6473'}}><i className="bi bi-person-badge" style={{fontSize:13,color:'#9aa3af'}}></i>ผู้รับผิดชอบ <b style={{color:'#2b3440'}}>{w.owner}</b></span></>}
          <span style={{color:'#d4d9e0'}}>•</span>
          <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12.5,color:'#9aa3af'}}><i className="bi bi-clock" style={{fontSize:12}}></i>{relTime(w.addedAt||Date.now())}</span>
        </div>

        {/* tags */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:13,flexWrap:'wrap',position:'relative'}}>
          <span style={{fontSize:12.5,fontWeight:600,color:'#8a93a3',display:'inline-flex',alignItems:'center',gap:5}}><i className="bi bi-tags" style={{fontSize:14}}></i>Tag</span>
          {tags.map(t=><Tag key={t} label={t} onX={()=>removeTag(w.id,t)}/>)}
          {tags.length===0 && <span style={{fontSize:12,color:'#b3bac4'}}>ยังไม่มี</span>}
          <button onClick={()=>{setTagMenu(menu?null:w.id);setTagInput('');}} style={{display:'inline-flex',alignItems:'center',gap:5,border:'1px dashed #cdd4dd',background:'#fff',borderRadius:99,padding:'4px 12px',fontSize:12,fontWeight:600,color:'#5a6473'}}><i className="bi bi-plus-lg" style={{fontSize:12}}></i>เพิ่ม Tag</button>
          {menu && (
            <div style={{position:'absolute',top:'100%',left:54,marginTop:7,zIndex:20,width:268,background:'#fff',border:'1px solid #e7eaef',borderRadius:12,boxShadow:'0 12px 30px rgba(16,24,40,.16)',padding:12,animation:'fadeIn .12s ease'}}>
              <div style={{display:'flex',alignItems:'center',gap:7,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:9,padding:'7px 10px'}}>
                <i className="bi bi-tag" style={{fontSize:14,color:'#9aa3af'}}></i>
                <input autoFocus value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTag(w.id,tagInput);}} placeholder="ค้นหา หรือพิมพ์ Tag ใหม่" style={{border:'none',outline:'none',background:'transparent',fontSize:13,flex:1,color:'#2b3440',fontFamily:'inherit'}}/>

                {suggestions.map(t=>(
                  <div key={t} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 7px',borderRadius:8}} className="td-row">

                    <button onClick={()=>removeFromCatalog(t)} title="ลบ Tag นี้ออกจากระบบ" style={{width:24,height:24,borderRadius:6,border:'none',background:'transparent',color:'#c2cad4',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="bi bi-trash3" style={{fontSize:13}}></i></button>
                  </div>
                ))}
                {tagInput.trim() && !catalog.some(t=>t.toLowerCase()===tagInput.trim().toLowerCase()) && (
                  <button onClick={()=>addTag(w.id,tagInput)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 7px',border:'none',background:'transparent',textAlign:'left',fontSize:12.5,fontWeight:600,color:primary}}><i className="bi bi-plus-circle" style={{fontSize:15}}></i>สร้าง “{tagInput.trim()}”</button>
                )}
                {suggestions.length===0 && !tagInput.trim() && <div style={{fontSize:12,color:'#b3bac4',padding:'6px 7px'}}>พิมพ์เพื่อสร้าง Tag ใหม่</div>}
              </div>
            </div>
          )}
        </div>

        {/* notes toggle */}
        <div style={{marginTop:14}}>
          <button onClick={()=>toggleNotes(w.id)} style={{display:'inline-flex',alignItems:'center',gap:7,border:'none',background:'transparent',padding:0,fontSize:13,fontWeight:600,color:'#5a6473'}}>
            <i className="bi bi-journal-text" style={{fontSize:15,color:primary}}></i>Note List
            <span style={{minWidth:18,height:18,borderRadius:99,background:'#f1f3f6',color:'#7b8595',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 5px'}}>{notes.length}</span>

            <div style={{marginTop:10,background:'#fafbfc',border:'1px solid #eef0f4',borderRadius:11,padding:'12px 14px',animation:'fadeIn .12s ease'}}>
              {notes.length===0 && <div style={{fontSize:12.5,color:'#aeb6c2',paddingBottom:10}}>ยังไม่มีบันทึก</div>}
              {notes.map((n,idx)=>(
                <div key={idx} style={{display:'flex',gap:10,padding:'8px 0',borderTop:idx?'1px solid #eef0f4':'none'}}>
                  <Letter s={n.by} d={24} fs={10}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2}}>
                      <span style={{fontWeight:700,fontSize:12.5}}>{n.by}</span>
                      <span style={{fontSize:11.5,color:'#9aa3af'}}>{relTime(n.at)}</span>
                    </div>
                    <div style={{fontSize:13,color:'#3a4452',lineHeight:1.55}}>{n.t}</div>
                  </div>
                  <button onClick={()=>delNote(w.id,idx)} title="ลบบันทึก" style={{width:26,height:26,borderRadius:7,border:'none',background:'transparent',color:'#c2cad4',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i className="bi bi-trash3" style={{fontSize:13}}></i></button>
                </div>
              ))}
              <div style={{display:'flex',gap:9,alignItems:'center',marginTop:notes.length?10:0,paddingTop:notes.length?10:0,borderTop:notes.length?'1px solid #eef0f4':'none'}}>
                <Letter s={ME} d={26} fs={11}/>
                <input value={noteInput[w.id]||''} onChange={e=>setNoteInput(n=>({...n,[w.id]:e.target.value}))} onKeyDown={e=>{if(e.key==='Enter')addNote(w.id);}} placeholder="เพิ่มบันทึก…" style={{flex:1,border:'1px solid #e3e7ec',borderRadius:9,padding:'9px 12px',fontSize:13,outline:'none',fontFamily:'inherit',color:'#2b3440'}}/>
                <button onClick={()=>addNote(w.id)} style={{display:'inline-flex',alignItems:'center',gap:6,background:primary,color:'#fff',border:'none',borderRadius:9,padding:'9px 15px',fontSize:13,fontWeight:700}}><i className="bi bi-send" style={{fontSize:14}}></i>บันทึก</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );})}
   </div>
  );
}

              <div style={{display:'flex',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:22}}>ชุดห้องปฏิบัติการคอมพิวเตอร์ วท.อุทัยธานี</div>
                  <div style={{fontSize:13,color:'#8a93a3',margin:'4px 0 8px'}}>สมาชิก 4 คน</div>
                  <Avatars n={4} sz={28}/>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:9}}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <button className="ghost-btn" style={{width:38,height:38,borderRadius:'50%',border:'1px solid #e7eaef',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('chat_bubble_outline',20,'#5a6473')}</button>
                    <button style={{display:'inline-flex',alignItems:'center',gap:6,background:primary,color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13.5,fontWeight:700}}>{ms('add',19,'#fff')}เชิญ</button>
                    <button style={{display:'inline-flex',alignItems:'center',gap:6,background:'#fff',color:'#3a4452',border:'1px solid #e3e7ec',borderRadius:9,padding:'9px 14px',fontSize:13.5,fontWeight:600}}>{ms('check',18,primary)}เข้าร่วมแล้ว</button>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:9,padding:'8px 13px',width:220}}>
                    <i className="bi bi-search" style={{fontSize:14,color:'#9aa3af'}}></i><span style={{color:'#9aa3af',fontSize:12.5}}>ค้นหาชุดห้องปฏิบัติการคอมพิวเตอร์ วท.อุทัยธานี</span>
                  </div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:26,marginTop:16,borderBottom:'1px solid #f1f3f6'}}>
                {TABS.map(t=>{const a=tab===t.key;const cnt=t.key==='watch'?(()=>{try{return JSON.parse(localStorage.getItem('gd5_vm_watch')||'[]').length;}catch(_){return 0;}})():0;return (
                  <button key={t.key} onClick={()=>setTab(t.key)} style={{border:'none',background:'transparent',padding:'0 0 11px',fontSize:13.5,fontWeight:a?700:600,color:a?primary:'#8a93a3',borderBottom:'2.5px solid '+(a?primary:'transparent'),marginBottom:-1,display:'inline-flex',alignItems:'center',gap:7}}>{t.label}{t.key==='watch'&&cnt>0&&<span style={{minWidth:19,height:19,borderRadius:99,background:a?primary:'#e7eaef',color:a?'#fff':'#7b8595',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 5px'}}>{cnt}</span>}</button>
                );})}
              </div>
            </div>
          </Card>

          {tab==='talk' ? (
           <div style={{animation:'fadeIn .2s ease',display:'flex',flexDirection:'column',gap:16}}>
            {/* COMPOSER */}
            <Card>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <Letter s="Piyawat" d={42}/>
                <div style={{flex:1,background:'#f1f3f7',border:'1px solid #e7eaef',borderRadius:99,padding:'11px 16px',fontSize:13,color:'#9aa3af'}}>ถ้าเรียนรู้อะไรดีๆมา โพสต์แชร์เพื่อนเลย</div>
                <button style={{width:42,height:42,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{ms('send',20,primary)}</button>
              </div>
            </Card>

            {/* FEED HEADER */}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>โพสต์ล่าสุด</span>
              {ms('unfold_more',18,'#9aa3af')}
              <div style={{flex:1}}></div>
              <button onClick={()=>setView('list')} className="ghost-btn" style={{width:34,height:32,borderRadius:8,border:'1px solid '+(view==='list'?primary:'#e7eaef'),background:view==='list'?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('view_agenda',19,view==='list'?primary:'#8a93a3')}</button>
              <button onClick={()=>setView('grid')} className="ghost-btn" style={{width:34,height:32,borderRadius:8,border:'1px solid '+(view==='grid'?primary:'#e7eaef'),background:view==='grid'?primarySoft:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('grid_view',18,view==='grid'?primary:'#8a93a3')}</button>
            </div>

            {/* POSTS */}
            <div style={{display:view==='grid'?'grid':'flex',gridTemplateColumns:'1fr 1fr',flexDirection:view==='grid'?undefined:'column',gap:16}}>
              {POSTS.map((p,i)=>(
                <div key={i} className="post" style={{background:'#fff',border:'1px solid #eceef2',borderRadius:14,boxShadow:'0 1px 2px rgba(16,24,40,.04)',padding:'15px 18px',transition:'box-shadow .15s'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <Letter s={p.who} d={40}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}><span style={{fontWeight:700,fontSize:14}}>{p.who}</span><span style={{fontSize:11.5,color:'#9aa3af'}}>{p.date}</span></div>
                      <div style={{fontSize:11.5,color:'#9aa3af'}}>{p.role}</div>
                    </div>
                    {ms('more_vert',20,'#c2cad4')}
                  </div>
                  <div style={{display:'flex',gap:14,marginTop:12,alignItems:'flex-start'}}>
                    <PostThumb icon={p.icon} tone={p.tone}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14.5,lineHeight:1.4,color:'#2b3440'}}>{p.title}</div>
                      <div style={{fontSize:12.5,color:'#8a93a3',marginTop:5,lineHeight:1.55}}>{p.excerpt}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:16,marginTop:12,paddingTop:11,borderTop:'1px solid #f3f5f8',fontSize:12,color:'#9aa3af'}}>
                    {p.reacts>0 && <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('favorite',16,'#ef4444',true)}{p.reacts}</span>}
                    <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('visibility',16,'#9aa3af')}{p.views}</span>
                    <div style={{flex:1}}></div>
                    {p.comments>0 && <span style={{display:'inline-flex',alignItems:'center',gap:5}}>{ms('chat_bubble_outline',16,'#9aa3af')}{p.comments} ความคิดเห็น</span>}
                  </div>
                </div>
              ))}
            </div>
           </div>
          ) : tab==='todo' ? (
           <TodoPanel bp={bp} setBp={setBp}/>
          ) : tab==='watch' ? (
           <WatchPanel/>
          ) : tab==='verify' ? (
           <VerifyPanel/>
          ) : (
           <Card pad="70px 0"><div style={{textAlign:'center',color:'#aeb6c2'}}>{ms(tab==='members'?'group':tab==='invite'?'mail':tab==='verify'?'fact_check':'insights',40,'#cfd6e0')}<div style={{marginTop:10,fontWeight:600,color:'#9aa3af',fontSize:13.5}}>{tab==='members'?'รายชื่อสมาชิกในกลุ่ม':tab==='invite'?'ยังไม่มีคำเชิญที่รอตอบรับ':tab==='verify'?'ตรวจสอบโพสต์ในกลุ่ม':'ภาพรวมกลุ่ม'}</div></div></Card>
          )}
        </div>

        {/* RIGHT */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:13}}>{ms('verified_user',19,primary)}<span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>เจ้าของกลุ่ม</span></div>
            <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:16}}>
              <Letter s="Chanavee Bekaku" d={42}/>
              <div><div style={{fontWeight:700,fontSize:14}}>Chanavee Bekaku</div><div style={{fontSize:12,color:'#9aa3af'}}>Dev Manager</div></div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:11}}>{ms('shield_person',19,'#8a93a3')}<span style={{fontWeight:600,fontSize:13.5,color:'#5a6473'}}>ผู้ดูแลกลุ่ม</span></div>
            <Avatars n={1} sz={36}/>
          </Card>
          <TodoProgressCard/>
          <ContractCard/>
          <AttachmentsCard/>
          <Card>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:13}}><span style={{width:30,height:30,borderRadius:'50%',background:primarySoft,display:'flex',alignItems:'center',justifyContent:'center'}}>{ms('trending_up',18,primary)}</span><span style={{fontWeight:600,fontSize:13,color:'#5a6473',lineHeight:1.3}}>โพสต์ที่มียอดวิวสูงสุดสัปดาห์นี้</span></div>
            <div style={{display:'flex',alignItems:'flex-start',gap:11}}>
              <span style={{minWidth:26,height:26,borderRadius:8,background:'#eaf1fe',color:'#3b6fd4',fontWeight:800,fontSize:14,display:'inline-flex',alignItems:'center',justifyContent:'center',flex:'none'}}>1</span>
              <div><div style={{fontWeight:600,fontSize:13.5,lineHeight:1.4,color:'#2b3440'}}>Group Arrangement Properties …</div><div style={{fontSize:12,color:'#9aa3af',marginTop:3}}>โดย Narate Boonmee</div></div>
            </div>
          </Card>
        </div>

       </div>
      </div>
    </GD5AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(async function(){
  var shellSrc='';
  try{ shellSrc=await (await fetch('gd5-app-shell.jsx')).text(); }catch(e){}
  var pageSrc=document.getElementById('jsx-src').textContent;
  var out=Babel.transform(shellSrc+'\n'+pageSrc,{presets:[['react',{runtime:'classic'}]]}).code;
  new Function(out)();
})();
</script>
</body>
</html>
